<textarea id="codeBox" style="opacity:0;position:absolute;height:0;">
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMONIÊ FLOW PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
--primary:#1db954;
--bg:#0a0a0a;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* FUNDO ANIMADO MELHORADO */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(-45deg,#0f0c29,#302b63,#1db954,#000);
background-size:400% 400%;
animation:moveBG 10s infinite;
z-index:-2;
}

body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('https://i.imgur.com/8Km9tLL.png');
opacity:0.08;
z-index:-1;
}

@keyframes moveBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */
.header{text-align:center;padding:40px;}
h1{color:#1db954;letter-spacing:4px;}

.search{
display:flex;
max-width:400px;
margin:20px auto;
background:#111;
border-radius:50px;
overflow:hidden;
}
.search input{
flex:1;
padding:12px;
background:none;
border:none;
color:white;
}
.search button{
background:#1db954;
border:none;
padding:0 20px;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#111;
padding:10px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;border-radius:10px;}

/* PLAYER */
.player{
position:fixed;
bottom:0;
width:100%;
background:#000;
padding:10px;
text-align:center;
}

.progress{
height:5px;
background:#333;
cursor:pointer;
}
.bar{
height:5px;
background:#1db954;
width:0%;
}

button{
margin:5px;
padding:10px;
border:none;
background:#1db954;
cursor:pointer;
}

</style>
</head>
<body>
<div class="header">
<h1>LAMONIÊ FLOW</h1>
<div class="search">
<input id="search" placeholder="Buscar artista...">
<button onclick="buscar()">Buscar</button>
</div>
</div>
<div class="player">
<div class="progress" onclick="seek(event)">
<div class="bar" id="bar"></div>
</div>
<div class="grid" id="grid"></div>
</div>
<script>
let lista=[];
let index=0;
const audio=document.getElementById("audio");

async function buscar(){
let q=document.getElementById("search").value||"Gusttavo Lima";
let res=await fetch(`https://itunes.apple.com/search?term=${q}&entity=song&limit=30`);
let data=await res.json();
lista=data.results;
render();
}

function render(){
let grid=document.getElementById("grid");
grid.innerHTML=lista.map((m,i)=>`
<div class="card" onclick="play(${i})">
<img src="${m.artworkUrl100}">
<p>${m.trackName}</p>
</div>
`).join("");
}

function play(i){
index=i;
audio.src=lista[i].previewUrl;
audio.play();
}

function playPause(){
if(audio.paused){audio.play()}else{audio.pause()}
}

function next(){
index=(index+1)%lista.length;
play(index);
}

function prev(){
index=(index-1+lista.length)%lista.length;
play(index);
}

audio.ontimeupdate=()=>{
let pct=(audio.currentTime/audio.duration)*100;
document.getElementById("bar").style.width=pct+"%";
};

function seek(e){
let rect=e.currentTarget.getBoundingClientRect();
let pct=(e.clientX-rect.left)/rect.width;
audio.currentTime=pct*audio.duration;
}

buscar();

/* BOTÃO COPIAR */
function copyCode(){
let text=document.getElementById("codeBox");
text.select();
document.execCommand("copy");
alert("Copiado com sucesso!");
}
</script>
</body>
</html>
</textarea>
<script>
function copyCode(){
let text=document.getElementById("codeBox");
text.select();
document.execCommand("copy");
alert("Copiado com sucesso!");
}
</script>
