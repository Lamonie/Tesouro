<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de Músicas - iTunes API</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a4a);
      color: #fff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      color: #ff2d55;
    }
    .search-box {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }
    input[type="text"] {
      width: 500px;
      padding: 15px 20px;
      font-size: 1.1em;
      border: none;
      border-radius: 50px 0 0 50px;
      outline: none;
    }
    button {
      padding: 15px 30px;
      font-size: 1.1em;
      background: #ff2d55;
      color: white;
      border: none;
      border-radius: 0 50px 50px 0;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #ff5e7a;
    }
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      backdrop-filter: blur(10px);
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }
    .card-body {
      padding: 15px;
    }
    .card h3 {
      margin: 0 0 5px 0;
      font-size: 1.2em;
    }
    .card p {
      margin: 5px 0;
      opacity: 0.8;
      font-size: 0.95em;
    }
    .play-btn {
      background: #ff2d55;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      font-weight: bold;
    }
    .player {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 15px 25px;
      border-radius: 50px;
      display: none;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      z-index: 1000;
    }
    .player img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
    }
    audio {
      width: 300px;
    }
    .loading {
      text-align: center;
      font-size: 1.2em;
      margin: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 Buscador iTunes</h1>
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Digite o nome da música, artista ou álbum...">
      <button onclick="buscarMusicas()">Buscar</button>
    </div>

    <div id="loading" class="loading" style="display: none;">Buscando na iTunes Store...</div>
    
    <div id="results" class="results"></div>
  </div>

  <!-- Player fixo -->
  <div id="player" class="player">
    <img id="playerArt" src="" alt="Capa">
    <div>
      <strong id="playerTitle"></strong><br>
      <span id="playerArtist" style="opacity: 0.7;"></span>
    </div>
    <audio id="audioPlayer" controls autoplay></audio>
  </div>

  <script>
    const API_URL = "https://itunes.apple.com/search";

    async function buscarMusicas() {
      const termo = document.getElementById("searchInput").value.trim();
      if (!termo) {
        alert("Digite algo para buscar!");
        return;
      }

      document.getElementById("loading").style.display = "block";
      document.getElementById("results").innerHTML = "";

      try {
        const response = await fetch(`${API_URL}?term=${encodeURIComponent(termo)}&media=music&entity=song&limit=30&country=BR`);
        const data = await response.json();

        document.getElementById("loading").style.display = "none";

        if (data.results.length === 0) {
          document.getElementById("results").innerHTML = "<p style='text-align:center; grid-column:1/-1;'>Nenhum resultado encontrado.</p>";
          return;
        }

        mostrarResultados(data.results);
      } catch (error) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("results").innerHTML = "<p style='text-align:center; color:red; grid-column:1/-1;'>Erro ao buscar dados. Tente novamente.</p>";
        console.error(error);
      }
    }

    function mostrarResultados(musicas) {
      const container = document.getElementById("results");
      container.innerHTML = "";

      musicas.forEach(musica => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${musica.artworkUrl100.replace('100x100', '600x600')}" alt="Capa">
          <div class="card-body">
            <h3>${musica.trackName}</h3>
            <p>${musica.artistName}</p>
            <p style="font-size:0.85em; opacity:0.6;">${musica.collectionName || 'Single'}</p>
            <button class="play-btn" onclick="tocarMusica('${musica.previewUrl}', '${musica.artworkUrl100}', '${musica.trackName}', '${musica.artistName}')">
              ▶️ Ouvir Prévia (30s)
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function tocarMusica(previewUrl, artwork, title, artist) {
      const player = document.getElementById("player");
      const audio = document.getElementById("audioPlayer");
      const playerArt = document.getElementById("playerArt");
      const playerTitle = document.getElementById("playerTitle");
      const playerArtist = document.getElementById("playerArtist");

      playerArt.src = artwork.replace('100x100', '600x600');
      playerTitle.textContent = title;
      playerArtist.textContent = artist;
      audio.src = previewUrl;

      player.style.display = "flex";
      audio.play();
    }

    // Permite buscar apertando Enter
    document.getElementById("searchInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") buscarMusicas();
    });
  </script>
</body>
</html>
