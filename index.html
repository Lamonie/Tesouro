<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1db954; 
            --bg: #000000; 
            --surface: #121212; 
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        * { box-sizing: border-box; touch-action: manipulation; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Circular Std', 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }

        .bg-static { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(180deg, #121212 0%, #000 100%); 
            z-index: -1; 
        }

        header { padding: 25px 15px 5px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; }
        header p { color: var(--text-sub); font-size: 11px; font-weight: bold; }

        .categories-nav { display: flex; overflow-x: auto; padding: 15px; gap: 10px; scrollbar-width: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: #2a2a2a; border: none; color: white; padding: 8px 14px; border-radius: 20px; white-space: nowrap; font-size: 13px; font-weight: 600; }
        .cat-btn.active { background: var(--primary); color: black; }

        .search-container { padding: 5px 15px 15px; }
        .search-box { display: flex; background: #242424; border-radius: 4px; padding: 2px; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 10px; outline: none; font-size: 14px; }
        .btn-start { background: none; border: none; color: var(--text-sub); padding: 0 12px; }

        /* GRID AJUSTADA PARA NÃO CORTAR */
        .main-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 0 15px 150px; 
        }
        .card { background: #181818; border-radius: 8px; padding: 10px; overflow: hidden; }
        .card img { width: 100%; border-radius: 4px; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .card h4 { margin: 10px 0 2px; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { color: var(--text-sub); font-size: 11px; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; width: fit-content; }
        
        /* DETALHES DO ÁLBUM */
        .album-header { padding: 20px; background: linear-gradient(180deg, #222 0%, #000 100%); text-align: center; }
        .album-header img { width: 180px; height: 180px; border-radius: 4px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .album-info-box { margin-top: 15px; text-align: left; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; }
        .info-tag { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
        .info-tag span { color: var(--primary); font-weight: bold; margin-left: 5px; }

        .player { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 15px 25px; border-top: 1px solid #282828; z-index: 10001; display: none; }
        .play-trigger { background: white; border: none; width: 42px; height: 42px; border-radius: 50%; color: black; }

        .track-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #111; }
        .track-num { color: var(--text-sub); width: 25px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="bg-static"></div>

    <div id="homePage">
        <header>
            <h1>LAMONIÊ FLOW</h1>
            <p>SÓ HITS</p>
        </header>

        <div class="categories-nav" id="catNav"></div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="O que você quer ouvir?">
                <button class="btn-start" onclick="search()"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="main-grid" id="grid"></div>
    </div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina('albumPage')">🔙 VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex:1; overflow:hidden;">
                <h4 id="trackTitle" style="font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:11px; color:var(--primary);">Artista</p>
            </div>
            <button onclick="togglePlay()" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');

        const albunsIniciais = [
            "Luiz Gonzaga", "Dominguinhos", "Sivuca", "Mestrinho", "Elba Ramalho", 
            "Flávio José", "Alceu Valença", "Mastruz com Leite", "Limão com Mel", "Magníficos",
            "Wesley Safadão", "Nattanzinho", "Mari Fernandez", "Xand Avião", "João Gomes",
            "Tarcísio do Acordeon", "Vitor Fernandes", "Iguinho e Lulinha", "Henry Freitas", "Nadson o Ferinha",
            "Henrique e Juliano", "Jorge e Mateus", "Gusttavo Lima", "Ana Castela", "Zé Neto e Cristiano",
            "Luan Santana", "Matuê", "Mc Ryan SP", "Luísa Sonza", "Pabllo Vittar"
        ];

        const generos = ["Destaques", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "MPB", "Axé", "Pagode", "Funk", "Trap", "Pop", "Rock", "Gospel", "Reggae"];

        function carregarGeneros() {
            document.getElementById('catNav').innerHTML = generos.map(g => `
                <button class="cat-btn ${g === 'Destaques' ? 'active' : ''}" onclick="selecionarGenero(this, '${g}')">${g}</button>
            `).join('');
        }

        function selecionarGenero(btn, g) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(g === 'Destaques') carregarHome(); else search(g);
        }

        async function carregarHome() {
            grid.innerHTML = "";
            for (const item of albunsIniciais) {
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(item)}&entity=album&limit=1&country=BR`);
                    const data = await res.json();
                    if (data.results.length > 0) {
                        const t = data.results[0];
                        grid.innerHTML += `
                            <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                                <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                                <h4>${t.collectionName}</h4>
                                <p>${t.artistName}</p>
                            </div>
                        `;
                    }
                } catch (e) {}
            }
        }

        async function search(q = "") {
            const term = q || document.getElementById('searchInput').value;
            if(!term) return;
            grid.innerHTML = "<p style='padding:20px; color:#b3b3b3;'>Buscando...</p>";
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=30&country=BR`);
                const data = await res.json();
                grid.innerHTML = data.results.map(t => `
                    <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                        <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                        <h4>${t.collectionName}</h4>
                        <p>${t.artistName}</p>
                    </div>
                `).join('');
            } catch (e) { grid.innerHTML = "<p>Erro.</p>"; }
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            document.getElementById('albumDetailContent').innerHTML = "<p style='padding:20px;'>Carregando...</p>";
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
                const data = await res.json();
                const album = data.results[0];
                const tracks = data.results.slice(1);
                const ano = new Date(album.releaseDate).getFullYear();
                const dataCompleta = new Date(album.releaseDate).toLocaleDateString('pt-BR');

                document.getElementById('albumDetailContent').innerHTML = `
                    <div class="album-header">
                        <img src="${album.artworkUrl100.replace('100x100', '600x600')}">
                        <h2 style="margin-top:15px; font-size:18px;">${album.collectionName}</h2>
                        <p style="color:var(--primary); font-weight:bold;">${album.artistName}</p>
                        
                        <div class="album-info-box">
                            <div class="info-tag">Lançamento: <span>${dataCompleta} (${ano})</span></div>
                            <div class="info-tag">Gênero: <span>${album.primaryGenreName}</span></div>
                            <div class="info-tag">Gravadora: <span>${album.copyright || 'Independente'}</span></div>
                        </div>
                    </div>
                    <div style="padding-bottom: 150px; background: #000;">
                        ${tracks.map((t, i) => `
                            <div class="track-row" onclick="tocarTrack('${t.trackName.replace(/'/g, "\\'")}', '${t.artistName.replace(/'/g, "\\'")}', '${t.previewUrl}')">
                                <span class="track-num">${i+1}</span>
                                <div style="flex:1;">
                                    <div style="font-size:14px;">${t.trackName}</div>
                                </div>
                                <i class="fas fa-play" style="color:#444; font-size:12px;"></i>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) { document.getElementById('albumDetailContent').innerHTML = "<p>Erro ao carregar detalhes.</p>"; }
        }

        function tocarTrack(name, artist, url) {
            audio.src = url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = name;
            document.getElementById('trackArtist').innerText = artist;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }
        
        carregarGeneros();
        carregarHome();
    </script>
</body>
</html>
