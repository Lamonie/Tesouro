<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMONIÊ FLOW PRO+</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{background:#000;color:#fff;font-family:Arial}
.card{width:47%;margin:10px;display:inline-block}
.card img{width:100%;border-radius:12px}
.player{position:fixed;bottom:10px;left:10px;right:10px;background:#111;padding:10px;border-radius:15px}
</style>
</head>

<body>

<h2 style="padding:20px">LAMONIÊ FLOW PRO+</h2>

<input id="searchInput" placeholder="Buscar artista..." style="width:90%;margin:10px;padding:10px;border-radius:10px;border:none">
<button onclick="buscar()" style="padding:10px;border-radius:10px">Buscar</button>

<div id="grid"></div>

<div class="player" id="player" style="display:none">
<img id="playerArt" width="50">
<span id="trackTitle"></span>
<button onclick="togglePlay()">▶</button>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById("audio");

async function buscar(){
    const termo = document.getElementById("searchInput").value;

    // ITUNES
    const itunes = fetch(`https://itunes.apple.com/search?term=${termo}&entity=song&limit=20`)
    .then(r=>r.json());

    // DEEZER
    const deezer = fetch(`https://corsproxy.io/?https://api.deezer.com/search?q=${termo}`)
    .then(r=>r.json());

    const [itunesData, deezerData] = await Promise.all([itunes, deezer]);

    let resultados = [];

    // ITUNES
    itunesData.results.forEach(m=>{
        resultados.push({
            titulo: m.trackName,
            artista: m.artistName,
            capa: m.artworkUrl100,
            audio: m.previewUrl
        });
    });

    // DEEZER
    deezerData.data.forEach(m=>{
        resultados.push({
            titulo: m.title,
            artista: m.artist.name,
            capa: m.album.cover_medium,
            audio: m.preview
        });
    });

    mostrar(resultados);
}

function mostrar(lista){
    document.getElementById("grid").innerHTML = lista.map((m,i)=>`
        <div class="card" onclick="tocar('${m.audio}','${m.capa}','${m.titulo}')">
            <img src="${m.capa}">
            <p>${m.titulo}</p>
            <small>${m.artista}</small>
        </div>
    `).join("");
}

function tocar(src, capa, titulo){
    audio.src = src;
    audio.play();

    document.getElementById("player").style.display="block";
    document.getElementById("playerArt").src = capa;
    document.getElementById("trackTitle").innerText = titulo;
}

function togglePlay(){
    if(audio.paused) audio.play();
    else audio.pause();
}
</script>

</body>
</html>
