<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Pro Player</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: linear-gradient(270deg, #0f0c29, #302b63, #24243e);
  background-size: 600% 600%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  padding: 20px;
}

input {
  width: 80%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
  font-size: 16px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: #1db954;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.card {
  margin: 15px auto;
  padding: 15px;
  width: 90%;
  background: rgba(0,0,0,0.5);
  border-radius: 12px;
}

iframe {
  margin-top: 10px;
  width: 100%;
  height: 152px;
  border-radius: 12px;
}
</style>

</head>

<body>

<div class="container">

<h1>🎧 Music Pro</h1>

<input type="text" id="search" placeholder="Digite o nome do artista...">
<br>
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

</div>

<script>

function buscar() {
  let nome = document.getElementById("search").value.toLowerCase();
  let html = "";

  if(nome.includes("drake")) {
    html += criarMusica("Drake - One Dance", "1zi7xx7UVEFkmKfv06H8x0");
    html += criarMusica("Drake - God's Plan", "6DCZcSspjsKoFjzjrWoCdn");
  }

  else if(nome.includes("travis")) {
    html += criarMusica("Travis Scott - SICKO MODE", "2xLMifQCjDGFmkHkpNLD9h");
    html += criarMusica("Travis Scott - Goosebumps", "6gBFPUFcJLzWGx4lenP6h2");
  }

  else if(nome.includes("mc") || nome.includes("funk")) {
    html += criarMusica("Funk - Exemplo", "4iV5W9uYEdYUVa79Axb7Rh");
  }

  else {
    html = "<p>Artista não encontrado 😢</p>";
  }

  document.getElementById("resultado").innerHTML = html;
}

function criarMusica(titulo, id) {
  return `
    <div class="card">
      <h3>${titulo}</h3>
      <iframe src="https://open.spotify.com/embed/track/${id}" allow="autoplay"></iframe>
    </div>
  `;
}

</script>

</body>
</html>
