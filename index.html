<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; }

        header { padding: 25px 15px 10px; display: flex; justify-content: space-between; align-items: flex-start; }
        header h1 { color: #2ecc71; font-size: 26px; font-weight: 900; letter-spacing: -1px; flex: 1; }

        /* ADIÇÃO: CONTAINER DA FOGUEIRA (IMG_7291.jpg) */
        .fogueira-container {
            width: 130px; /* Encaixa no espaço rabiscado */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(18, 18, 20, 0.95);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(255, 100, 0, 0.2);
            text-align: center;
        }

        .fogueira-gif {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        .fogueira-container p {
            color: #ff9f43; /* Cor laranja fogueira */
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 6px;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        /* LAYOUT PRESERVADO (IMG_7280.jpg, IMG_7286.jpg) */
        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; scrollbar-width: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: #1c1c1e; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 600; flex-shrink: 0; }
        .cat-btn.active { background: #2ecc71; color: #000; }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: #1c1c1e; border-radius: 12px; border: 1px solid #333; align-items: center; overflow: hidden; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 14px; outline: none; font-size: 14px; width: 100%; }
        
        .clear-btn { background: none; border: none; color: #8e8e93; padding: 0 10px; cursor: pointer; font-size: 14px; display: none; }
        .search-btn { background: none; border: none; color: #8e8e93; padding: 0 15px; cursor: pointer; font-size: 16px; }

        .charts-section { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .charts-section::-webkit-scrollbar { display: none; }
        .chart-card { min-width: 165px; aspect-ratio: 1/1; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .chart-card h3 { font-size: 20px; font-weight: 900; line-height: 1.1; color: #fff; }
        .chart-card p { font-size: 10px; font-weight: bold; text-transform: uppercase; color: rgba(255,255,255,0.8); }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 160px; }
        .card { width: 47%; background: #1c1c1e; border-radius: 14px; padding: 8px; margin-bottom: 18px; border: 1px solid #2c2c2e; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
        .card h4 { font-size: 12px; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: #2ecc71; border: none; color: #000; padding: 12px 25px; border-radius: 30px; font-weight: 800; width: fit-content; font-size: 12px; }
        
        .album-info-box { padding: 0 20px 20px; font-size: 11px; color: #8e8e93; text-align: center; line-height: 1.5; }
        .album-info-box b { color: var(--primary); text-transform: uppercase; }

        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #1c1c1e; }

        .player { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,22,0.98); backdrop-filter: blur(20px); padding: 12px 20px 35px; border-top: 1px solid #333; z-index: 10001; transition: transform 0.4s ease; }
        .player.minimized { transform: translateY(80%); }
        .minimize-toggle { width: 40px; height: 5px; background: #3a3a3c; border-radius: 10px; margin: 0 auto 12px; }
        
        .player-controls { display: flex; align-items: center; gap: 12px; }
        .control-icon { background: none; border: none; color: #8e8e93; font-size: 16px; cursor: pointer; }
        .control-icon.active { color: var(--primary); }
        
        .play-trigger { background: var(--primary); border: none; width: 42px; height: 42px; border-radius: 50%; color: #000; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header>
        <h1>LAMONIÊ FLOW</h1>
        <div class="fogueira-container">
            <img src="https://media.giphy.com/media/26hirw81b1E0nQWkU/giphy.gif" alt="Fogueira de São João" class="fogueira-gif">
            <p>SÃO JOÃO<br>ESTÁ CHEGANDO</p>
        </div>
    </header>

    <div class="categories-nav" id="catNav"></div>
    
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar álbum ou artista..." oninput="toggleClearBtn(this.value)">
            <button class="clear-btn" id="clearBtn" onclick="limparBusca()"><i class="fas fa-times"></i></button>
            <button class="search-btn" onclick="search(document.getElementById('searchInput').value)"><i class="fas fa-search"></i></button>
        </div>
    </div>
    
    <div class="charts-section">
        <div class="chart-card" style="background: #6a1b9a;" onclick="search('Top Mundo')"><p>Paradas</p><h3>Top Mundo</h3></div>
        <div class="chart-card" style="background: #4d7c6d;" onclick="search('Top Brasil')"><p>Paradas</p><h3>Top Brasil</h3></div>
    </div>

    <div class="main-grid" id="grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina('albumPage')">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player" style="display:none;" onclick="toggleMinimize()">
        <div class="minimize-toggle"></div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1; overflow: hidden; margin-right: 15px;">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:12px; color:var(--primary);">Artista</p>
            </div>
            <div class="player-controls">
                <button id="shuffleBtn" class="control-icon" onclick="event.stopPropagation(); toggleShuffle();"><i class="fas fa-random"></i></button>
                <button id="loopBtn" class="control-icon" onclick="event.stopPropagation(); toggleLoop();"><i class="fas fa-redo-alt"></i></button>
                <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
            </div>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');
        const player = document.getElementById('player');
        
        let currentPlaylist = [];
        let currentIndex = -1;
        let isShuffle = false;
        let isLoop = false;

        const generos = ["Destaques", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Arrocha", "Brega", "Pagode", "Samba", "Axé", "Funk", "Trap", "Pop", "Rock", "MPB", "Gospel"];
        
        const mestresForro = ["Luiz Gonzaga", "Dominguinhos", "Flávio José", "Elba Ramalho", " Wesley Safadão", "Nattan", "Xand Avião", "João Gomes", "Tarcísio do Acordeon", "Vitor Fernandes", "Mastruz com Leite", "Limão com Mel", "Magníficos", "Calcinha Preta", "Aviões do Forró"];

        function carregarGeneros() {
            document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn ${g === 'Destaques' ? 'active' : ''}" onclick="selecionarGenero(this, '${g}')">${g}</button>`).join('');
        }

        function selecionarGenero(btn, g) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(g === "Destaques") carregar300Albuns(); else search(g);
        }

        async function carregar300Albuns() {
            grid.innerHTML = "<p style='padding:20px;'>Abrindo o fole...</p>";
            let htmlContent = "";
            for (const artista of mestresForro) {
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artista)}&entity=album&limit=15&country=BR`);
                    const data = await res.json();
                    data.results.forEach(t => {
                        htmlContent += `<div class="card" onclick="abrirAlbum('${t.collectionId}')">
                            <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                            <h4>${t.collectionName}</h4>
                            <p style="font-size:10px; color:#8e8e93;">${t.artistName}</p>
                        </div>`;
                    });
                } catch(e) {}
            }
            grid.innerHTML = htmlContent;
        }

        async function search(q) {
            grid.innerHTML = "<p style='padding:20px;'>Buscando...</p>";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=album&limit=40&country=BR`);
            const data = await res.json();
            grid.innerHTML = "";
            data.results.forEach(t => {
                grid.innerHTML += `<div class="card" onclick="abrirAlbum('${t.collectionId}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4>${t.collectionName}</h4>
                    <p style="font-size:10px; color:#8e8e93;">${t.artistName}</p>
                </div>`;
            });
        }

        async function abrirAlbum(id) {
            const page = document.getElementById('albumPage');
            const content = document.getElementById('albumDetailContent');
            content.innerHTML = "<p style='padding:50px; text-align:center;'>Preparando o arraiá...</p>";
            page.style.display = 'flex';
            
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            currentPlaylist = data.results.slice(1);
            
            content.innerHTML = `
                <div style="text-align:center; padding:30px 20px;">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:80%; border-radius:15px;">
                    <h2 style="margin-top:25px; font-size:22px; color:white;">${album.collectionName}</h2>
                </div>
                <div class="album-info-box">
                    <span><b>Lançamento:</b> ${new Date(album.releaseDate).toLocaleDateString('pt-BR')}</span><br>
                    <span><b>Ano:</b> ${new Date(album.releaseDate).getFullYear()}</span><br>
                    <span><b>Gravadora:</b> ${album.copyright || "Independente"}</span>
                </div>
                <div style="padding-bottom: 180px;">
                    ${currentPlaylist.map((m, i) => `
                        <div class="track-row" onclick="tocarDoAlbum(${i})">
                            <span style="color:#48484a; width:35px; font-weight:bold;">${i+1}</span>
                            <div style="flex:1;"><div style="font-size:15px; color:white;">${m.trackName}</div></div>
                            <i class="fas fa-play-circle" style="color:var(--primary); font-size:20px;"></i>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function tocarDoAlbum(index) {
            currentIndex = index;
            const track = currentPlaylist[currentIndex];
            tocar(track.trackName, track.artistName, track.previewUrl);
        }

        function tocar(nome, artista, url) {
            audio.src = url; audio.play();
            player.style.display = 'block';
            player.classList.remove('minimized');
            document.getElementById('trackTitle').innerText = nome;
            document.getElementById('trackArtist').innerText = artista;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function toggleLoop() { isLoop = !isLoop; document.getElementById('loopBtn').classList.toggle('active', isLoop); }
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuffleBtn').classList.toggle('active', isShuffle); }

        audio.onended = () => {
            if(isLoop) audio.play();
            else if(isShuffle) tocarDoAlbum(Math.floor(Math.random() * currentPlaylist.length));
            else if(currentIndex < currentPlaylist.length - 1) tocarDoAlbum(currentIndex + 1);
        };

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function toggleMinimize() { player.classList.toggle('minimized'); }
        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }
        function toggleClearBtn(v) { document.getElementById('clearBtn').style.display = v ? 'block' : 'none'; }
        function limparBusca() { document.getElementById('searchInput').value = ""; toggleClearBtn(""); }

        carregarGeneros();
        carregar300Albuns();
    </script>
</body>
</html>
