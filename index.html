<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --playing-color: #ffff00; --active-song: #007bff; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000000; color: var(--text-main); font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }

        header { padding: 30px 20px 15px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { color: var(--primary); font-size: 28px; font-weight: 900; }

        .nav-container { display: flex; align-items: center; padding: 10px 15px; gap: 10px; overflow: hidden; }

        /* Borda LED Escura conforme pedido anterior */
        .genres-toggle-btn {
            background: #000;
            color: white;
            border: 1px solid #333; 
            box-shadow: 0 0 4px rgba(50, 50, 50, 0.4);
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 14px;
        }

        .categories-nav { display: none; overflow-x: auto; gap: 8px; white-space: nowrap; scrollbar-width: none; flex: 1; }
        .categories-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn { background: #000; border: 1px solid #333; color: white; padding: 8px 16px; border-radius: 18px; font-size: 13px; font-weight: 600; flex-shrink: 0; }
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: rgba(255, 255, 255, 0.07); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); align-items: center; padding: 0 15px; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 15px 10px; outline: none; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 180px; }
        .card { width: 47%; background: rgba(255,255,255,0.04); border-radius: 15px; padding: 8px; margin-bottom: 20px; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; }

        /* AJUSTE: Barra Esconde-Esconde mais baixa e com efeito Vidro Transparente */
        .player { 
            position: fixed; 
            bottom: 10px; /* Mais para baixo */
            left: 10px; 
            right: 10px; 
            background: rgba(255, 255, 255, 0.1); /* Transparência base */
            backdrop-filter: blur(25px); /* Efeito de vidro fosco */
            -webkit-backdrop-filter: blur(25px); 
            padding: 12px 18px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.2); /* Borda fina para brilho do vidro */
            z-index: 10002; 
            transition: transform 0.4s ease, opacity 0.4s;
        }
        .player-hidden { transform: translateY(100px); opacity: 0; }
        .player-controls { display: flex; align-items: center; gap: 12px; }
        .mini-art { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 10001; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; }
        
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .track-row.is-playing .track-title { color: var(--active-song) !important; font-weight: bold; }

        .album-meta { background: rgba(255,255,255,0.05); margin: 15px; padding: 15px; border-radius: 15px; font-size: 12px; text-align: center; color: #999; }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>

    <div class="nav-container">
        <div class="genres-toggle-btn" onclick="toggleGenres()">Gêneros</div>
        <div class="categories-nav" id="catNav"></div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar música ou artista...">
            <div style="display:flex; gap:20px; color:#8e8e93; align-items: center;">
                <i class="fas fa-microphone" id="micBtn" onclick="ativarMicrofone()" style="cursor:pointer;"></i>
                <i class="fas fa-search" onclick="realizarBuscaManual()" style="cursor:pointer;"></i>
            </div>
        </div>
    </div>

    <div id="grid" class="main-grid"></div>

    <footer class="player" id="player" style="display:none;" onclick="voltarParaAlbumAtivo()">
        <div class="player-controls">
            <img id="playerArt" src="" class="mini-art">
            <div style="flex:1; overflow:hidden;">
                <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:bold; font-size:14px; color:white;" id="trackTitle">Música</div>
                <div id="timeInfo" style="font-size:10px; color:rgba(255,255,255,0.6);">0:00 / 0:00</div>
            </div>
            <div style="display:flex; align-items:center; gap:20px;">
                <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" style="background:none; border:none; color:var(--playing-color); font-size:24px;"><i class="fas fa-pause"></i></button>
                <i class="fas fa-step-forward" style="color:white; font-size:20px;" onclick="event.stopPropagation(); proxima();"></i>
            </div>
        </div>
    </footer>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const playerBar = document.getElementById('player');
        const albumPage = document.getElementById('albumPage');

        function toggleGenres() {
            const nav = document.getElementById('catNav');
            nav.style.display = (nav.style.display === 'flex') ? 'none' : 'flex';
        }

        // Sistema de esconder a barra ao rolar
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            if (window.scrollY > lastScrollY && window.scrollY > 50) { playerBar.classList.add('player-hidden'); }
            else { playerBar.classList.remove('player-hidden'); }
            lastScrollY = window.scrollY;
        });

        const generos = ["Início", "Forró", "Samba", "Vaquejada", "Sertanejo", "Rock", "Pop"];
        document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn" onclick="carregarPorGenero('${g}')">${g}</button>`).join('');

        async function carregarPorGenero(g) {
            const termo = g === "Início" ? "Luiz Gonzaga" : g;
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=album&limit=50`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:8px; font-weight:bold; font-size:12px; height:32px; overflow:hidden;">${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            window.albumVisualizadoId = id;
            albumPage.style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0]; const songs = data.results.slice(1);
            
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:20px;"><img src="${art.replace('100x100', '600x600')}" style="width:200px; border-radius:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <h2 style="margin-top:20px; padding:0 15px;">${album.collectionName}</h2><p style="color:var(--primary);">${album.artistName}</p></div>
                <div class="album-meta"><b>${album.primaryGenreName}</b> • ${new Date(album.releaseDate).getFullYear()}</div>
                ${songs.map((m, i) => `
                    <div class="track-row" id="row_${id}_${i}" onclick="tocar('${id}', ${i}, '${art}')">
                        <span style="color:#666; width:25px;">${i+1}</span>
                        <div style="flex:1; margin-left:10px;">
                            <div class="track-title" style="font-size:14px;">${m.trackName}</div>
                        </div>
                        <i class="fas fa-play-circle" style="font-size:20px;"></i>
                    </div>`).join('')}<div style="height:150px;"></div>`;
            window.listaVisualizada = songs;
        }

        function tocar(albumId, index, art) {
            window.albumAtivoId = albumId; window.musicaIndex = index;
            window.listaTocando = window.listaVisualizada; window.capaAtiva = art;
            const m = window.listaTocando[index];
            audio.src = m.previewUrl; audio.play();
            playerBar.style.display = 'block';
            document.getElementById('playerArt').src = art;
            document.getElementById('trackTitle').innerText = m.trackName;
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function fecharPagina() { albumPage.style.display = 'none'; }
        
        carregarPorGenero("Início");
    </script>
</body>
</html>
