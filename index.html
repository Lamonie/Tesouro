<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1db954; 
            --bg: #000000; 
            --surface: #121212; 
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        * { box-sizing: border-box; touch-action: manipulation; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden;
        }

        .bg-static { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: -1; }

        header { padding: 25px 15px 5px; text-align: left; }
        
        /* COR DO NOME ALTERADA PARA BRANCO */
        header h1 { color: #ffffff; font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
        
        #dataHora { 
            font-size: 12px; 
            font-weight: 800; 
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: colorLoop 5s infinite linear;
            margin-top: 5px;
            display: block;
        }

        @keyframes colorLoop {
            0% { color: #ff00ff; }
            25% { color: #00ffff; }
            50% { color: #1db954; }
            75% { color: #ffff00; }
            100% { color: #ff00ff; }
        }

        /* BARRA DE GÊNEROS COM TODOS OS ESTILOS */
        .categories-nav { display: flex; overflow-x: auto; padding: 15px; gap: 10px; scrollbar-width: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: #2a2a2a; border: none; color: white; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-size: 13px; font-weight: 600; }
        .cat-btn.active { background: var(--primary); color: black; }

        .search-container { padding: 5px 15px 15px; }
        .search-box { display: flex; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; font-size: 14px; }
        .btn-start { background: none; border: none; color: var(--text-sub); padding: 0 15px; }

        /* TRAVA DE LAYOUT: DOIS ÁLBUNS LADO A LADO */
        .main-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 0 12px 150px;
            width: 100%;
        }
        .card { 
            background: #121212; 
            border-radius: 10px; 
            padding: 8px; 
            display: flex; 
            flex-direction: column;
            width: 100%;
            border: 1px solid #282828;
        }
        .card img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 6px; 
            object-fit: cover; 
            display: block; 
        }
        .card h4 { 
            margin: 8px 0 2px; 
            font-size: 12px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            color: #fff; 
        }
        .card p { color: var(--text-sub); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: #1db954; border: none; color: black; padding: 10px 20px; border-radius: 5px; font-weight: 800; font-size: 12px; width: fit-content; text-transform: uppercase; }
        
        .album-header { padding: 20px; text-align: center; }
        .album-header img { width: 200px; height: 200px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .track-num { color: var(--text-sub); width: 30px; font-size: 14px; }
        
        .player { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.98); padding: 12px 15px 35px; border-top: 1px solid #222; z-index: 10001; display: none; backdrop-filter: blur(15px); }
        .play-trigger { background: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; font-size: 18px; }
    </style>
</head>
<body>
    <div class="bg-static"></div>

    <div id="homePage">
        <header>
            <h1>LAMONIÊ FLOW</h1>
            <div id="dataHora">--/--/---- --:--:--</div>
        </header>

        <div class="categories-nav" id="catNav"></div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="O que você quer ouvir?">
                <button class="btn-start" onclick="search()"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="main-grid" id="grid"></div>
    </div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina('albumPage')"><i class="fas fa-arrow-left"></i> VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 15px;">
            <div style="flex: 1; overflow: hidden;">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:11px; color:var(--primary); font-weight:bold;">Artista</p>
            </div>
            <button onclick="togglePlay()" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');

        function atualizarRelogio() {
            const agora = new Date();
            const dia = String(agora.getDate()).padStart(2, '0');
            const mes = String(agora.getMonth() + 1).padStart(2, '0');
            const ano = agora.getFullYear();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            const segundos = String(agora.getSeconds()).padStart(2, '0');
            document.getElementById('dataHora').innerText = `${dia}/${mes}/${ano} ${horas}:${minutos}:${segundos}`;
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        // TODOS OS GÊNEROS DO PLANETA TERRA
        const generos = [
            "Destaques", "Forró", "Vaquejada", "Piseiro", "Arrocha", "Sertanejo", "Brega", "Funk", "Pagode", "Samba", "Axé", "MPB",
            "Trap", "Hip Hop", "Rap", "Pop", "Rock", "Metal", "Gospel", "Reggae", "Eletrônica", "House", "Techno", "Jazz", 
            "Blues", "Soul", "R&B", "Country", "Folk", "Reggaeton", "Bachata", "Salsa", "K-Pop", "Indie", "Lo-fi", "Clássica",
            "Bolero", "Tango", "Disco", "Punk", "Ska", "Dubstep", "New Wave", "Bossa Nova"
        ];

        const artistasIniciais = [
            "Wesley Safadão", "Nattanzinho", "Mari Fernandez", "João Gomes", "Tarcísio do Acordeon", 
            "Iguinho e Lulinha", "Henry Freitas", "Nadson o Ferinha", "Luiz Gonzaga", "Dominguinhos",
            "Jorge e Mateus", "Henrique e Juliano", "Gusttavo Lima", "Ana Castela", "Zé Neto e Cristiano"
        ];

        function carregarGeneros() {
            document.getElementById('catNav').innerHTML = generos.map(g => `
                <button class="cat-btn ${g === 'Destaques' ? 'active' : ''}" onclick="selecionarGenero(this, '${g}')">${g}</button>
            `).join('');
        }

        function selecionarGenero(btn, g) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(g === 'Destaques') carregarHome(); else search(g);
        }

        async function carregarHome() {
            grid.innerHTML = "";
            for (const nome of artistasIniciais) {
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(nome)}&entity=album&limit=10&country=BR`);
                    const data = await res.json();
                    data.results.forEach(t => renderCard(t));
                } catch (e) {}
            }
        }

        function renderCard(t) {
            grid.innerHTML += `
                <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4>${t.collectionName}</h4>
                    <p>${t.artistName}</p>
                </div>
            `;
        }

        async function search(q = "") {
            const term = q || document.getElementById('searchInput').value;
            if(!term) return;
            grid.innerHTML = "";
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=60&country=BR`);
                const data = await res.json();
                data.results.forEach(t => renderCard(t));
            } catch (e) {}
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            document.getElementById('albumDetailContent').innerHTML = "<p style='padding:30px;'>Buscando músicas...</p>";
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
                const data = await res.json();
                const album = data.results[0];
                const musicas = data.results.slice(1);
                document.getElementById('albumDetailContent').innerHTML = `
                    <div class="album-header">
                        <img src="${album.artworkUrl100.replace('100x100', '600x600')}">
                        <h2 style="margin-top:20px; font-size:18px;">${album.collectionName}</h2>
                        <p style="color:var(--primary); font-weight:bold;">${album.artistName}</p>
                    </div>
                    <div style="padding-bottom: 160px;">
                        ${musicas.map((m, i) => `
                            <div class="track-row" onclick="tocar('${m.trackName.replace(/'/g, "\\'")}', '${m.artistName.replace(/'/g, "\\'")}', '${m.previewUrl}')">
                                <span class="track-num">${i+1}</span>
                                <div style="flex:1; overflow:hidden;">
                                    <div style="font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${m.trackName}</div>
                                    <div style="font-size:11px; color:#b3b3b3;">${m.artistName}</div>
                                </div>
                                <i class="fas fa-play" style="color:#1db954; font-size:12px;"></i>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {}
        }

        function tocar(nome, artista, url) {
            audio.src = url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = nome;
            document.getElementById('trackArtist').innerText = artista;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }

        carregarGeneros();
        carregarHome();
    </script>
</body>
</html>
