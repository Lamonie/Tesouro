<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | EVOLUTION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg-dark: #050505; --accent: #2ecc71; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark); color: white;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* FUNDO ANIMADO DINÂMICO */
        .bg-anim {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1db95415, #000);
            z-index: -1; animation: pulseBg 8s infinite alternate;
        }
        @keyframes pulseBg { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        header { padding: 15px; text-align: center; }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); text-shadow: 0 0 10px rgba(29,185,84,0.5); }

        /* CARROSSEL DE GÊNEROS */
        .genre-container {
            display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px;
            scrollbar-width: none; flex-shrink: 0;
        }
        .genre-container::-webkit-scrollbar { display: none; }
        .genre-chip {
            background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 20px;
            white-space: nowrap; font-size: 14px; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s; cursor: pointer;
        }
        .genre-chip:active { background: var(--primary); transform: scale(0.95); }

        /* BUSCA */
        .search-box { padding: 10px 20px; }
        .search-input {
            width: 100%; background: #111; border: 1px solid #333;
            padding: 12px 20px; border-radius: 50px; color: white; outline: none;
        }

        /* ÁREA PRINCIPAL ROLÁVEL */
        .main-scroll { 
            flex: 1; overflow-y: auto; padding: 10px 20px 150px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px;
        }
        .card { 
            background: #111; border-radius: 12px; padding: 10px; 
            transition: 0.3s; animation: fadeIn 0.5s ease;
        }
        .card img { width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card h4 { font-size: 13px; margin: 8px 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ABA DE DETALHES (OVERLAY ROLÁVEL) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000; display: none; flex-direction: column;
        }
        .overlay-header { padding: 20px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .overlay-content { 
            flex: 1; overflow-y: auto; padding: 20px; 
            background: linear-gradient(to bottom, #1db95422, #000);
        }

        .discography-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px;
        }
        .album-card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 8px; text-align: center; }
        .album-card img { width: 100%; border-radius: 6px; }

        /* PLAYER FIXO */
        .player-bar {
            position: fixed; bottom: 0; width: 100%; background: #000;
            border-top: 2px solid var(--primary); padding: 15px 20px 30px;
            display: flex; flex-direction: column; align-items: center; z-index: 6000;
        }
        .play-btn {
            width: 60px; height: 60px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: black; font-size: 24px; border: none; box-shadow: 0 0 15px var(--primary);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-anim"></div>

    <header><div class="logo">LAMONIÊ FLOW</div></header>

    <div class="genre-container" id="genreList">
        <div class="genre-chip" onclick="searchByGenre('Piseiro')">🔥 Piseiro</div>
        <div class="genre-chip" onclick="searchByGenre('Sertanejo')">🤠 Sertanejo</div>
        <div class="genre-chip" onclick="searchByGenre('Forró')">🪗 Forró</div>
        <div class="genre-chip" onclick="searchByGenre('Vaquejada')">🐎 Vaquejada</div>
        <div class="genre-chip" onclick="searchByGenre('MPB')">🎸 MPB</div>
        <div class="genre-chip" onclick="searchByGenre('Gospel')">🙏 Gospel</div>
    </div>

    <div class="search-box">
        <input type="text" class="search-input" id="searchField" placeholder="O que vamos ouvir, Benedito?" onkeyup="if(event.key==='Enter') manualSearch()">
    </div>

    <div class="main-scroll" id="mainGrid"></div>

    <div id="artistOverlay" class="overlay">
        <div class="overlay-header">
            <button onclick="closeOverlay()" style="background:none; border:none; color:white; font-size:24px;"><i class="fas fa-chevron-left"></i></button>
            <h3 id="viewArtistName" style="margin:0;">Artista</h3>
        </div>
        <div class="overlay-content">
            <div id="artistBioInfo" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                </div>
            
            <h4>Discografia / Álbuns</h4>
            <div class="discography-grid" id="discoGrid"></div>
            
            <button class="genre-chip" style="width:100%; margin-top:30px; padding:15px;" onclick="closeOverlay()">FECHAR E VOLTAR</button>
        </div>
    </div>

    <footer class="player-bar">
        <div style="width: 100%; height: 3px; background: #222; margin-bottom: 15px; border-radius: 5px; overflow: hidden;">
            <div id="prog" style="width: 0%; height: 100%; background: var(--primary);"></div>
        </div>
        <button class="play-btn" onclick="controlPlayer()">
            <i class="fas fa-play" id="pIcon"></i>
        </button>
        <p id="nowPlaying" style="font-size: 11px; margin-top: 10px; color: #888;">Nenhuma música tocando</p>
    </footer>

    <audio id="mainAudio"></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        let currentData = null;

        async function searchByGenre(g) {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(g)}&entity=song&limit=30`);
            const data = await res.json();
            renderGrid(data.results);
        }

        function manualSearch() {
            const val = document.getElementById('searchField').value;
            searchByGenre(val);
        }

        function renderGrid(list) {
            document.getElementById('mainGrid').innerHTML = list.map(t => `
                <div class="card" onclick='openArtistDetails(${JSON.stringify(t).replace(/'/g, "&apos;")})'>
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4>${t.trackName}</h4>
                    <p style="font-size:11px; color:var(--primary)">${t.artistName}</p>
                </div>
            `).join('');
        }

        async function openArtistDetails(t) {
            currentData = t;
            document.getElementById('viewArtistName').innerText = t.artistName;
            document.getElementById('artistOverlay').style.display = 'flex';
            
            const date = new Date(t.releaseDate);
            document.getElementById('artistBioInfo').innerHTML = `
                <p><b>Gênero:</b> ${t.primaryGenreName}</p>
                <p><b>País:</b> ${t.country}</p>
                <p><b>Lançamento:</b> ${date.toLocaleDateString('pt-BR')}</p>
            `;

            // BUSCAR TODA A DISCOGRAFIA
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(t.artistName)}&entity=album&limit=10`);
            const data = await res.json();
            
            document.getElementById('discoGrid').innerHTML = data.results.map(a => `
                <div class="album-card">
                    <img src="${a.artworkUrl100.replace('100x100', '300x300')}">
                    <p style="font-size:10px; margin-top:5px; height:24px; overflow:hidden;">${a.collectionName}</p>
                </div>
            `).join('');

            // Tocar prévia
            audio.src = t.previewUrl;
            audio.play();
            document.getElementById('pIcon').className = "fas fa-pause";
            document.getElementById('nowPlaying').innerText = t.trackName + " - " + t.artistName;
        }

        function controlPlayer() {
            if(!audio.src) return;
            if(audio.paused) {
                audio.play();
                document.getElementById('pIcon').className = "fas fa-pause";
            } else {
                audio.pause();
                document.getElementById('pIcon').className = "fas fa-play";
            }
        }

        function closeOverlay() { document.getElementById('artistOverlay').style.display = 'none'; }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('prog').style.width = p + "%";
        };

        // Inicializar com Piseiro (Sua preferência)
        searchByGenre('Piseiro');
    </script>
</body>
</html>
