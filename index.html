<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusicFlow | Bibiu Galdino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS - DESIGN MODERNO E RESPONSIVO */
        :root {
            --primary: #1db954;
            --bg: #000000;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body { 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* FUNDO ANIMADO COM CORES */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, #0f0c29, #302b63, #24243e, #1db95422);
            background-size: 400% 400%;
            animation: moveBG 15s ease infinite;
            z-index: -2;
        }

        @keyframes moveBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* LAYOUT PRINCIPAL */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            backdrop-filter: blur(20px);
        }

        header {
            padding: 20px;
            text-align: center;
        }

        .search-container {
            background: rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        .search-container input {
            background: none; border: none; color: white; margin-left: 10px; width: 100%; outline: none;
        }

        /* LISTA DE ARTISTAS (ROLAGEM SUAVE) */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 120px 20px;
        }

        .artist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .card h3 { font-size: 14px; margin-bottom: 5px; }
        .card p { font-size: 11px; color: #b3b3b3; }

        /* PLAYER FIXO EMBAIXO */
        footer {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-info { display: flex; align-items: center; gap: 12px; }
        .player-info img { width: 45px; height: 45px; border-radius: 5px; }
        .player-info b { font-size: 14px; display: block; }
        .player-info span { font-size: 12px; color: #aaa; }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .progress-container {
            flex: 1;
            height: 4px;
            background: #333;
            margin: 0 15px;
            border-radius: 2px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 2px;
        }

        .play-circle {
            background: white;
            color: black;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }

        .timer { font-size: 10px; color: #888; font-family: monospace; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="app">
        <header>
            <h2 style="color: var(--primary);"><i class="fas fa-play-circle"></i> MusicFlow</h2>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="O que vamos ouvir, Benedito?">
            </div>
        </header>

        <main>
            <h4 style="margin-bottom: 15px;">Artistas Sugeridos</h4>
            <div class="artist-grid" id="grid">
                </div>
        </main>

        <footer>
            <div class="player-info">
                <img src="https://via.placeholder.com/50" id="p-img">
                <div>
                    <b id="p-nome">Selecione um artista</b>
                    <span id="p-status">Aguardando...</span>
                </div>
            </div>
            
            <div class="player-controls">
                <div class="timer" id="time-curr">00:00:00</div>
                <div class="progress-container">
                    <div class="progress-fill" id="fill"></div>
                </div>
                <div class="play-circle" onclick="togglePlay()" id="btnPlay">
                    <i class="fas fa-play"></i>
                </div>
            </div>
        </footer>
    </div>

    <audio id="playerCore"></audio>

    <script>
        // JAVASCRIPT - LÓGICA CORRIGIDA
        const database = [
            { 
                id: 0, nome: "Alok", 
                foto: "https://www.cnnbrasil.com.br/wp-content/uploads/sites/12/2023/08/alok-show-do-seculo.jpg", 
                mp3: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" 
            },
            { 
                id: 1, nome: "Luiz Gonzaga", 
                foto: "https://upload.wikimedia.org/wikipedia/commons/e/e0/Luiz_Gonzaga_1950.jpg", 
                mp3: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" 
            },
            { 
                id: 2, nome: "The Weeknd", 
                foto: "https://p2.trrsf.com/image/fget/cf/1200/1200/middle/images.terra.com/2023/10/08/1313791090-the-weeknd.jpg", 
                mp3: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" 
            },
            {
                id: 3, nome: "Zezé Di Camargo",
                foto: "https://veja.abril.com.br/wp-content/uploads/2016/10/zeze-di-camargo-e-luciano-20120521-002-copy.jpg",
                mp3: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"
            }
        ];

        const grid = document.getElementById('grid');
        const audio = document.getElementById('playerCore');
        const btnPlay = document.getElementById('btnPlay');

        function render(filtro = "") {
            grid.innerHTML = "";
            const filtrados = database.filter(a => a.nome.toLowerCase().includes(filtro.toLowerCase()));
            
            filtrados.forEach(art => {
                grid.innerHTML += `
                    <div class="card" onclick="tocarMusica(${art.id})">
                        <img src="${art.foto}">
                        <h3>${art.nome}</h3>
                        <p>Tocar agora</p>
                    </div>
                `;
            });
        }

        function tocarMusica(id) {
            const artista = database.find(a => a.id === id);
            
            // Atualiza Interface
            document.getElementById('p-nome').innerText = artista.nome;
            document.getElementById('p-status').innerText = "Tocando...";
            document.getElementById('p-img').src = artista.foto;
            
            // Toca Áudio
            audio.src = artista.mp3;
            audio.play().catch(e => console.log("Clique no play para iniciar"));
            btnPlay.innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.src) {
                if(audio.paused) {
                    audio.play();
                    btnPlay.innerHTML = '<i class="fas fa-pause"></i>';
                } else {
                    audio.pause();
                    btnPlay.innerHTML = '<i class="fas fa-play"></i>';
                }
            }
        }

        // Monitor de tempo e barra
        audio.ontimeupdate = () => {
            const prog = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fill').style.width = prog + "%";
            
            let cur = audio.currentTime;
            let m = Math.floor(cur / 60).toString().padStart(2, '0');
            let s = Math.floor(cur % 60).toString().padStart(2, '0');
            let ms = Math.floor((cur % 1) * 100).toString().padStart(2, '0');
            document.getElementById('time-curr').innerText = `${m}:${s}:${ms}`;
        };

        // Busca
        document.getElementById('searchInput').oninput = (e) => render(e.target.value);

        // Inicializa
        render();
    </script>
</body>
</html>
