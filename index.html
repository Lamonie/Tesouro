<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW - SUPER API</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000; --card-bg: #111; --text: #fff; --active: #ffff00; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
        
        /* Cabeçalho */
        header { padding: 25px 20px 10px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        /* Barra de Busca */
        .search-area { padding: 10px 15px; }
        .search-box { background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; padding: 12px 15px; border: 1px solid #333; }
        .search-box input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 15px; }
        .search-box i { color: var(--primary); font-size: 18px; cursor: pointer; }

        /* Navegação de Gêneros */
        .nav-container { display: flex; padding: 10px 15px; gap: 10px; align-items: center; }
        .genres-btn { background: #000; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .cat-nav { display: none; overflow-x: auto; gap: 8px; flex: 1; scrollbar-width: none; }
        .cat-btn { background: #111; border: 1px solid #333; color: #888; padding: 8px 16px; border-radius: 20px; font-size: 12px; flex-shrink: 0; transition: 0.2s; }
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); font-weight: bold; box-shadow: 0 0 10px rgba(148, 179, 206, 0.4); }

        /* Grade de Álbuns */
        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 15px 15px 160px; }
        .card { width: 47%; background: var(--card-bg); border-radius: 15px; padding: 8px; margin-bottom: 18px; border: 1px solid #222; position: relative; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
        .card p { font-size: 12px; margin-top: 8px; font-weight: bold; height: 32px; overflow: hidden; line-height: 1.3; }
        .api-tag { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); font-size: 8px; padding: 2px 6px; border-radius: 4px; color: var(--primary); text-transform: uppercase; font-weight: 900; }

        /* Player Flutuante */
        .player { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(25,25,25,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 12px; border-radius: 18px; border: 1px solid #444; display: none; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-content { display: flex; align-items: center; gap: 12px; }
        #pArt { width: 48px; height: 48px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #pTitle { flex: 1; font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #playBtn { background: none; border: none; color: var(--active); font-size: 26px; cursor: pointer; padding: 0 5px; }

        /* Página do Álbum (Lista de Músicas) */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 20px; background: var(--primary); border: none; padding: 12px 25px; border-radius: 30px; font-weight: 800; width: fit-content; color: #000; font-size: 14px; }
        .track-row { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid #111; transition: 0.2s; }
        .track-row:active { background: #111; }
        .track-info { flex: 1; }
        .track-n { color: #fff; font-weight: bold; font-size: 15px; margin-bottom: 2px; }
        .track-a { color: #666; font-size: 12px; }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>

    <div class="search-area">
        <div class="search-box">
            <input type="text" id="inputBusca" placeholder="Artistas, álbuns ou gêneros...">
            <i class="fas fa-search" onclick="executarBuscaManual()"></i>
        </div>
    </div>

    <div class="nav-container">
        <div class="genres-btn" onclick="document.getElementById('catNav').style.display = 'flex'">Gêneros</div>
        <div class="cat-nav" id="catNav"></div>
    </div>

    <div id="grid" class="main-grid"></div>

    <footer class="player" id="player">
        <div class="player-content">
            <img id="pArt" src="">
            <div id="pTitle">Música</div>
            <button onclick="togglePlay()" id="playBtn"><i class="fas fa-play"></i></button>
        </div>
    </footer>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="document.getElementById('albumPage').style.display='none'">← VOLTAR</button>
        <div id="albumContent"></div>
    </div>

    <audio id="audioElement"></audio>

    <script>
        const audio = document.getElementById('audioElement');
        const grid = document.getElementById('grid');
        const inputBusca = document.getElementById('inputBusca');

        // Configuração dos Gêneros
        const generos = ["Início", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Brega", "Arrocha", "Pagode", "Gospel", "Rock"];
        document.getElementById('catNav').innerHTML = generos.map(g => 
            `<button class="cat-btn" onclick="superBusca('${g}', this)">${g}</button>`
        ).join('');

        // Busca manual pelo Input
        function executarBuscaManual() {
            if(inputBusca.value) superBusca(inputBusca.value);
        }
        inputBusca.addEventListener('keypress', (e) => { if(e.key === 'Enter') executarBuscaManual(); });

        // Motor de Busca Super API (iTunes + Jamendo + Deezer Blindado)
        async function superBusca(termo, btn) {
            if(btn) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            grid.innerHTML = "<p style='padding:30px; color:var(--primary); font-weight:bold;'>Sincronizando fontes...</p>";
            
            const busca = termo === "Início" ? "Luiz Gonzaga" : termo;
            let cardsHtml = "";

            // Promessas de busca independentes para evitar tela branca
            const p_itunes = fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(busca)}&entity=album&limit=12`).then(r => r.json()).catch(() => null);
            const p_jamendo = fetch(`https://api.jamendo.com/v3.0/albums/?client_id=56d30cce&format=json&name=${encodeURIComponent(busca)}&limit=8`).then(r => r.json()).catch(() => null);
            const p_deezer = fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.deezer.com/search/album?q=' + busca)}`).then(r => r.json()).then(d => JSON.parse(d.contents)).catch(() => null);

            const [resI, resJ, resD] = await Promise.all([p_itunes, p_jamendo, p_deezer]);

            // Processar iTunes
            if(resI && resI.results) {
                resI.results.forEach(t => cardsHtml += montarCard(t.collectionName, t.artworkUrl100.replace('100x100','600x600'), t.collectionId, 'itunes'));
            }
            // Processar Deezer
            if(resD && resD.data) {
                resD.data.forEach(t => cardsHtml += montarCard(t.title, t.cover_medium, t.id, 'deezer'));
            }
            // Processar Jamendo (Musicas Completas)
            if(resJ && resJ.results) {
                resJ.results.forEach(t => cardsHtml += montarCard(t.name, t.image || 'https://via.placeholder.com/300', t.id, 'jamendo'));
            }

            grid.innerHTML = cardsHtml || "<p style='padding:20px;'>Nenhum álbum encontrado.</p>";
        }

        function montarCard(titulo, capa, id, api) {
            return `
                <div class="card" onclick="abrirAlbum('${id}', '${capa}', '${api}')">
                    <span class="api-tag">${api}</span>
                    <img src="${capa}" loading="lazy">
                    <p>${titulo}</p>
                </div>`;
        }

        async function abrirAlbum(id, capa, api) {
            const page = document.getElementById('albumPage');
            const content = document.getElementById('albumContent');
            page.style.display = 'flex';
            content.innerHTML = "<p style='padding:50px; text-align:center;'>Carregando faixas...</p>";

            try {
                let faixas = [];
                if(api === 'itunes') {
                    const r = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
                    const d = await r.json();
                    faixas = d.results.slice(1).map(m => ({ n: m.trackName, u: m.previewUrl, a: m.artistName }));
                } else if(api === 'deezer') {
                    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.deezer.com/album/' + id)}`);
                    const d = JSON.parse((await r.json()).contents);
                    faixas = d.tracks.data.map(m => ({ n: m.title, u: m.preview, a: m.artist.name }));
                } else {
                    const r = await fetch(`https://api.jamendo.com/v3.0/tracks/?client_id=56d30cce&album_id=${id}`);
                    const d = await r.json();
                    faixas = d.results.map(m => ({ n: m.name, u: m.audio, a: m.artist_name }));
                }

                content.innerHTML = `
                    <div style="text-align:center; padding:30px 20px 10px;">
                        <img src="${capa}" style="width:220px; border-radius:15px; box-shadow: 0 15px 35px rgba(0,0,0,0.8);">
                    </div>
                    ${faixas.map(f => `
                        <div class="track-row" onclick="tocar('${f.u}', '${f.n.replace(/'/g, "\\'")}', '${capa}')">
                            <div class="track-info">
                                <div class="track-n">${f.n}</div>
                                <div class="track-a">${f.a}</div>
                            </div>
                            <i class="fas fa-play-circle" style="color:var(--primary); font-size:24px;"></i>
                        </div>
                    `).join('')}`;
            } catch(e) { content.innerHTML = "<p style='padding:40px;'>Erro ao carregar o álbum.</p>"; }
        }

        function tocar(url, nome, capa) {
            if(!url) return alert("Prévia não disponível para esta faixa.");
            audio.src = url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('pArt').src = capa;
            document.getElementById('pTitle').innerText = nome;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        // Inicialização
        superBusca("Início");
    </script>
</body>
</html>
