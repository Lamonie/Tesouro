<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1db954; 
            --bg: #000000; 
            --surface: #121212; 
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        * { box-sizing: border-box; touch-action: manipulation; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden;
        }

        header { padding: 20px 15px 10px; }
        header h1 { color: var(--primary); font-size: 24px; font-weight: 900; }

        /* BARRA DE GÊNEROS INFINITA */
        .categories-nav { 
            display: flex; 
            overflow-x: auto; 
            padding: 10px 15px; 
            gap: 8px; 
            scrollbar-width: none; 
            white-space: nowrap;
        }
        .categories-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: #2a2a2a; 
            border: none; 
            color: white; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 600; 
            flex-shrink: 0;
        }
        .cat-btn.active { background: var(--primary); color: black; }

        .search-container { padding: 10px 15px; }
        .search-box { 
            display: flex; 
            background: #1a1a1a; 
            border-radius: 8px; 
            border: 1px solid #333; 
            align-items: center; 
        }
        .search-box input { 
            background: none; border: none; color: white; flex: 1; 
            padding: 12px; outline: none; font-size: 14px; 
        }

        /* LAYOUT FIXO: 2 ÁLBUNS LADO A LADO */
        .main-grid { 
            display: grid !important; 
            grid-template-columns: repeat(2, 1fr) !important; 
            gap: 12px; 
            padding: 15px;
            width: 100%;
        }

        .card { 
            background: #181818; 
            border-radius: 8px; 
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            border: 1px solid #282828;
            width: 100%;
        }

        .card img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 4px; 
            object-fit: cover; 
            margin-bottom: 8px;
        }

        .card h4 { 
            font-size: 13px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            margin-bottom: 4px;
        }

        .card p { 
            color: var(--text-sub); 
            font-size: 11px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }

        .full-page { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: none; 
            flex-direction: column; overflow-y: auto; 
        }
        
        .btn-voltar { 
            margin: 15px; background: var(--primary); border: none; 
            color: black; padding: 10px 20px; border-radius: 25px; 
            font-weight: 800; cursor: pointer; 
        }

        .player { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(18,18,18,0.98); padding: 15px 20px 30px; 
            border-top: 1px solid #282828; z-index: 10001; display: none; 
        }
    </style>
</head>
<body>
    <header><h1>LAMONIÊ FLOW</h1></header>

    <div class="categories-nav" id="catNav"></div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="O que você quer ouvir?">
        </div>
    </div>

    <div class="main-grid" id="grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina('albumPage')">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1; overflow: hidden;">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:12px; color:var(--primary);">Artista</p>
            </div>
            <button onclick="togglePlay()" id="playBtn" style="background:#fff; border:none; width:40px; height:40px; border-radius:50%;"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');

        // TODOS OS GÊNEROS DO MUNDO
        const generos = [
            "Destaques", "Forró", "Vaquejada", "Piseiro", "Arrocha", "Sertanejo", "Brega", "Pisadinha", 
            "Pagode", "Samba", "Axé", "Funk", "Trap", "Rap", "Hip Hop", "Pop", "Rock", "Metal", "MPB", 
            "Gospel", "Eletrônica", "Reggae", "Blues", "Jazz", "Country", "K-Pop", "Latino", "Bachata", 
            "Reggaeton", "Clássica", "Lo-fi", "Indie", "Soul", "R&B", "Disco", "Techno"
        ];

        function carregarGeneros() {
            document.getElementById('catNav').innerHTML = generos.map(g => `
                <button class="cat-btn ${g === 'Destaques' ? 'active' : ''}" onclick="selecionarGenero(this, '${g}')">${g}</button>
            `).join('');
        }

        function selecionarGenero(btn, g) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            search(g);
        }

        function renderCard(t) {
            grid.innerHTML += `
                <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4>${t.collectionName}</h4>
                    <p>${t.artistName}</p>
                </div>
            `;
        }

        async function search(q = "Wesley Safadão") {
            grid.innerHTML = "";
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=album&limit=40&country=BR`);
                const data = await res.json();
                data.results.forEach(t => renderCard(t));
            } catch (e) {}
        }

        async function abrirAlbum(id) {
            const page = document.getElementById('albumPage');
            page.style.display = 'flex';
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
                const data = await res.json();
                const album = data.results[0];
                const musicas = data.results.slice(1);
                document.getElementById('albumDetailContent').innerHTML = `
                    <div style="padding:20px; text-align:center;">
                        <img src="${album.artworkUrl100.replace('100x100', '500x500')}" style="width:80%; border-radius:8px;">
                        <h2 style="margin-top:15px;">${album.collectionName}</h2>
                    </div>
                    ${musicas.map((m, i) => `
                        <div onclick="tocar('${m.trackName.replace(/'/g, "")}', '${m.artistName}', '${m.previewUrl}')" style="padding:15px; border-bottom:1px solid #1a1a1a;">
                            ${i+1}. ${m.trackName}
                        </div>
                    `).join('')}
                `;
            } catch (e) {}
        }

        function tocar(nome, artista, url) {
            audio.src = url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = nome;
            document.getElementById('trackArtist').innerText = artista;
        }

        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }
        
        carregarGeneros();
        search();
    </script>
</body>
</html>
