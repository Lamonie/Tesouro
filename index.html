<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | OFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; }
        
        /* Reset para garantir que o clique funcione e a rolagem seja suave */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: sans-serif;
            overflow-x: hidden; /* Garante que não sambe para os lados */
        }

        /* Container Principal com rolagem livre */
        .app-container { height: 100%; overflow-y: auto; padding-bottom: 120px; }

        header { padding: 25px 20px; }
        .logo { font-size: 26px; font-weight: 900; color: #fff; margin: 0; }
        .logo span { color: var(--primary); }

        /* Categorias */
        .tabs { display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px; }
        .tab-btn { 
            background: #1a1a1a; border: none; color: white; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; white-space: nowrap; cursor: pointer;
        }
        .tab-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        /* Busca */
        .search-box { padding: 20px; display: flex; gap: 10px; }
        .search-box input { 
            flex: 1; background: #1a1a1a; border: 1px solid #333; 
            padding: 12px; border-radius: 8px; color: white; outline: none;
        }
        .btn-buscar { background: var(--primary); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }

        /* Grid de Álbuns - Corrigido para o clique */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .card { background: #151515; border-radius: 12px; padding: 10px; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; border-radius: 8px; display: block; margin-bottom: 10px; }
        .card h4 { margin: 5px 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { margin: 0; font-size: 11px; color: var(--primary); }

        /* Player Fixo */
        .player { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); padding: 15px 20px; border-top: 2px solid var(--primary); 
            display: none; z-index: 100;
        }

        /* Bloqueio de zoom via CSS para iOS */
        body { touch-action: pan-y; } 
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 class="logo">LAMONIÊ <span>FLOW</span></h1>
            <p style="font-size: 10px; opacity: 0.5;">PROFESSIONAL EXPERIENCE</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="search('2025')">DESTAQUES 2025</button>
            <button class="tab-btn" onclick="search('Vaquejada')">VAQUEJADA</button>
            <button class="tab-btn" onclick="search('Piseiro')">PISEIRO</button>
            <button class="tab-btn" onclick="search('Sertanejo')">SERTANEJO</button>
        </div>

        <div class="search-box">
            <input type="text" id="inp" placeholder="Buscar álbum ou artista...">
            <button class="btn-buscar" onclick="search()">BUSCAR</button>
        </div>

        <div class="grid" id="grid">
            </div>
    </div>

    <div class="player" id="player">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div>
                <b id="p-title" style="font-size: 14px; display: block;"></b>
                <span id="p-artist" style="font-size: 11px; color: var(--primary);"></span>
            </div>
            <button onclick="toggle()" id="btn-p" style="background:white; border:none; width:45px; height:45px; border-radius:50%; font-size: 20px;">
                <i class="fas fa-pause"></i>
            </button>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');

        async function search(termo = "") {
            const q = termo || document.getElementById('inp').value || "Zezé Di Camargo";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=album&limit=20&country=BR`);
            const data = await res.json();
            
            const grid = document.getElementById('grid');
            grid.innerHTML = data.results.map(a => `
                <div class="card" onclick="tocar('${a.collectionId}', '${a.collectionName.replace(/'/g, "")}', '${a.artistName.replace(/'/g, "")}')">
                    <img src="${a.artworkUrl100.replace('100x100', '400x400')}">
                    <h4>${a.collectionName}</h4>
                    <p>${a.artistName}</p>
                </div>
            `).join('');
        }

        async function tocar(id, album, artista) {
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song&limit=1`);
            const data = await res.json();
            if(data.results[1]) {
                const track = data.results[1];
                audio.src = track.previewUrl;
                audio.play();
                document.getElementById('player').style.display = 'block';
                document.getElementById('p-title').innerText = track.trackName;
                document.getElementById('p-artist').innerText = artista;
                document.getElementById('btn-p').innerHTML = '<i class="fas fa-pause"></i>';
            }
        }

        function toggle() {
            if(audio.paused) {
                audio.play();
                document.getElementById('btn-p').innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                document.getElementById('btn-p').innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        // --- Bloqueio de pinça definitivo sem estragar o clique ---
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        document.addEventListener('gesturestart', (e) => e.preventDefault());

        search(); // Carrega inicial
    </script>
</body>
</html>
