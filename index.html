<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2ecc71; --bg: #000000; --text-main: #ffffff; --player-bg: rgba(20,20,22,0.98); }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; }

        header { padding: 25px 15px 10px; display: flex; align-items: center; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; scrollbar-width: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: #1c1c1e; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 600; flex-shrink: 0; }
        .cat-btn.active { background: var(--primary); color: #000; }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: #1c1c1e; border-radius: 12px; border: 1px solid #333; align-items: center; overflow: hidden; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 14px; outline: none; font-size: 14px; width: 100%; }
        .search-btn { background: none; border: none; color: #8e8e93; padding: 0 15px; cursor: pointer; font-size: 16px; }

        .charts-section { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .charts-section::-webkit-scrollbar { display: none; }
        .chart-card { min-width: 165px; aspect-ratio: 1/1; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .chart-card h3 { font-size: 20px; font-weight: 900; line-height: 1.1; color: #fff; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 160px; }
        .card { width: 47%; background: #1c1c1e; border-radius: 14px; padding: 8px; margin-bottom: 18px; border: 1px solid #2c2c2e; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
        .card h4 { font-size: 12px; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; font-size: 12px; cursor: pointer; }

        /* AJUSTE DO PLAYER PARA DESCER/SUBIR */
        .player { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: var(--player-bg); 
            backdrop-filter: blur(20px); 
            padding: 12px 20px 35px; 
            border-top: 1px solid #333; 
            z-index: 10001; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
        }
        
        /* Classe que faz a aba descer */
        .player.minimized { 
            transform: translateY(calc(100% - 70px)); 
        }

        .handle { 
            width: 40px; 
            height: 5px; 
            background: #3a3a3c; 
            border-radius: 10px; 
            margin: 0 auto 12px; 
        }
        
        .player-content { display: flex; justify-content: space-between; align-items: center; }
        .player-info { flex: 1; overflow: hidden; margin-right: 15px; }
        .player-controls { display: flex; align-items: center; gap: 15px; }
        .control-icon { background: none; border: none; color: #8e8e93; font-size: 18px; cursor: pointer; }
        .play-trigger { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header><h1>LAMONIÊ FLOW</h1></header>

    <div class="categories-nav" id="catNav"></div>
    
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar álbum ou artista...">
            <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
    </div>
    
    <div class="charts-section">
        <div class="chart-card" style="background: #6a1b9a;"><h3>Top Mundo</h3></div>
        <div class="chart-card" style="background: #4d7c6d;"><h3>Top Brasil</h3></div>
    </div>

    <div class="main-grid" id="grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player" style="display:none;" onclick="toggleMinimize(event)">
        <div class="handle"></div>
        <div class="player-content">
            <div class="player-info">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:12px; color:var(--primary);">Artista</p>
            </div>
            <div class="player-controls">
                <button class="control-icon" onclick="event.stopPropagation()"><i class="fas fa-random"></i></button>
                <button class="control-icon" onclick="event.stopPropagation()"><i class="fas fa-redo"></i></button>
                <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
            </div>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const player = document.getElementById('player');
        const grid = document.getElementById('grid');

        // FUNÇÃO PARA FAZER A ABA DESCER E SUBIR
        function toggleMinimize(event) {
            // Se o usuário clicar nos botões de controle, não minimiza
            if (event.target.closest('.player-controls')) return;
            player.classList.toggle('minimized');
        }

        const generos = ["Destaques", "Forró", "Vaquejada", "Piseiro", "Sertanejo"];
        
        function carregarGeneros() {
            document.getElementById('catNav').innerHTML = generos.map(g => 
                `<button class="cat-btn ${g === 'Destaques' ? 'active' : ''}">${g}</button>`
            ).join('');
        }

        async function carregarAlbuns() {
            const res = await fetch(`https://itunes.apple.com/search?term=Luiz+Gonzaga&entity=album&limit=20`);
            const data = await res.json();
            grid.innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4>${t.collectionName}</h4>
                </div>
            `).join('');
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            const musicas = data.results.slice(1);
            
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:250px; border-radius:15px;">
                    <h2 style="margin-top:15px;">${album.collectionName}</h2>
                </div>
                ${musicas.map(m => `
                    <div style="padding:15px; border-bottom:1px solid #1c1c1e;" onclick="tocar('${m.trackName}', '${m.artistName}', '${m.previewUrl}')">
                        ${m.trackName}
                    </div>
                `).join('')}
            `;
        }

        function tocar(nome, artista, url) {
            audio.src = url;
            audio.play();
            player.style.display = 'block';
            player.classList.remove('minimized'); // Abre o player ao dar play
            document.getElementById('trackTitle').innerText = nome;
            document.getElementById('trackArtist').innerText = artista;
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }

        carregarGeneros();
        carregarAlbuns();
    </script>
</body>
</html>
