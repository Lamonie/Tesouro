<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000; --card: #111; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; }
        header { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { color: var(--primary); font-size: 24px; font-weight: 900; }
        
        .search-area { padding: 10px 15px; }
        .search-box { background: #1a1a1a; border-radius: 12px; display: flex; padding: 12px; border: 1px solid #333; align-items: center; }
        .search-box input { background: none; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; }
        
        .nav-container { display: flex; padding: 10px 15px; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .cat-btn { background: #111; border: 1px solid #333; color: #777; padding: 8px 18px; border-radius: 20px; font-size: 13px; flex-shrink: 0; }
        .cat-btn.active { background: var(--primary); color: #000; font-weight: bold; border-color: var(--primary); }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 15px; }
        .card { width: 47%; background: var(--card); border-radius: 15px; padding: 10px; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
        .card p { font-size: 12px; margin-top: 8px; font-weight: bold; height: 32px; overflow: hidden; }
        .api-tag { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); font-size: 9px; padding: 2px 6px; border-radius: 4px; color: var(--primary); font-weight: 900; }

        .player { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(25,25,25,0.9); backdrop-filter: blur(15px); padding: 12px; border-radius: 20px; border: 1px solid #444; display: none; z-index: 999; }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 20px; background: var(--primary); border: none; padding: 15px 30px; border-radius: 40px; font-weight: bold; color: #000; width: fit-content; }
        .track-row { display: flex; align-items: center; padding: 18px 20px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>

    <div class="search-area">
        <div class="search-box">
            <input type="text" id="inputBusca" placeholder="O que vamos ouvir hoje?">
            <i class="fas fa-search" style="color:var(--primary)" onclick="fazerBusca()"></i>
        </div>
    </div>

    <div class="nav-container" id="catNav"></div>

    <div id="grid" class="main-grid"></div>

    <footer class="player" id="player">
        <div style="display:flex; align-items:center; gap:15px;">
            <img id="pArt" src="" style="width:50px; height:50px; border-radius:8px;">
            <div style="flex:1; overflow:hidden;"><div id="pTitle" style="font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</div></div>
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:#ffff00; font-size:28px;"><i class="fas fa-play"></i></button>
        </div>
    </footer>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="document.getElementById('albumPage').style.display='none'">← VOLTAR</button>
        <div id="albumContent"></div>
    </div>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        const grid = document.getElementById('grid');
        const input = document.getElementById('inputBusca');
        const generos = ["Início", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Brega", "Gospel"];

        document.getElementById('catNav').innerHTML = generos.map(g => 
            `<button class="cat-btn" onclick="superBusca('${g}', this)">${g}</button>`
        ).join('');

        function fazerBusca() { if(input.value) superBusca(input.value); }
        input.addEventListener('keypress', (e) => { if(e.key==='Enter') fazerBusca(); });

        async function superBusca(termo, btn) {
            if(btn) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            grid.innerHTML = "<p style='padding:20px; color:var(--primary);'>Sincronizando...</p>";
            const busca = termo === "Início" ? "Luiz Gonzaga" : termo;
            let cardsHtml = "";

            try {
                // iTunes (Músicas Famosas)
                const resI = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(busca)}&entity=album&limit=15`).then(r=>r.json()).catch(()=>({results:[]}));
                resI.results.forEach(t => {
                    cardsHtml += `<div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100.replace('100x100','600x600')}', 'itunes')">
                        <span class="api-tag">iTunes</span><img src="${t.artworkUrl100.replace('100x100','600x600')}"><p>${t.collectionName}</p></div>`;
                });

                // Jamendo (Músicas COMPLETAS)
                const resJ = await fetch(`https://api.jamendo.com/v3.0/albums/?client_id=56d30cce&format=json&name=${encodeURIComponent(busca)}&limit=10`).then(r=>r.json()).catch(()=>({results:[]}));
                resJ.results.forEach(t => {
                    cardsHtml += `<div class="card" onclick="abrirAlbum('${t.id}', '${t.image}', 'jamendo')">
                        <span class="api-tag">FULL</span><img src="${t.image}"><p>${t.name}</p></div>`;
                });

                grid.innerHTML = cardsHtml || "<p style='padding:20px;'>Nenhum resultado.</p>";
            } catch(e) { grid.innerHTML = "<p style='padding:20px;'>Erro de conexão.</p>"; }
        }

        async function abrirAlbum(id, capa, api) {
            const page = document.getElementById('albumPage');
            const content = document.getElementById('albumContent');
            page.style.display = 'flex';
            content.innerHTML = "<p style='padding:50px; text-align:center;'>Abrindo álbum...</p>";

            try {
                let faixas = [];
                if(api === 'itunes') {
                    const d = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`).then(r=>r.json());
                    faixas = d.results.slice(1).map(m => ({ n: m.trackName, u: m.previewUrl, a: m.artistName }));
                } else {
                    const d = await fetch(`https://api.jamendo.com/v3.0/tracks/?client_id=56d30cce&album_id=${id}`).then(r=>r.json());
                    faixas = d.results.map(m => ({ n: m.name, u: m.audio, a: m.artist_name }));
                }

                content.innerHTML = `<div style="text-align:center; padding:30px;"><img src="${capa}" style="width:250px; border-radius:15px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);"></div>` +
                    faixas.map(f => `<div class="track-row" onclick="tocar('${f.u}', '${f.n.replace(/'/g, "")}', '${capa}')">
                        <div style="flex:1;"><div style="font-weight:bold;">${f.n}</div><div style="font-size:12px; color:#666;">${f.a}</div></div>
                        <i class="fas fa-play-circle" style="color:var(--primary); font-size:24px;"></i>
                    </div>`).join('');
            } catch(e) { content.innerHTML = "<p>Erro ao carregar faixas.</p>"; }
        }

        function tocar(url, nome, capa) {
            if(!url) return;
            audio.src = url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('pArt').src = capa;
            document.getElementById('pTitle').innerText = nome;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        superBusca("Início");
    </script>
</body>
</html>
