<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW v9.1.32</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --sp-green: #1DB954; --bg: #000000; --card: #181818; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; overflow-x: hidden; }
        
        header { padding: 40px 20px 10px; background: linear-gradient(to bottom, #222, #000); }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; }

        .nav-container { display: flex; align-items: center; padding: 15px; gap: 10px; overflow: hidden; }
        .genres-toggle-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        
        .categories-nav { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: #282828; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; }
        .cat-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: #282828; border-radius: 12px; padding: 12px; border: 1px solid #333; align-items: center; }
        .search-box input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 16px; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: var(--card); border-radius: 10px; padding: 12px; position: relative; transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 6px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card p { margin-top: 8px; font-size: 13px; font-weight: bold; height: 35px; overflow: hidden; }
        .api-tag { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); font-size: 8px; padding: 2px 5px; border-radius: 4px; color: var(--primary); }

        .player { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(30,30,30,0.95); backdrop-filter: blur(15px); padding: 12px; border-radius: 12px; border: 1px solid #444; z-index: 1000; }
        .player-controls { display: flex; align-items: center; gap: 12px; }
        .mini-art { width: 45px; height: 45px; border-radius: 5px; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 20px; background: var(--primary); border: none; color: #000; padding: 12px 25px; border-radius: 30px; font-weight: bold; width: fit-content; }
        
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; gap: 15px; }
        .track-info { flex: 1; }
        .track-title { font-weight: bold; font-size: 15px; }
        .track-artist { color: #888; font-size: 12px; }
        .is-playing .track-title { color: var(--sp-green); }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>

    <div class="nav-container">
        <div class="genres-toggle-btn">Gêneros</div>
        <div class="categories-nav" id="catNav"></div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="O que vamos ouvir hoje?">
            <i class="fas fa-search" style="color:var(--primary)" onclick="realizarBuscaManual()"></i>
        </div>
    </div>

    <div id="grid" class="main-grid"></div>

    <footer class="player" id="player" style="display:none;" onclick="abrirAlbum(window.albumAtivoId, window.capaAtiva, window.apiAtiva)">
        <div class="player-controls">
            <img id="playerArt" src="" class="mini-art">
            <div style="flex:1; overflow:hidden;">
                <div id="trackTitle" style="font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</div>
                <div id="timeInfo" style="font-size:11px; color:#aaa;">0:00 / 0:00</div>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" style="background:none; border:none; color:var(--primary); font-size:25px;"><i class="fas fa-play"></i></button>
            <i class="fas fa-step-forward" style="color:white; font-size:20px;" onclick="event.stopPropagation(); proxima();"></i>
        </div>
    </footer>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');
        const playerBar = document.getElementById('player');
        const albumPage = document.getElementById('albumPage');
        const albumDetailContent = document.getElementById('albumDetailContent');
        const searchInput = document.getElementById('searchInput');

        const generos = ["Início", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Brega", "Gospel", "Pop"];
        document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn" onclick="carregarPorGenero('${g}', this)">${g}</button>`).join('');

        function realizarBuscaManual() { carregarPorGenero(searchInput.value); }
        searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') realizarBuscaManual(); });

        async function carregarPorGenero(g, btn) {
            if(btn) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            grid.innerHTML = "<p style='padding:20px;'>Sincronizando...</p>";
            const termo = (g === "Início" || !g) ? "Luiz Gonzaga" : g;
            let html = "";

            try {
                // Busca iTunes
                const resI = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=album&limit=20`).then(r => r.json()).catch(() => ({results:[]}));
                resI.results.forEach(a => {
                    html += `<div class="card" onclick="abrirAlbum('${a.collectionId}', '${a.artworkUrl100.replace('100x100','600x600')}', 'itunes')">
                        <span class="api-tag">iTunes</span><img src="${a.artworkUrl100.replace('100x100','600x600')}"><p>${a.collectionName}</p></div>`;
                });

                // Busca Jamendo
                const resJ = await fetch(`https://api.jamendo.com/v3.0/albums/?client_id=56d30cce&format=json&name=${encodeURIComponent(termo)}&limit=10`).then(r => r.json()).catch(() => ({results:[]}));
                resJ.results.forEach(a => {
                    html += `<div class="card" onclick="abrirAlbum('${a.id}', '${a.image}', 'jamendo')">
                        <span class="api-tag">FULL</span><img src="${a.image}"><p>${a.name}</p></div>`;
                });

                grid.innerHTML = html || "<p style='padding:20px;'>Nenhum resultado encontrado.</p>";
            } catch (e) { grid.innerHTML = "<p>Erro na conexão.</p>"; }
        }

        async function abrirAlbum(id, capa, api) {
            window.albumVisualizadoId = id;
            window.capaAtivaVisualizada = capa;
            window.apiAtivaVisualizada = api;
            albumPage.style.display = 'flex';
            albumDetailContent.innerHTML = "<p style='padding:50px; text-align:center;'>Abrindo álbum...</p>";

            try {
                let faixas = [];
                if(api === 'itunes') {
                    const d = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`).then(r => r.json());
                    faixas = d.results.slice(1).map(m => ({ n: m.trackName, u: m.previewUrl, a: m.artistName }));
                } else {
                    const d = await fetch(`https://api.jamendo.com/v3.0/tracks/?client_id=56d30cce&album_id=${id}`).then(r => r.json());
                    faixas = d.results.map(m => ({ n: m.name, u: m.audio, a: m.artist_name }));
                }

                window.listaVisualizada = faixas;
                albumDetailContent.innerHTML = `
                    <div style="text-align:center; padding:30px; background:linear-gradient(to bottom, #444, #000);">
                        <img src="${capa}" style="width:220px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.8);">
                        <h2 style="margin-top:20px;">Álbum</h2>
                    </div>
                    ${faixas.map((f, i) => `
                        <div class="track-row ${window.musicaIndex === i && window.albumAtivoId === id ? 'is-playing' : ''}" onclick="tocar(${i})">
                            <div class="track-info">
                                <div class="track-title">${f.n}</div>
                                <div class="track-artist">${f.a}</div>
                            </div>
                            <i class="fas fa-play-circle" style="color:var(--primary); font-size:20px;"></i>
                        </div>
                    `).join('')}
                `;
            } catch(e) { albumDetailContent.innerHTML = "<p>Erro ao carregar faixas.</p>"; }
        }

        function tocar(index) {
            window.albumAtivoId = window.albumVisualizadoId;
            window.capaAtiva = window.capaAtivaVisualizada;
            window.apiAtiva = window.apiAtivaVisualizada;
            window.listaTocando = window.listaVisualizada;
            window.musicaIndex = index;

            const musica = window.listaTocando[index];
            audio.src = musica.u;
            audio.play();

            playerBar.style.display = 'block';
            document.getElementById('playerArt').src = window.capaAtiva;
            document.getElementById('trackTitle').innerText = musica.n;
            atualizarBotaoPlay();
        }

        function togglePlay() {
            if(audio.paused) audio.play(); else audio.pause();
            atualizarBotaoPlay();
        }

        function atualizarBotaoPlay() {
            document.getElementById('playBtn').innerHTML = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
        }

        function proxima() {
            if(window.musicaIndex + 1 < window.listaTocando.length) tocar(window.musicaIndex + 1);
        }

        audio.ontimeupdate = () => {
            const duration = audio.duration || 0;
            document.getElementById('timeInfo').innerText = `${formatTime(audio.currentTime)} / ${formatTime(duration)}`;
        };

        function formatTime(s) {
            const min = Math.floor(s / 60); const seg = Math.floor(s % 60);
            return `${min}:${seg < 10 ? '0' : ''}${seg}`;
        }

        function fecharPagina() { albumPage.style.display = 'none'; }

        carregarPorGenero("Início");
    </script>
</body>
</html>
