<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #94b3ce; 
            --bg: #000000; 
            --text-main: #ffffff; 
            --player-bg: rgba(20, 20, 20, 0.95); 
            --playing-color: #ffff00; 
            --active-song: #007bff;
            --gray-card: #1c1c1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }

        header { padding: 25px 20px 10px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; }

        .nav-wrapper { display: flex; align-items: center; padding: 10px 15px; gap: 10px; }
        .genres-main-btn { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 12px; font-weight: bold; white-space: nowrap; }
        .genres-main-btn.active { background: var(--playing-color); color: black; }

        .categories-nav { display: none; overflow-x: auto; gap: 10px; scrollbar-width: none; }
        .cat-btn { background: rgba(40, 40, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); color: #ccc; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; flex-shrink: 0; }
        .cat-btn.selected { background: var(--playing-color); color: black; }

        /* BUSCA COM MICROFONE E X */
        .search-container { padding: 10px 15px; }
        .search-box { 
            display: flex; 
            background: var(--gray-card); 
            border-radius: 12px; 
            align-items: center; 
            padding: 0 12px; 
            gap: 10px;
        }
        .search-box i { color: #888; font-size: 18px; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 12px 0; outline: none; font-size: 16px; }
        .btn-clear { display: none; cursor: pointer; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 180px; }
        .card { width: 47%; background: var(--gray-card); border-radius: 15px; padding: 8px; margin-bottom: 20px; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
        .card p { margin-top: 8px; font-size: 13px; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* PLAYER BAR COM BOTÃO PRÓXIMA */
        .player { 
            position: fixed; bottom: 30px; left: 12px; right: 12px; 
            background: var(--player-bg); border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px; z-index: 10002; transition: transform 0.4s ease;
        }
        .player-hidden { transform: translateY(150px); }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: bold; width: fit-content; }
        
        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .track-actions { display: flex; align-items: center; gap: 30px; }
        .list-play-btn { font-size: 24px; color: white; }
        .list-play-btn.active { color: var(--playing-color) !important; }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>
    
    <div class="nav-wrapper">
        <button class="genres-main-btn" onclick="toggleGenresMenu()" id="mainGenreBtn">Gêneros</button>
        <div class="categories-nav" id="catNav"></div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-microphone" id="micBtn" onclick="iniciarVoz()"></i>
            <input type="text" id="searchInput" placeholder="Buscar música ou artista..." oninput="controlarBotaoLimpar()">
            <i class="fas fa-times-circle btn-clear" id="btnClear" onclick="limparBusca()"></i>
            <i class="fas fa-search" onclick="realizarBusca()"></i>
        </div>
    </div>

    <div id="grid" class="main-grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player" style="display:none;" onclick="abrirNowPlaying()">
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="playerArt" src="" style="width:45px; height:45px; border-radius:8px;">
            <div style="flex:1; overflow:hidden;"><div id="trackTitle" style="font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</div></div>
            <div style="display:flex; align-items:center; gap:20px;">
                <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" style="background:none; border:none; color:var(--playing-color); font-size:26px;"><i class="fas fa-pause"></i></button>
                <button onclick="event.stopPropagation(); proxima();" style="background:none; border:none; color:white; font-size:22px;"><i class="fas fa-step-forward"></i></button>
            </div>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const searchInput = document.getElementById('searchInput');
        const btnClear = document.getElementById('btnClear');
        const playerBar = document.getElementById('player');

        // FUNÇÕES DA BUSCA
        function controlarBotaoLimpar() {
            btnClear.style.display = searchInput.value.length > 0 ? 'block' : 'none';
        }

        function limparBusca() {
            searchInput.value = '';
            controlarBotaoLimpar();
            searchInput.focus();
        }

        function iniciarVoz() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';
            recognition.onresult = (event) => {
                searchInput.value = event.results[0][0].transcript;
                controlarBotaoLimpar();
                carregarPorGenero(searchInput.value);
            };
            recognition.start();
        }

        // GÊNEROS E LISTAGEM
        const listaGeneros = ["Forró", "Sertanejo", "MPB", "Piseiro", "Vaquejada", "Samba"];
        document.getElementById('catNav').innerHTML = listaGeneros.map(g => `<button class="cat-btn" onclick="selecionarGenero(this, '${g}')">${g}</button>`).join('');

        function toggleGenresMenu() {
            const nav = document.getElementById('catNav');
            const btn = document.getElementById('mainGenreBtn');
            const isVisible = nav.style.display === 'flex';
            nav.style.display = isVisible ? 'none' : 'flex';
            btn.classList.toggle('active', !isVisible);
        }

        function selecionarGenero(btn, genero) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            carregarPorGenero(genero);
        }

        async function carregarPorGenero(g) {
            const res = await fetch(`https://itunes.apple.com/search?term=${g}&entity=album&limit=50`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p>${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            document.getElementById('albumPage').style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const songs = data.results.slice(1);
            window.listaVisualizada = songs;
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:35px;"><img src="${art.replace('100x100', '600x600')}" style="width:200px; border-radius:15px;"></div>
                ${songs.map((m, i) => `
                    <div class="track-row">
                        <div style="flex:1;" onclick="tocar('${id}', ${i}, '${art}', true)">
                            <div style="color:white; font-weight:600;">${m.trackName}</div>
                        </div>
                        <div class="track-actions">
                            <i class="fas fa-download" style="color:#444;" onclick="event.stopPropagation(); baixar('${m.previewUrl}')"></i>
                            <i class="fas fa-play-circle list-play-btn" id="btn_list_${i}" onclick="event.stopPropagation(); tocar('${id}', ${i}, '${art}', false)"></i>
                        </div>
                    </div>`).join('')}`;
        }

        function tocar(albumId, index, art, abrirCapa) {
            const m = window.listaVisualizada[index];
            window.musicaIndex = index;
            window.listaTocando = window.listaVisualizada;
            audio.src = m.previewUrl;
            audio.play();
            playerBar.style.display = 'block';
            document.getElementById('playerArt').src = art;
            document.getElementById('trackTitle').innerText = m.trackName;
            atualizarUI();
        }

        function proxima() {
            if (window.musicaIndex < window.listaTocando.length - 1) {
                window.musicaIndex++;
                const m = window.listaTocando[window.musicaIndex];
                audio.src = m.previewUrl;
                audio.play();
                document.getElementById('trackTitle').innerText = m.trackName;
                atualizarUI();
            }
        }

        function atualizarUI() {
            const icon = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            document.getElementById('playBtn').innerHTML = icon;
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarUI(); }
        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }
        
        carregarPorGenero("Luiz Gonzaga");
    </script>
</body>
</html>
