<script>
async function abrirNoSpotify(albumUrl) {
    // albumUrl deve ser o link que você copiou do Spotify
    const albumID = albumUrl.split('album/')[1].split('?')[0];
    const embedUrl = `https://open.spotify.com/embed/album/${albumID}`;

    document.getElementById('albumPage').style.display = 'flex';
    document.getElementById('spotifyPlayer').innerHTML = `
        <iframe src="${embedUrl}" 
                width="100%" height="500" 
                frameborder="0" allowtransparency="true" 
                allow="encrypted-media; clipboard-write"></iframe>
        <p style="text-align:center; color:#1db954; font-size:12px; margin-top:10px;">
            ⚠️ IMPORTANTE: Toque no logo do Spotify dentro do player e faça LOGIN para ouvir as músicas inteiras!
        </p>
    `;
}
</script>
