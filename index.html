<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --playing-color: #ffff00; --active-song: #007bff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; scroll-behavior: smooth; }

        header { padding: 20px; text-align: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo-inox { font-family: 'Great Vibes', cursive; font-size: 40px; background: linear-gradient(to bottom, #cfd8dc, #fff, #90a4ae); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Categorias */
        .nav-container { padding: 10px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .cat-btn { background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 15px 15px 150px; }
        .card { width: 47%; margin-bottom: 20px; background: #121212; padding: 10px; border-radius: 15px; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }

        /* BARRA FLUTUANTE ESTILO CÁPSULA (APPLE MUSIC) */
        .dock-container {
            position: fixed; bottom: 25px; left: 0; right: 0;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            z-index: 10005; transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .dock-item {
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        .btn-home, .btn-search { width: 60px; height: 60px; border-radius: 30px; font-size: 24px; color: #fff; cursor: pointer; }
        
        .player-capsule {
            width: 240px; height: 60px; border-radius: 30px;
            padding: 0 15px; justify-content: flex-start; gap: 10px;
        }
        .mini-art { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        .track-info-mini { flex: 1; overflow: hidden; line-height: 1.2; }
        .track-info-mini b { display: block; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info-mini span { font-size: 11px; opacity: 0.6; }

        .dock-hidden { transform: translateY(120px); opacity: 0; }

        /* Pagina do Album */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; display: none; flex-direction: column; overflow-y: auto; }
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1c1c1e; }
        .track-row.is-playing .track-title { color: var(--active-song) !important; font-weight: bold; }
        .track-row.is-playing .track-play-icon { color: var(--playing-color) !important; }
        .composer-name { font-size: 11px; color: #777; }
        .btn-voltar { margin: 15px; background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; width: fit-content; }

        /* Overlay de Busca */
        #searchOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10010; padding: 20px; }
        .search-input { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #222; color: #fff; margin-top: 50px; }
    </style>
</head>
<body>

    <header><div class="logo-inox">LamoniêFlow</div></header>

    <div class="nav-container" id="catNav"></div>

    <div id="grid" class="main-grid"></div>

    <!-- BARRA FLUTUANTE -->
    <div class="dock-container" id="dock">
        <!-- BOTÃO HOME CORRIGIDO: Agora volta sem parar a música -->
        <div class="dock-item btn-home" onclick="irParaInicio()"><i class="fas fa-home"></i></div>
        
        <div class="dock-item player-capsule" onclick="abrirAlbumAtivo()">
            <img id="playerArt" src="https://via.placeholder.com/40" class="mini-art">
            <div class="track-info-mini">
                <b id="trackTitle">Nenhuma música</b>
                <span id="trackArtist">Selecione para tocar</span>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" style="background:none; border:none; color:#fff; font-size:20px;">
                <i class="fas fa-play"></i>
            </button>
        </div>

        <div class="dock-item btn-search" onclick="toggleSearch()"><i class="fas fa-search"></i></div>
    </div>

    <div id="searchOverlay">
        <button onclick="toggleSearch()" style="color:#fff; background:none; border:none; font-size:20px;">Fechar X</button>
        <input type="text" class="search-input" id="searchInput" placeholder="O que você quer ouvir?" onkeyup="if(event.key==='Enter') buscar(this.value)">
    </div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumContent"></div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const dock = document.getElementById('dock');
        let lastScrollY = window.scrollY;

        // FUNÇÃO DE VOLTAR PARA O INÍCIO SEM RECARREGAR
        function irParaInicio() {
            fecharPagina(); // Fecha a página de álbuns se estiver aberta
            document.getElementById('searchOverlay').style.display = 'none'; // Fecha busca
            window.scrollTo(0, 0); // Rola para o topo do grid original
        }

        window.addEventListener('scroll', () => {
            if (window.scrollY > lastScrollY && window.scrollY > 100) dock.classList.add('dock-hidden');
            else dock.classList.remove('dock-hidden');
            lastScrollY = window.scrollY;
        });

        function toggleSearch() {
            const s = document.getElementById('searchOverlay');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
        }

        function buscar(val) { toggleSearch(); carregarPorGenero(val); }

        const generos = ["Forró", "Vaquejada", "Piseiro", "Sertanejo", "Arrocha", "Pagode", "Gospel", "Pop", "Rock"];
        document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn" onclick="carregarPorGenero('${g}')">${g}</button>`).join('');

        async function carregarPorGenero(g) {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(g)}&entity=album&limit=50`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:10px; font-weight:bold; font-size:13px;">${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            window.albumVisualizadoId = id;
            document.getElementById('albumPage').style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const songs = data.results.slice(1);
            const album = data.results[0];

            document.getElementById('albumContent').innerHTML = `
                <div style="text-align:center; padding:30px;">
                    <img src="${art.replace('100x100', '600x600')}" style="width:200px; border-radius:15px;">
                    <h2 style="margin-top:15px;">${album.collectionName}</h2>
                </div>
                ${songs.map((m, i) => `
                    <div class="track-row" id="row_${id}_${i}" onclick="tocar('${id}', ${i}, '${art}')">
                        <span style="color:#555; width:30px;">${i+1}</span>
                        <div style="flex:1;">
                            <div class="track-title" style="color:#fff;">${m.trackName}</div>
                            <div class="composer-name">${m.artistName}</div>
                        </div>
                        <i class="fas fa-download" style="color:#555; margin-right:20px;" onclick="event.stopPropagation(); baixar('${m.previewUrl}', '${m.trackName}')"></i>
                        <i class="fas fa-play-circle track-play-icon" id="btn_list_${id}_${i}" style="font-size:22px;"></i>
                    </div>
                `).join('')}<div style="height:150px;"></div>`;
            window.listaVisualizada = songs;
            atualizarUI();
        }

        function tocar(albumId, index, art) {
            if (window.albumAtivoId === albumId && window.musicaIndex === index) { togglePlay(); return; }
            window.albumAtivoId = albumId; window.musicaIndex = index;
            window.listaTocando = window.listaVisualizada; window.capaAtiva = art;
            const m = window.listaTocando[index];
            audio.src = m.previewUrl; audio.play();
            
            document.getElementById('playerArt').src = art;
            document.getElementById('trackTitle').innerText = m.trackName;
            document.getElementById('trackArtist').innerText = m.artistName;
            atualizarUI();
        }

        function atualizarUI() {
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('is-playing'));
            document.querySelectorAll('.track-play-icon').forEach(ic => ic.className = 'fas fa-play-circle track-play-icon');

            if (window.albumVisualizadoId === window.albumAtivoId) {
                const row = document.getElementById(`row_${window.albumAtivoId}_${window.musicaIndex}`);
                const icon = document.getElementById(`btn_list_${window.albumAtivoId}_${window.musicaIndex}`);
                if(row) row.classList.add('is-playing');
                if(icon) icon.className = audio.paused ? 'fas fa-play-circle' : 'fas fa-pause-circle';
            }
            document.getElementById('playBtn').innerHTML = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarUI(); }
        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }
        function abrirAlbumAtivo() { if(window.albumAtivoId) abrirAlbum(window.albumAtivoId, window.capaAtiva); }
        async function baixar(url, nome) {
            const res = await fetch(url); const blob = await res.blob();
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = nome + ".mp3"; a.click();
        }

        audio.onplay = atualizarUI; audio.onpause = atualizarUI;
        carregarPorGenero("Forró");
    </script>
</body>
</html>
