<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | LED EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1db954; 
            --bg: #050505; 
            --surface: #121212;
        }

        /* TRAVA DE PINÇA E ROLAGEM LATERAL DO SITE */
        * { 
            box-sizing: border-box; 
            touch-action: manipulation; 
            -webkit-user-select: none; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; /* TRAVA ROLAGEM PARA DIREITA/ESQUERDA NO SITE TODO */
        }

        .bg-animated { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(45deg, #050505, #0a2a0a, #050505, #1a0a2a); 
            background-size: 400% 400%; 
            animation: aurora 10s ease infinite; 
            z-index: -2; 
        }
        @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        @keyframes led-loop {
            0% { border-color: #1db954; box-shadow: 0 0 8px #1db954; }
            33% { border-color: #00d2ff; box-shadow: 0 0 8px #00d2ff; }
            66% { border-color: #ff00ff; box-shadow: 0 0 8px #ff00ff; }
            100% { border-color: #1db954; box-shadow: 0 0 8px #1db954; }
        }

        /* CATEGORIAS - ROLAGEM LATERAL MANTIDA AQUI */
        .categories-nav { 
            display: flex; 
            overflow-x: auto; 
            padding: 15px 20px; 
            gap: 12px; 
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .categories-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: rgba(255,255,255,0.05); 
            border: 2px solid transparent; 
            color: white; padding: 10px 22px; 
            border-radius: 50px; white-space: nowrap; 
            font-size: 13px; font-weight: bold; 
            text-transform: uppercase;
            animation: led-loop 5s linear infinite;
        }
        .cat-btn.active { background: var(--primary); color: black; border-color: var(--primary); }

        .search-box { 
            display: flex; background: rgba(0,0,0,0.6); 
            border-radius: 50px; margin: 0 20px 20px; padding: 5px; 
            border: 2px solid var(--primary);
            animation: led-loop 4s reverse infinite;
        }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; font-size: 16px; width: 100%; }
        .btn-start { background: var(--primary); border: none; color: #000; padding: 0 25px; border-radius: 50px; font-weight: 900; }

        /* GRID DE ÁLBUNS - SÓ ROLA PRA CIMA E BAIXO */
        .main-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 10px 20px 150px; 
            width: 100%;
        }
        
        .card { 
            background: var(--surface); 
            border-radius: 15px; padding: 8px; 
            border: 2px solid transparent;
            animation: led-loop 6s linear infinite;
            width: 100%; /* Ajusta ao tamanho da coluna */
        }
        .card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; }

        .player { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.95); padding: 15px 20px 35px; 
            border-top: 3px solid var(--primary); 
            z-index: 10001; display: none; 
            backdrop-filter: blur(20px);
            animation: led-loop 3s infinite alternate;
        }

        .full-page { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: none; 
            flex-direction: column; overflow-y: auto; 
        }
    </style>
</head>
<body>

    <div class="bg-animated"></div>

    <div id="homePage">
        <header style="padding: 20px 20px 10px;">
            <h1 style="color: var(--primary); margin: 0; font-size: 24px; text-shadow: 0 0 15px var(--primary);">LAMONIÊ FLOW</h1>
        </header>

        <div class="categories-nav">
            <button class="cat-btn active" onclick="search('Lançamentos 2026')">Lançamentos</button>
            <button class="cat-btn" onclick="search('Vaquejada')">Vaquejada</button>
            <button class="cat-btn" onclick="search('Piseiro')">Piseiro</button>
            <button class="cat-btn" onclick="search('Sertanejo')">Sertanejo</button>
            <button class="cat-btn" onclick="search('Arrocha')">Arrocha</button>
            <button class="cat-btn" onclick="search('Forró')">Forró</button>
            <button class="cat-btn" onclick="search('Brega')">Brega</button>
            <button class="cat-btn" onclick="search('Pagode')">Pagode</button>
            <button class="cat-btn" onclick="search('Gospel')">Gospel</button>
            <button class="cat-btn" onclick="search('Funk')">Funk</button>
            <button class="cat-btn" onclick="search('Pop')">Pop</button>
            <button class="cat-btn" onclick="search('Rock')">Rock</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Pesquisar...">
            <button class="btn-start" onclick="search()"><i class="fas fa-search"></i></button>
        </div>

        <div class="main-grid" id="grid"></div>
    </div>

    <div id="albumPage" class="full-page">
        <button style="margin: 15px; background: #222; border: 1px solid var(--primary); color: white; padding: 10px 20px; border-radius: 50px;" onclick="fecharPagina('albumPage')">🔙 VOLTAR</button>
        <div id="albumContent">
             <div class="album-info-box" id="albumHeader"></div>
             <div id="trackListContainer"></div>
        </div>
    </div>

    <footer class="player" id="player">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1; overflow: hidden; margin-right: 10px;">
                <div id="trackTitle" style="font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Música</div>
                <div id="trackArtist" style="font-size: 12px; color: var(--primary);">Artista</div>
            </div>
            <button onclick="togglePlay()" id="playBtn" style="background:white; border:none; width:50px; height:50px; border-radius:50%;"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');

        async function search(q = "") {
            const term = q || document.getElementById('searchInput').value || "Música Brasileira";
            
            // Troca o botão ativo visualmente
            const btns = document.querySelectorAll('.cat-btn');
            btns.forEach(b => b.classList.remove('active'));
            if(q) event.target.classList.add('active');

            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=20&country=BR`);
            const data = await res.json();
            
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4 style="margin:8px 0 2px; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.collectionName}</h4>
                    <p style="color:var(--primary); font-size:10px; margin:0;">${t.artistName}</p>
                </div>
            `).join('');
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            const tracks = data.results.slice(1);

            document.getElementById('albumContent').innerHTML = `
                <div style="padding:20px; text-align:center; background: linear-gradient(to bottom, rgba(29,185,84,0.3), #000);">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:200px; border-radius:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <h2 style="margin:15px 0 5px;">${album.collectionName}</h2>
                    <p style="color:var(--primary); font-weight:bold;">${album.artistName}</p>
                </div>
                <div style="padding:10px;">
                    ${tracks.map((t, i) => `
                        <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #222;" onclick="tocarTrack('${t.trackName.replace(/'/g, "\\'")}', '${t.artistName.replace(/'/g, "\\'")}', '${t.previewUrl}')">
                            <span style="color:var(--primary); width:30px;">${i+1}</span>
                            <div style="flex:1">
                                <div style="font-size:14px;">${t.trackName}</div>
                                <div style="font-size:11px; opacity:0.6;">${t.artistName}</div>
                            </div>
                            <i class="fas fa-play" style="color:var(--primary); font-size:12px;"></i>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function tocarTrack(name, artist, url) {
            audio.src = url;
            audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = name;
            document.getElementById('trackArtist').innerText = artist;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }
        
        search('Lançamentos 2026');
    </script>
</body>
</html>
