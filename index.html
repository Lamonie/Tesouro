<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --player-bg: rgba(25, 25, 25, 0.8); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; }

        header { padding: 25px 15px 10px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; border-bottom: 1px solid #1c1c1e; scrollbar-width: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: #1c1c1e; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 600; flex-shrink: 0; cursor: pointer; }
        .cat-btn.active { background: var(--primary); color: #000; }

        .search-container { padding: 15px; }
        .search-box { display: flex; background: #1c1c1e; border-radius: 12px; border: 1px solid #333; align-items: center; padding: 0 15px; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 14px 0; outline: none; font-size: 14px; }
        
        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 180px; }
        .card { width: 47%; background: #1c1c1e; border-radius: 14px; padding: 8px; margin-bottom: 18px; border: 1px solid #2c2c2e; cursor: pointer; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
        .card h4 { font-size: 12px; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; cursor: pointer; width: fit-content; }
        
        .album-info-box { background: #1c1c1e; margin: 15px; padding: 15px; border-radius: 10px; font-size: 12px; color: #8e8e93; line-height: 1.5; text-align: center; }

        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #1c1c1e; cursor: pointer; }
        .track-row.playing .track-title { color: var(--primary) !important; font-weight: bold; }
        .track-play-icon { color: #48484a; font-size: 20px; margin-left: auto; }
        .track-row.playing .track-play-icon { color: var(--primary) !important; }

        .player { position: fixed; bottom: 0; width: 100%; background: var(--player-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 5px 15px 35px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 10001; }
        .player-controls { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .play-trigger { background: var(--primary); border: none; width: 50px; height: 50px; border-radius: 50%; color: #000; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #timeLabel { font-size: 11px; color: var(--primary); min-width: 80px; text-align: center; font-family: monospace; }
    </style>
</head>
<body>
    <header><h1>LAMONIÊ FLOW</h1></header>
    
    <div class="categories-nav" id="catNav">
        </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar álbum, artista ou gênero..." onkeydown="if(event.key==='Enter') carregarAlbuns(this.value)">
            <i class="fas fa-microphone" style="color:var(--primary); margin-right:15px;"></i>
            <i class="fas fa-search" style="color:var(--primary); cursor:pointer;" onclick="carregarAlbuns(document.getElementById('searchInput').value)"></i>
        </div>
    </div>

    <div class="main-grid" id="grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player" style="display:none;">
        <div class="player-controls">
            <div style="flex:1; overflow:hidden;">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:12px; color:var(--primary);">Artista</p>
            </div>
            <span id="timeLabel">0:00 / 0:30</span>
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="fas fa-random" style="color:#8e8e93; font-size:14px;"></i>
                <i class="fas fa-redo" style="color:#8e8e93; font-size:14px;"></i>
                <button onclick="togglePlay()" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
            </div>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');
        const generos = ["Início", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "MPB", "Gospel", "Pop", "Rock", "Axé", "Samba"];
        const artistasForro = "Luiz Gonzaga, Flávio José, Noca do Acordeon, Trio Nordestino, Gaviões do Forró, Mastruz com Leite, Dorgival Dantas, Limão com Mel, Toca do Vale, Gleydson Gavião";
        
        let listaAtual = [];

        function montarMenu() {
            const catNav = document.getElementById('catNav');
            catNav.innerHTML = generos.map(g => 
                `<button class="cat-btn ${g==='Início'?'active':''}" onclick="mudarGenero(this, '${g}')">${g}</button>`
            ).join('');
        }

        function mudarGenero(btn, genero) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            carregarAlbuns(genero);
        }

        async function carregarAlbuns(termo = "") {
            grid.innerHTML = "<p style='padding:20px; color:var(--primary)'>Carregando sucessos...</p>";
            
            // Se for Início ou vazio, carrega os 500 de forró
            let query = (termo === "" || termo === "Início") ? artistasForro : termo;
            
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=200&country=br`);
                const data = await res.json();
                
                if(data.results.length === 0) {
                    grid.innerHTML = "<p style='padding:20px;'>Nenhum álbum encontrado.</p>";
                    return;
                }

                grid.innerHTML = data.results.map(t => `
                    <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                        <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                        <h4>${t.collectionName}</h4>
                    </div>
                `).join('');
            } catch (e) {
                grid.innerHTML = "<p style='padding:20px;'>Erro de conexão.</p>";
            }
        }

        async function abrirAlbum(id) {
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            listaAtual = data.results.slice(1);
            
            document.getElementById('albumPage').style.display = 'flex';
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:220px; border-radius:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <h2 style="margin-top:20px; font-size:20px;">${album.collectionName}</h2>
                    <p style="color:var(--primary); font-weight:bold;">${album.artistName}</p>
                </div>
                <div class="album-info-box">
                    Lançamento: ${new Date(album.releaseDate).getFullYear()} | Gênero: ${album.primaryGenreName}
                </div>
                ${listaAtual.map((m, i) => `
                    <div class="track-row" id="track_${i}" onclick="tocar(${i})">
                        <span style="color:#48484a; width:30px;">${i+1}</span>
                        <div style="flex:1;">
                            <div class="track-title" style="color:white; font-size:14px;">${m.trackName}</div>
                            <div style="font-size:11px; color:#8e8e93;">${m.artistName}</div>
                        </div>
                        <i class="fas fa-play-circle track-play-icon"></i>
                    </div>
                `).join('')}
                <div style="height:150px;"></div>
            `;
        }

        function tocar(index) {
            const m = listaAtual[index];
            audio.src = m.previewUrl;
            audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = m.trackName;
            document.getElementById('trackArtist').innerText = m.artistName;
            
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('playing'));
            document.getElementById(`track_${index}`).classList.add('playing');
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) {
                audio.play();
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        audio.ontimeupdate = () => {
            const cur = Math.floor(audio.currentTime);
            const dur = Math.floor(audio.duration) || 30;
            document.getElementById('timeLabel').innerText = `0:${cur < 10 ? '0' : ''}${cur} / 0:${dur}`;
        };

        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }

        // Inicialização
        montarMenu();
        carregarAlbuns("Início");
    </script>
</body>
</html>
