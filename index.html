<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | PRO EXPERIENCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff88; 
            --accent: #60efff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        /* RESET PROFISSIONAL - BLOQUEIA PINÇA, LIBERA ROLAGEM */
        * { 
            box-sizing: border-box; 
            -webkit-user-select: none;
            touch-action: pan-x pan-y; /* Permite scroll X e Y, bloqueia pinch-zoom */
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            color: white;
            overflow: hidden; /* O container interno controlará a rolagem */
        }

        /* FUNDO DEGRADÊ ANIMADO (PALCO/FESTA) */
        .bg-pro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientAnim 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stage-lights {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(0, 255, 136, 0.15), transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* CONTAINER DE ROLAGEM PRINCIPAL */
        .scroll-container {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        header { padding: 30px 20px 10px; text-align: center; }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin: 0; color: #fff; }
        .logo span { color: var(--primary); text-shadow: 0 0 15px rgba(0, 255, 136, 0.5); }

        /* GÊNEROS (TEXTO LIMPO) */
        .nav-genres { 
            display: flex; overflow-x: auto; padding: 15px 20px; gap: 12px; 
            scrollbar-width: none;
        }
        .nav-genres::-webkit-scrollbar { display: none; }
        .genre-item { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 10px 25px; border-radius: 50px; 
            white-space: nowrap; font-size: 13px; font-weight: 700; 
            text-transform: uppercase; transition: 0.3s; cursor: pointer;
        }
        .genre-item.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* BUSCA */
        .search-area { padding: 10px 20px; }
        .search-bar { 
            display: flex; background: rgba(255,255,255,0.07); 
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); padding: 5px;
            backdrop-filter: blur(10px);
        }
        .search-bar input { background: none; border: none; color: white; flex: 1; padding: 12px 15px; outline: none; font-size: 15px; }
        .btn-search { background: var(--primary); border: none; color: #000; padding: 0 25px; border-radius: 50px; font-weight: 800; }

        /* GRID DE ÁLBUNS */
        .album-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            padding: 20px; padding-bottom: 150px;
        }
        .album-card { 
            background: rgba(255,255,255,0.03); border-radius: 20px; padding: 12px; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            position: relative;
        }
        .album-card img { width: 100%; border-radius: 15px; aspect-ratio: 1/1; object-fit: cover; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .album-card h3 { font-size: 14px; margin: 12px 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .album-card p { font-size: 11px; color: var(--primary); margin: 0; font-weight: 600; }

        /* TELAS FULL PAGE */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #080808; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-back { margin: 20px; background: var(--primary); border: none; padding: 12px 25px; border-radius: 50px; font-weight: 800; color: #000; width: fit-content; }

        /* PLAYER */
        .player-bar { 
            position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 15, 0.95); 
            backdrop-filter: blur(20px); padding: 15px 20px; border-top: 1px solid var(--primary); 
            z-index: 10000; display: none;
        }
        #progress { position: absolute; top: 0; left: 0; height: 3px; background: var(--primary); width: 0%; transition: 0.1s; }

        /* BOTÃO COPIAR */
        .btn-copy { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #444; padding: 5px 10px; border-radius: 5px; font-size: 10px; z-index: 100001; }
    </style>
</head>
<body>

    <button class="btn-copy" onclick="copyAll()">COPIAR TUDO</button>

    <div class="bg-pro"></div>
    <div class="stage-lights"></div>

    <div class="scroll-container">
        <header>
            <h1 class="logo">LAMONIÊ <span>FLOW</span></h1>
        </header>

        <div class="nav-genres">
            <div class="genre-item active" onclick="loadFamous2025()">Destaques 2025</div>
            <div class="genre-item" onclick="search('Vaquejada 2025')">Vaquejada</div>
            <div class="genre-item" onclick="search('Piseiro 2025')">Piseiro</div>
            <div class="genre-item" onclick="search('Sertanejo 2025')">Sertanejo</div>
            <div class="genre-item" onclick="search('Pagode 2025')">Pagode</div>
            <div class="genre-item" onclick="search('Forró 2025')">Forró</div>
        </div>

        <div class="search-area">
            <div class="search-bar">
                <input type="text" id="mainSearch" placeholder="Artista, álbum ou música...">
                <button class="btn-search" onclick="search()">BUSCAR</button>
            </div>
        </div>

        <div class="album-grid" id="mainGrid"></div>
    </div>

    <div id="artistPage" class="full-page">
        <button class="btn-back" onclick="closePage('artistPage')"><i class="fas fa-arrow-left"></i> VOLTAR</button>
        <h1 id="artistNameDisplay" style="padding: 0 20px; margin: 0;"></h1>
        <div class="album-grid" id="artistAlbumsGrid"></div>
    </div>

    <footer class="player-bar" id="player">
        <div id="progress"></div>
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div style="flex: 1; overflow: hidden;">
                <div id="pTitle" style="font-weight: 800; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
                <div id="pArtist" style="font-size: 11px; color: var(--primary);"></div>
            </div>
            <button onclick="toggle()" id="pBtn" style="background:white; border:none; width:45px; height:45px; border-radius:50%; margin-left:15px;"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        const pBtn = document.getElementById('pBtn');

        function copyAll() {
            const el = document.createElement('textarea');
            el.value = document.documentElement.outerHTML;
            document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            alert('Código Pro Copiado!');
        }

        async function loadFamous2025() {
            search("Top Albums 2025");
        }

        async function search(query = "") {
            const term = query || document.getElementById('mainSearch').value || "2025";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=20&country=BR`);
            const data = await res.json();
            
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = data.results.map(a => `
                <div class="album-card" onclick="openArtist('${a.artistName}', '${a.artistId}')">
                    <img src="${a.artworkUrl100.replace('100x100', '600x600')}">
                    <h3>${a.collectionName}</h3>
                    <p>${a.artistName}</p>
                </div>
            `).join('');
        }

        async function openArtist(name, id) {
            document.getElementById('artistPage').style.display = 'flex';
            document.getElementById('artistNameDisplay').innerText = name;
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=album&limit=20`);
            const data = await res.json();
            
            document.getElementById('artistAlbumsGrid').innerHTML = data.results.slice(1).map(a => `
                <div class="album-card" onclick="playPreview('${a.collectionId}')">
                    <img src="${a.artworkUrl100.replace('100x100', '600x600')}">
                    <h3>${a.collectionName}</h3>
                    <p>Tocar Álbum</p>
                </div>
            `).join('');
        }

        async function playPreview(albumId) {
            const res = await fetch(`https://itunes.apple.com/lookup?id=${albumId}&entity=song&limit=1`);
            const data = await res.json();
            const song = data.results[1];
            if(song) {
                audio.src = song.previewUrl;
                audio.play();
                document.getElementById('player').style.display = 'block';
                document.getElementById('pTitle').innerText = song.trackName;
                document.getElementById('pArtist').innerText = song.artistName;
                pBtn.innerHTML = '<i class="fas fa-pause"></i>';
            }
        }

        function toggle() {
            if(audio.paused) { audio.play(); pBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); pBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function closePage(id) { document.getElementById(id).style.display = 'none'; }

        audio.ontimeupdate = () => {
            const per = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress').style.width = per + "%";
        };

        // Bloqueio de Pinça via JS para garantir
        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

        loadFamous2025();
    </script>
</body>
</html>
