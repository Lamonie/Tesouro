<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --spotify-green: #1DB954; --bg-black: #121212; --card-gray: #181818; --text-white: #FFFFFF; --text-gray: #B3B3B3; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Circular Std', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: var(--text-white); padding-bottom: 120px; }

        /* Estilo da Header das fotos */
        header { padding: 20px; background: linear-gradient(to bottom, #222, #000); }
        header h1 { font-size: 28px; font-weight: 900; letter-spacing: -1px; }

        /* Barra de Busca identica à foto */
        .search-container { padding: 0 15px 20px; }
        .search-bar { background: #282828; border-radius: 8px; display: flex; align-items: center; padding: 12px 15px; }
        .search-bar input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 14px; }
        .search-bar i { color: var(--text-gray); margin-right: 10px; }

        /* Botões de Gêneros */
        .nav-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 0 15px 20px; scrollbar-width: none; }
        .nav-btn { background: #282828; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; white-space: nowrap; }
        .nav-btn.active { background: var(--spotify-green); color: black; }

        /* Grade de Álbuns */
        .album-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .album-card { background: var(--card-gray); padding: 15px; border-radius: 8px; transition: 0.3s; }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); margin-bottom: 12px; }
        .album-card h3 { font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .album-card p { font-size: 12px; color: var(--text-gray); }

        /* Player Flutuante */
        .mini-player { position: fixed; bottom: 80px; left: 10px; right: 10px; background: #282828; border-radius: 8px; padding: 10px; display: none; align-items: center; gap: 12px; z-index: 1000; }
        .mini-player img { width: 45px; height: 45px; border-radius: 4px; }
        .mini-player-info { flex: 1; overflow: hidden; }
        .mini-player-info h4 { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-player-info p { font-size: 11px; color: var(--text-gray); }

        /* Menu Inferior das fotos */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { color: var(--text-gray); text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item i { font-size: 20px; margin-bottom: 5px; display: block; }
        .nav-item.active { color: white; }

        /* Página de Músicas */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #444, #121212); z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .track-item { display: flex; align-items: center; padding: 15px 20px; gap: 15px; }
        .track-name { font-weight: bold; font-size: 15px; }
        .track-artist { color: var(--text-gray); font-size: 13px; }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="mainSearch" placeholder="Encontrar nesta página" onkeypress="handleSearch(event)">
        </div>
    </div>

    <div class="nav-scroll" id="genreNav"></div>

    <div class="album-grid" id="mainGrid"></div>

    <div class="mini-player" id="player">
        <img id="playerImg" src="">
        <div class="mini-player-info">
            <h4 id="playerTitle">Título</h4>
            <p id="playerArtist">Artista</p>
        </div>
        <i class="fas fa-play" id="playIcon" style="font-size: 24px; padding-right: 10px;" onclick="togglePlay()"></i>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i>Início</div>
        <div class="nav-item"><i class="fas fa-search"></i>Buscar</div>
        <div class="nav-item"><i class="fas fa-book"></i>Sua Biblioteca</div>
        <div class="nav-item"><i class="fas fa-plus-square"></i>Criar</div>
    </nav>

    <div id="albumPage" class="full-page">
        <div style="padding: 20px;" onclick="closeAlbum()"><i class="fas fa-chevron-down"></i></div>
        <div id="albumHeader" style="text-align: center; padding: 20px;"></div>
        <div id="trackList"></div>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        const grid = document.getElementById('mainGrid');
        const genres = ["Tudo", "Sertanejo", "Forró", "Vaquejada", "Piseiro", "Gospel"];

        // Gerar Botões de Gênero
        document.getElementById('genreNav').innerHTML = genres.map(g => 
            `<button class="nav-btn ${g==='Tudo'?'active':''}" onclick="search('${g}', this)">${g}</button>`
        ).join('');

        function handleSearch(e) { if(e.key === 'Enter') search(e.target.value); }

        async function search(query, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            grid.innerHTML = "<p style='padding:20px;'>Carregando...</p>";
            const q = query === "Tudo" ? "Potência Sertaneja" : query;
            
            try {
                // Busca no iTunes (Estilo as fotos que mandou)
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=album&limit=20`);
                const data = await res.json();
                
                grid.innerHTML = data.results.map(a => `
                    <div class="album-card" onclick="openAlbum('${a.collectionId}', '${a.artworkUrl100.replace('100x100','600x600')}', '${a.collectionName}')">
                        <img src="${a.artworkUrl100.replace('100x100','600x600')}">
                        <h3>${a.collectionName}</h3>
                        <p>${a.artistName}</p>
                    </div>
                `).join('');
            } catch(e) { grid.innerHTML = "<p>Erro ao conectar. Tente novamente.</p>"; }
        }

        async function openAlbum(id, img, title) {
            const page = document.getElementById('albumPage');
            page.style.display = 'flex';
            document.getElementById('albumHeader').innerHTML = `<img src="${img}" style="width:200px; border-radius:8px; margin-bottom:15px;"><h2>${title}</h2>`;
            
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const tracks = data.results.slice(1);

            document.getElementById('trackList').innerHTML = tracks.map(t => `
                <div class="track-item" onclick="play('${t.previewUrl}', '${t.trackName}', '${t.artistName}', '${img}')">
                    <div style="flex:1">
                        <div class="track-name">${t.trackName}</div>
                        <div class="track-artist">${t.artistName}</div>
                    </div>
                    <i class="fas fa-ellipsis-h"></i>
                </div>
            `).join('');
        }

        function play(url, title, artist, img) {
            audio.src = url; audio.play();
            document.getElementById('player').style.display = 'flex';
            document.getElementById('playerImg').src = img;
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('playerArtist').innerText = artist;
            document.getElementById('playIcon').className = 'fas fa-pause';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playIcon').className = 'fas fa-pause'; }
            else { audio.pause(); document.getElementById('playIcon').className = 'fas fa-play'; }
        }

        function closeAlbum() { document.getElementById('albumPage').style.display = 'none'; }

        // Inicializa com o Sertanejo das suas fotos
        search("Tudo");
    </script>
</body>
</html>
