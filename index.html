<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --player-bg: rgba(30, 30, 30, 0.85); --playing-color: #ffff00; --active-song: #007bff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000000; color: var(--text-main); font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 30px 20px 15px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { color: var(--primary); font-size: 28px; font-weight: 900; }

        .categories-nav { display: flex; overflow-x: auto; padding: 15px; gap: 12px; }
        .cat-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 12px 25px; border-radius: 25px; font-size: 14px; font-weight: 600; flex-shrink: 0; }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: rgba(255, 255, 255, 0.07); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); align-items: center; padding: 0 15px; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 15px 10px; outline: none; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 180px; }
        .card { width: 47%; background: rgba(255,255,255,0.04); border-radius: 15px; padding: 8px; margin-bottom: 20px; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; }

        .player { position: fixed; bottom: 35px; left: 15px; right: 15px; background: var(--player-bg); backdrop-filter: blur(25px); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 10002; transition: transform 0.4s ease, opacity 0.4s; }
        .player-hidden { transform: translateY(120px); opacity: 0; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: bold; width: fit-content; }
        
        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .track-row.is-playing .track-title { color: var(--active-song) !important; font-weight: bold; }
        .track-actions { display: flex; align-items: center; gap: 35px; margin-left: 10px; }
        
        /* ESTILO DO BOTÃO DE PLAY NA LISTA */
        .list-play-btn { font-size: 22px; color: white; transition: color 0.3s; }
        .list-play-btn.active { color: var(--playing-color) !important; }

        .np-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .np-art { width: 85%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; }
        .np-controls { display: flex; align-items: center; gap: 25px; margin-top: 20px; }
        .np-btn { background: none; border: none; color: white; font-size: 24px; }
        .btn-active { color: var(--playing-color) !important; }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>
    <div class="categories-nav" id="catNav"></div>
    <div class="search-container"><div class="search-box"><input type="text" id="searchInput" placeholder="Buscar..."><i class="fas fa-search"></i></div></div>
    <div id="grid" class="main-grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <div id="nowPlayingPage" class="full-page" style="background: linear-gradient(to bottom, #151515, #000);">
        <button class="btn-voltar" onclick="fecharNowPlaying()">↓ VOLTAR</button>
        <div class="np-container">
            <img id="npArt" class="np-art" src="">
            <div id="npTitle" style="font-size:20px; margin-top:20px;">Música</div>
            <div id="npArtist" style="color:var(--active-song);">Artista</div>
            <div class="np-controls">
                <button class="np-btn" id="shuffleBtn" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
                <button class="np-btn" onclick="anterior()"><i class="fas fa-backward"></i></button>
                <button class="np-btn" style="font-size:55px;" onclick="togglePlay()" id="npPlayBtn"><i class="fas fa-pause"></i></button>
                <button class="np-btn" onclick="proxima()"><i class="fas fa-forward"></i></button>
                <button class="np-btn" id="repeatBtn" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
            </div>
        </div>
    </div>

    <footer class="player" id="player" style="display:none;" onclick="abrirNowPlaying()">
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="playerArt" src="" style="width:45px; height:45px; border-radius:8px;">
            <div style="flex:1;"><div id="trackTitle" style="font-weight:bold; font-size:14px;">Música</div></div>
            <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" style="background:none; border:none; color:var(--playing-color); font-size:26px;"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const playerBar = document.getElementById('player');
        const albumPage = document.getElementById('albumPage');
        const nowPlayingPage = document.getElementById('nowPlayingPage');
        let isShuffle = false, isRepeat = false;

        let lastScrollY = 0;
        function handleScroll(target) {
            const current = target.scrollTop || window.scrollY;
            if (current > lastScrollY && current > 50) playerBar.classList.add('player-hidden');
            else playerBar.classList.remove('player-hidden');
            lastScrollY = current;
        }
        window.addEventListener('scroll', () => handleScroll(window));
        albumPage.addEventListener('scroll', () => handleScroll(albumPage));

        async function carregarPorGenero(g) {
            const res = await fetch(`https://itunes.apple.com/search?term=${g}&entity=album&limit=50`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:10px; font-weight:bold; font-size:13px;">${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            albumPage.style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const songs = data.results.slice(1);
            window.listaVisualizada = songs;
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:30px;"><img src="${art.replace('100x100', '600x600')}" style="width:200px; border-radius:15px;"></div>
                ${songs.map((m, i) => `
                    <div class="track-row" id="row_${id}_${i}">
                        <div style="flex:1;" onclick="tocar('${id}', ${i}, '${art}', true)">
                            <div class="track-title" style="font-size:14px; color:white;">${m.trackName}</div>
                        </div>
                        <div class="track-actions">
                            <i class="fas fa-download" style="color:#666; font-size:18px;" onclick="event.stopPropagation(); baixar('${m.previewUrl}')"></i>
                            <i class="fas fa-play-circle list-play-btn" id="btn_list_${i}" onclick="event.stopPropagation(); tocar('${id}', ${i}, '${art}', false)"></i>
                        </div>
                    </div>`).join('')}`;
        }

        function tocar(albumId, index, art, abrirCapa) {
            const m = window.listaVisualizada[index];
            if (window.musicaIndex === index && window.albumAtivoId === albumId) {
                togglePlay();
            } else {
                window.albumAtivoId = albumId; window.musicaIndex = index;
                window.listaTocando = window.listaVisualizada; window.capaAtiva = art;
                audio.src = m.previewUrl; audio.play();
                playerBar.style.display = 'block';
                document.getElementById('playerArt').src = art;
                document.getElementById('trackTitle').innerText = m.trackName;
            }
            if (abrirCapa) abrirNowPlaying();
            atualizarUI();
        }

        function atualizarUI() {
            document.querySelectorAll('.list-play-btn').forEach((btn, i) => {
                if (i === window.musicaIndex) {
                    btn.className = audio.paused ? 'fas fa-play-circle list-play-btn' : 'fas fa-pause-circle list-play-btn active';
                } else {
                    btn.className = 'fas fa-play-circle list-play-btn';
                }
            });
            const mainIcon = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            document.getElementById('playBtn').innerHTML = mainIcon;
            document.getElementById('npPlayBtn').innerHTML = mainIcon;
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarUI(); }
        function abrirNowPlaying() {
            const m = window.listaTocando[window.musicaIndex];
            document.getElementById('npArt').src = window.capaAtiva.replace('100x100', '600x600');
            document.getElementById('npTitle').innerText = m.trackName;
            document.getElementById('npArtist').innerText = m.artistName;
            nowPlayingPage.style.display = 'flex';
        }
        function fecharNowPlaying() { nowPlayingPage.style.display = 'none'; }
        function fecharPagina() { albumPage.style.display = 'none'; }
        
        async function baixar(u) { const r = await fetch(u); const b = await r.blob(); const l = document.createElement('a'); l.href = window.URL.createObjectURL(b); l.download = 'musica.mp3'; l.click(); }

        carregarPorGenero("Luiz Gonzaga");
    </script>
</body>
</html>
