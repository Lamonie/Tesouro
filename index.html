<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* FUNDO ANIMADO */
        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f0c29, #302b63, #1db95415, #24243e);
            background-size: 400% 400%; animation: gradientMove 12s ease infinite; z-index: -1;
        }
        @keyframes gradientMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* NOME 3D ANIMADO */
        .brand-3d {
            font-size: 28px; font-weight: 900; text-align: center; padding: 15px;
            text-transform: uppercase; letter-spacing: 3px;
            color: #fff; text-shadow: 0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0,0,0,.15);
            animation: rainbow 5s linear infinite;
        }
        @keyframes rainbow {
            0%, 100% { color: #1db954; }
            25% { color: #ff0055; }
            50% { color: #00d4ff; }
            75% { color: #ffcc00; }
        }

        header { padding: 10px 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); }
        .search-box {
            background: #222; padding: 10px 15px; border-radius: 50px;
            display: flex; align-items: center; border: 1px solid #333;
        }
        .search-box input { background: none; border: none; color: white; flex: 1; outline: none; margin: 0 10px; }
        .btn-search { background: var(--primary); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        main { flex: 1; overflow-y: auto; padding: 20px; height: calc(100vh - 250px); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; text-align: center; transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; }
        .card.active { border: 2px solid var(--primary); background: rgba(29, 185, 84, 0.1); }

        /* PLAYER */
        footer {
            position: fixed; bottom: 0; width: 100%; background: #000;
            padding: 15px 20px; border-top: 1px solid #222;
        }
        .progress-container { width: 100%; margin-bottom: 10px; }
        .bar-bg { width: 100%; height: 5px; background: #333; border-radius: 10px; cursor: pointer; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; }
        .time { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-top: 5px; }

        .controls { display: flex; align-items: center; justify-content: space-around; max-width: 500px; margin: 0 auto; }
        .btn-p { background: none; border: none; color: white; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .btn-p.active { color: var(--primary); }
        .play-btn { background: white; color: black; width: 50px; height: 50px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div class="brand-3d">LAMONIÊ FLOW</div>

    <header>
        <div class="search-box">
            <i class="fas fa-search" style="color:#888"></i>
            <input type="text" id="inSearch" placeholder="Artista, música ou álbum...">
            <button class="btn-search" onclick="buscar()">BUSCAR</button>
        </div>
    </header>

    <main>
        <div class="grid" id="grid"></div>
    </main>

    <footer>
        <div id="player-info" style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
            <img src="" id="p-img" style="width:40px; height:40px; border-radius:4px; display:none">
            <div style="overflow:hidden"><b id="p-title" style="font-size:14px"></b></div>
        </div>

        <div class="progress-container">
            <div class="bar-bg" id="seek"><div class="bar-fill" id="fill"></div></div>
            <div class="time"><span id="t-start">0:00</span><span id="t-end">-0:00</span></div>
        </div>

        <div class="controls">
            <button class="btn-p" id="shuffle" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
            <button class="btn-p" onclick="pular(-1)"><i class="fas fa-step-backward"></i></button>
            <button class="btn-p play-btn" onclick="togglePlay()"><i class="fas fa-play" id="icon-p"></i></button>
            <button class="btn-p" onclick="pular(1)"><i class="fas fa-step-forward"></i></button>
            <button class="btn-p" id="repeat" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
        </div>
    </footer>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        let listaMusicas = [];
        let indexAtual = 0;
        let isShuffle = false;
        let isRepeat = false;

        async function buscar() {
            const termo = document.getElementById('inSearch').value || "Gleydson Gavião";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=song&limit=50&country=BR`);
            const data = await res.json();
            listaMusicas = data.results;
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            listaMusicas.forEach((m, i) => {
                const ano = new Date(m.releaseDate).getFullYear();
                grid.innerHTML += `
                    <div class="card ${indexAtual === i ? 'active' : ''}" onclick="tocar(${i})">
                        <img src="${m.artworkUrl100.replace('100x100', '400x400')}">
                        <h3 style="font-size:12px; margin-top:8px">${m.trackName}</h3>
                        <p style="font-size:10px; color:#888">${ano}</p>
                    </div>`;
            });
        }

        function tocar(i) {
            indexAtual = i;
            const m = listaMusicas[i];
            document.getElementById('p-img').src = m.artworkUrl100;
            document.getElementById('p-img').style.display = "block";
            document.getElementById('p-title').innerText = m.trackName;
            
            audio.src = m.previewUrl;
            audio.play();
            document.getElementById('icon-p').className = "fas fa-pause";
            render();
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('icon-p').className = "fas fa-pause"; }
            else { audio.pause(); document.getElementById('icon-p').className = "fas fa-play"; }
        }

        function pular(dir) {
            if(isShuffle && dir > 0) indexAtual = Math.floor(Math.random() * listaMusicas.length);
            else indexAtual = (indexAtual + dir + listaMusicas.length) % listaMusicas.length;
            tocar(indexAtual);
        }

        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuffle').classList.toggle('active'); }
        function toggleRepeat() { isRepeat = !isRepeat; document.getElementById('repeat').classList.toggle('active'); }

        audio.onended = () => { if(isRepeat) audio.play(); else pular(1); };

        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('fill').style.width = perc + "%";
            document.getElementById('t-start').innerText = formatTime(audio.currentTime);
            if(audio.duration) document.getElementById('t-end').innerText = "-" + formatTime(audio.duration - audio.currentTime);
        };

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const seg = Math.floor(s % 60).toString().padStart(2, '0');
            return `${m}:${seg}`;
        }

        buscar();
    </script>
</body>
</html>
