<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --player-bg: rgba(35, 35, 35, 0.98); --playing-color: #ffff00; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; }
        
        header { padding: 25px 15px 10px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        .search-container { padding: 15px; }
        .search-box { display: flex; background: #1c1c1e; border-radius: 12px; border: 1px solid #333; align-items: center; position: relative; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 14px; outline: none; font-size: 14px; }
        
        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 160px; }
        .card { width: 47%; background: #1c1c1e; border-radius: 14px; padding: 8px; margin-bottom: 18px; border: 1px solid #2c2c2e; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }

        /* BARRA APPLE MUSIC - SEM LIKES */
        .player { 
            position: fixed; bottom: 30px; left: 10px; right: 10px; 
            background: var(--player-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); 
            padding: 10px 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); 
            z-index: 10001; transition: opacity 0.3s ease, transform 0.3s ease; box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            cursor: pointer;
        }
        .player.scrolling { opacity: 0; transform: translateY(20px); pointer-events: none; }

        .player-controls { display: flex; align-items: center; gap: 12px; }
        .mini-art { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .time-display { font-size: 10px; color: #8e8e93; font-family: monospace; margin-top: 2px; }
        .play-trigger { background: none; border: none; color: var(--playing-color); font-size: 24px; cursor: pointer; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; cursor: pointer; width: fit-content; }
        
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1c1c1e; }
        .track-row.playing .track-title { color: #007bff !important; font-weight: bold; } /* Nome em Azul */
        .track-row.playing .track-play-icon { color: var(--playing-color) !important; } /* Play em Amarelo */
        
        .track-play-icon { font-size: 20px; color: #48484a; margin-left: auto; }
        .download-btn { color: #8e8e93; font-size: 18px; padding: 10px; margin-left: 10px; cursor: pointer; }

        .album-meta { background: #1c1c1e; margin: 10px 15px; padding: 15px; border-radius: 12px; font-size: 12px; color: #8e8e93; text-align: center; border: 1px solid #2c2c2e; }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>
    <div class="search-container"><div class="search-box"><input type="text" placeholder="Buscar álbum ou artista..."></div></div>
    <div id="grid" class="main-grid"></div>

    <footer class="player" id="player" style="display:none;" onclick="voltarParaAlbumAtivo()">
        <div class="player-controls">
            <img id="playerArt" src="" class="mini-art">
            <div style="flex:1; overflow:hidden;">
                <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:bold; font-size:14px;" id="trackTitle">Música</div>
                <div id="timeInfo" class="time-display">0:00 / 0:00</div>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
            <i class="fas fa-step-forward" style="color:white; font-size:20px; margin-left:5px;" onclick="event.stopPropagation(); proxima();"></i>
        </div>
    </footer>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const playerBar = document.getElementById('player');
        let scrollTimeout;

        // Barra some ao rolar
        window.addEventListener('scroll', () => {
            playerBar.classList.add('scrolling');
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                playerBar.classList.remove('scrolling');
            }, 600);
        });

        // Tempo e progresso
        audio.ontimeupdate = () => {
            const current = formatTime(audio.currentTime);
            const duration = formatTime(audio.duration || 0);
            document.getElementById('timeInfo').innerText = `${current} / ${duration}`;
            atualizarUI();
        };

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const seg = Math.floor(s % 60);
            return `${min}:${seg < 10 ? '0' : ''}${seg}`;
        }

        // Voltar para o álbum ao clicar na barra
        function voltarParaAlbumAtivo() {
            if (window.albumAtivoId) {
                document.getElementById('albumPage').style.display = 'flex';
            }
        }

        async function carregarAlbuns(tema = "Luiz Gonzaga") {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(tema)}&entity=album&limit=20`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:8px; font-weight:bold; font-size:12px; color:#fff;">${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            window.albumAtivoId = id;
            document.getElementById('albumPage').style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            const songs = data.results.slice(1);
            window.listaAtual = songs;
            window.capaAtual = art;

            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <img src="${art.replace('100x100', '500x500')}" style="width:200px; border-radius:12px;">
                    <h2 style="margin-top:15px;">${album.collectionName}</h2>
                    <p style="color:var(--primary);">${album.artistName}</p>
                </div>
                <div class="album-meta">
                    <b>Ano:</b> ${new Date(album.releaseDate).getFullYear()} | <b>Gênero:</b> ${album.primaryGenreName}<br>
                    <b>Gravadora:</b> ${album.copyright || "Original"}
                </div>
                ${songs.map((m, i) => `
                    <div class="track-row" id="track_${i}" onclick="tocar(${i})">
                        <span style="color:#444; width:20px; font-size:12px;">${i+1}</span>
                        <div style="flex:1; margin-left:10px;">
                            <div class="track-title" style="font-size:14px; color:white;">${m.trackName}</div>
                            <div style="font-size:11px; color:#555">Compositor: ${m.artistName}</div>
                        </div>
                        <i class="fas fa-download download-btn" onclick="event.stopPropagation(); baixarMusica('${m.previewUrl}', '${m.trackName}')"></i>
                        <i class="fas fa-play-circle track-play-icon" id="icon_${i}"></i>
                    </div>`).join('')}<div style="height:150px;"></div>`;
            atualizarUI();
        }

        function tocar(index) {
            window.musicaIndex = index;
            const m = window.listaAtual[index];
            audio.src = m.previewUrl;
            audio.play();
            playerBar.style.display = 'block';
            document.getElementById('playerArt').src = window.capaAtual;
            document.getElementById('trackTitle').innerText = m.trackName;
            atualizarUI();
        }

        // Função de download melhorada
        async function baixarMusica(url, nome) {
            const res = await fetch(url);
            const blob = await res.blob();
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `${nome}.mp3`;
            link.click();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarUI(); }
        function proxima() { if(window.musicaIndex + 1 < window.listaAtual.length) tocar(window.musicaIndex + 1); }
        
        function atualizarUI() {
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('playing'));
            document.querySelectorAll('.track-play-icon').forEach(ic => ic.className = 'fas fa-play-circle track-play-icon');
            
            const row = document.getElementById(`track_${window.musicaIndex}`);
            const icon = document.getElementById(`icon_${window.musicaIndex}`);
            
            if(row) row.classList.add('playing');
            if(icon) icon.className = audio.paused ? 'fas fa-play-circle track-play-icon' : 'fas fa-pause-circle track-play-icon';
            document.getElementById('playBtn').innerHTML = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
        }

        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }
        carregarAlbuns();
    </script>
</body>
</html>
