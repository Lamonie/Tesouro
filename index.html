<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --playing-color: #ffff00; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000000; color: var(--text-main); font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }

        header { 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .logo-inox {
            font-family: 'Great Vibes', cursive;
            font-size: 42px;
            font-weight: normal;
            background: linear-gradient(to bottom, #cfd8dc 0%, #ffffff 50%, #90a4ae 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            display: inline-block;
        }

        .nav-container { 
            display: flex; 
            align-items: center; 
            padding: 10px 15px; 
            gap: 10px; 
            overflow: hidden;
        }

        .genres-toggle-btn {
            background: #000;
            color: white;
            border: 1px solid #333; 
            box-shadow: 0 0 4px rgba(50, 50, 50, 0.4);
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 14px;
        }

        .categories-nav { 
            display: none; 
            overflow-x: auto; 
            gap: 8px; 
            white-space: nowrap;
            scrollbar-width: none;
            flex: 1;
        }
        .categories-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: #000; 
            border: 1px solid #333; 
            box-shadow: 0 0 3px rgba(50, 50, 50, 0.3);
            color: white; 
            padding: 8px 16px; 
            border-radius: 18px; 
            font-size: 13px; 
            font-weight: 600; 
            flex-shrink: 0; 
        }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: rgba(255, 255, 255, 0.07); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); align-items: center; padding: 0 15px; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 15px 10px; outline: none; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 180px; }
        .card { width: 47%; background: rgba(255,255,255,0.04); border-radius: 15px; padding: 8px; margin-bottom: 20px; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; }

        /* ==================== BARRA INFERIOR NO ESTILO DESEJADO ==================== */
        .player { 
            position: fixed; 
            bottom: 12px; 
            left: 12px; 
            right: 12px; 
            background: rgba(30, 30, 30, 0.95); 
            backdrop-filter: blur(25px); 
            border-radius: 50px; 
            padding: 8px 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            z-index: 10002; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .nav-bottom-btn {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .player-center {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .mini-art {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .track-info {
            flex: 1;
            overflow: hidden;
        }

        .track-info div:first-child {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-info div:last-child {
            font-size: 13px;
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(35px); z-index: 10001; display: none; flex-direction: column; overflow-y: auto; }
        
        .btn-voltar { 
            margin: 15px; 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            color: #ffffff; 
            padding: 12px 25px; 
            border-radius: 35px; 
            font-weight: 600; 
            width: fit-content;
        }

        .track-row { display: flex; align-items: center; padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

        .album-meta { background: rgba(255,255,255,0.06); margin: 15px; padding: 20px; border-radius: 18px; font-size: 13px; color: #bbb; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <div class="logo-inox">LamoniêFlow</div>
    </header>

    <div class="nav-container">
        <div class="genres-toggle-btn" onclick="toggleGenres()">Gêneros</div>
        <div class="categories-nav" id="catNav"></div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar...">
            <div style="display:flex; gap:25px; color:#8e8e93; align-items: center;">
                <i class="fas fa-microphone" id="micBtn" onclick="ativarMicrofone()" style="cursor:pointer; padding: 5px;"></i>
                <i class="fas fa-search" onclick="realizarBuscaManual()" style="cursor:pointer;"></i>
            </div>
        </div>
    </div>
    <div id="grid" class="main-grid"></div>

    <!-- Barra inferior no novo formato -->
    <footer class="player" id="player">
        <!-- Botão Home -->
        <div class="nav-bottom-btn" onclick="voltarParaInicio()">
            <i class="fas fa-home"></i>
        </div>

        <!-- Centro: Capa + Informações -->
        <div class="player-center">
            <img id="playerArt" src="" class="mini-art">
            <div class="track-info">
                <div id="trackTitle">Música</div>
                <div id="trackArtist">Artista</div>
            </div>
        </div>

        <!-- Botão Play/Pause -->
        <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:var(--playing-color); font-size:28px; padding:8px;">
            <i class="fas fa-pause"></i>
        </button>

        <!-- Botão Busca -->
        <div class="nav-bottom-btn" onclick="focarBusca()">
            <i class="fas fa-search"></i>
        </div>
    </footer>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const player = document.getElementById('player');

        function voltarParaInicio() {
            document.getElementById('albumPage').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function focarBusca() {
            document.getElementById('searchInput').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Atualiza contador de tempo (mantido simples)
        audio.ontimeupdate = () => {
            atualizarUI();
        };

        function toggleGenres() {
            const nav = document.getElementById('catNav');
            nav.style.display = (nav.style.display === 'flex') ? 'none' : 'flex';
        }

        function ativarMicrofone() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR'; recognition.start();
            document.getElementById('micBtn').style.color = '#ff3b30';
            recognition.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                document.getElementById('searchInput').value = texto;
                carregarPorGenero(texto);
            };
            recognition.onend = () => { document.getElementById('micBtn').style.color = '#8e8e93'; };
        }

        function realizarBuscaManual() {
            const valor = document.getElementById('searchInput').value;
            if(valor) carregarPorGenero(valor);
        }

        function voltarParaAlbumAtivo() { if (window.albumAtivoId) abrirAlbum(window.albumAtivoId, window.capaAtiva); }

        const generos = ["Início", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Brega", "Arrocha", "Axé", "Pagode", "Samba", "Gospel", "Rock", "Pop", "Hip-Hop"];
        document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn" onclick="carregarPorGenero('${g}')">${g}</button>`).join('');

        async function carregarPorGenero(g) {
            const termo = g === "Início" ? "Luiz Gonzaga" : g;
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=album&limit=100`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:10px; font-weight:bold; font-size:13px;">${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            window.albumVisualizadoId = id;
            albumPage.style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0]; 
            const songs = data.results.slice(1);
            
            const dataLancamento = new Date(album.releaseDate).toLocaleDateString('pt-BR');
            const gravadora = album.copyright || "Independente";

            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:30px;">
                    <img src="${art.replace('100x100', '600x600')}" style="width:250px; border-radius:20px;">
                </div>
                
                <div style="text-align:center; margin-top:-20px;">
                    <h2 style="margin:0; font-size:22px;">${album.collectionName}</h2>
                    <p style="color:var(--primary); margin:8px 0;">${album.artistName}</p>
                </div>
                
                <div class="album-meta">
                    <b>Gênero:</b> ${album.primaryGenreName}<br>
                    <b>Lançamento:</b> ${dataLancamento}<br>
                    <b>Gravadora:</b> ${gravadora}
                </div>

                ${songs.map((m, i) => `
                    <div class="track-row" id="row_${id}_${i}" onclick="tocar('${id}', ${i}, '${art}')">
                        <span style="color:#777; width:30px;">${i+1}</span>
                        <div style="flex:1; margin-left:12px;">
                            <div class="track-title" style="font-size:15px; color:white;">${m.trackName}</div>
                            <div style="font-size:13px; opacity:0.7;">${m.artistName}</div>
                        </div>
                        <div>
                            <i class="fas fa-play-circle" style="font-size:24px; color:white;"></i>
                        </div>
                    </div>`).join('')}<div style="height:100px;"></div>`;
            
            window.listaVisualizada = songs; 
        }

        function tocar(albumId, index, art) {
            const m = window.listaVisualizada[index];
            audio.src = m.previewUrl; 
            audio.play();

            document.getElementById('playerArt').src = art;
            document.getElementById('trackTitle').innerText = m.trackName;
            document.getElementById('trackArtist').innerText = m.artistName || '';
            player.style.display = 'flex';
        }

        function togglePlay() {
            if (audio.paused) audio.play();
            else audio.pause();
        }

        async function baixarMusica(url, nome) {
            const res = await fetch(url); 
            const blob = await res.blob();
            const link = document.createElement('a'); 
            link.href = window.URL.createObjectURL(blob);
            link.download = `${nome}.mp3`; 
            link.click();
        }

        function fecharPagina() { albumPage.style.display = 'none'; }

        // Inicia visível
        player.style.display = 'flex';
        carregarPorGenero("Início");
    </script>
</body>
</html>
