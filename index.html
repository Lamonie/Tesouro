<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #000000; --text-main: #ffffff; }
        
        /* TRAVA DE SEGURANÇA CONTRA ERROS DE TELA */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { 
            width: 100%; 
            overflow-x: hidden; /* Proíbe rolar para os lados */
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
        }

        header { padding: 20px 15px; }
        header h1 { color: var(--primary); font-size: 24px; font-weight: 900; }

        /* BARRA DE GÊNEROS - ROLA SÓ ELA */
        .categories-nav { 
            display: flex; 
            overflow-x: auto; 
            padding: 10px 15px; 
            gap: 8px; 
        }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: #2a2a2a; border: none; color: white; 
            padding: 8px 16px; border-radius: 20px; 
            font-size: 13px; font-weight: 600; flex-shrink: 0; 
        }
        .cat-btn.active { background: var(--primary); color: black; }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; align-items: center; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; width: 100%; }

        /* GRID CORRIGIDO: DOIS POR LINHA SEMPRE */
        .main-grid { 
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            padding: 10px 15px 150px;
            width: 100%;
        }
        .card { 
            width: 47%; /* Garante que dois caibam com folga na largura */
            background: #181818; 
            border-radius: 8px; 
            padding: 8px; 
            margin-bottom: 15px;
            border: 1px solid #282828; 
        }
        .card img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 4px; 
            object-fit: cover; 
            display: block;
        }
        .card h4 { 
            font-size: 12px; margin-top: 8px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        /* PÁGINA DO ÁLBUM */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: black; padding: 12px; border-radius: 25px; font-weight: 800; width: fit-content; }
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; }

        /* PLAYER COM BOTÕES DE CONTROLE */
        .player { position: fixed; bottom: 0; width: 100%; background: rgba(18,18,18,0.98); padding: 15px 20px 40px; border-top: 1px solid #282828; z-index: 10001; display: none; }
        .play-trigger { background: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header><h1>LAMONIÊ FLOW</h1></header>
    <div class="categories-nav" id="catNav"></div>
    <div class="search-container"><div class="search-box"><input type="text" id="searchInput" placeholder="Buscar álbum ou artista..."></div></div>
    
    <div class="main-grid" id="grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina('albumPage')">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1; overflow: hidden; margin-right: 10px;">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:12px; color:var(--primary);">Artista</p>
            </div>
            <button onclick="togglePlay()" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const generos = ["Destaques", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Arrocha", "Pagode", "Funk", "Trap", "Pop", "Rock", "Gospel"];
        
        function carregarGeneros() {
            document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn ${g === 'Destaques' ? 'active' : ''}" onclick="selecionarGenero(this, '${g}')">${g}</button>`).join('');
        }

        function selecionarGenero(btn, g) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            search(g);
        }

        async function search(q = "Wesley Safadão") {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=album&limit=20&country=BR`);
                const data = await res.json();
                data.results.forEach(t => {
                    grid.innerHTML += `<div class="card" onclick="abrirAlbum('${t.collectionId}')">
                        <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                        <h4>${t.collectionName}</h4>
                        <p style="font-size:10px; color:#666;">${t.artistName}</p>
                    </div>`;
                });
            } catch (e) {}
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            const content = document.getElementById('albumDetailContent');
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
                const data = await res.json();
                const album = data.results[0];
                const musicas = data.results.slice(1);
                content.innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:70%; border-radius:8px;">
                        <h2 style="margin-top:15px; font-size:18px;">${album.collectionName}</h2>
                        <p style="color:#666; font-size:12px;">${album.artistName} • ${new Date(album.releaseDate).getFullYear()}</p>
                    </div>
                    <div style="padding-bottom: 120px;">
                        ${musicas.map((m, i) => `
                            <div class="track-row" onclick="tocar('${m.trackName.replace(/'/g, "")}', '${m.artistName}', '${m.previewUrl}')">
                                <span style="color:#666; width:25px; font-size:12px;">${i+1}</span>
                                <div style="flex:1;">
                                    <div style="font-size:14px; font-weight:500;">${m.trackName}</div>
                                    <div style="font-size:11px; color:#666;">Gravadora: ${album.copyright || 'N/A'}</div>
                                </div>
                                <i class="fas fa-play" style="color:var(--primary); font-size:12px;"></i>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {}
        }

        function tocar(nome, artista, url) {
            audio.src = url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = nome;
            document.getElementById('trackArtist').innerText = artista;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }
        
        carregarGeneros();
        search();
    </script>
</body>
</html>
