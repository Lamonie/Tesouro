<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LAMONIÊ FLASH PRO</title>
    <style>
        :root { 
            --bg-black: #0f0f0f; 
            --lamonie-yellow: #FFD700; 
            --tag-bg: #272727;
            --search-gray: #212121;
            --glass-white: rgba(255, 255, 255, 0.1);
            --border-gray: #272727;
            --info-badge-bg: rgba(255, 255, 255, 0.08); 
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Roboto", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: var(--bg-black); 
            color: white; 
            overflow-x: clip; 
            padding-bottom: 80px; 
        }
        
        .light-sweep {
            font-weight: 800; 
            font-size: 18px; 
            color: var(--lamonie-yellow);
            position: relative; 
            display: inline-block;
            background: linear-gradient(90deg, var(--lamonie-yellow) 0%, var(--lamonie-yellow) 40%, #ffffff 50%, var(--lamonie-yellow) 60%, var(--lamonie-yellow) 100%);
            background-size: 200% auto; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            animation: sweep 3s linear infinite;
        }

        .light-sweep-white {
            font-weight: 800; 
            font-size: 18px; 
            color: #ffffff;
            position: relative; 
            display: inline-block;
            background: linear-gradient(90deg, #d4d4d4 0%, #d4d4d4 40%, #ffffff 50%, #d4d4d4 60%, #d4d4d4 100%);
            background-size: 200% auto; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            animation: sweep 3s linear infinite;
        }
        
        @keyframes sweep { 
            0% { background-position: 200% center; } 
            100% { background-position: -200% center; } 
        }
        
        .topo-geral { 
            position: relative; 
            width: 100%; 
            background: var(--bg-black); 
        }
        
        header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 10px 15px; 
            height: 56px; 
            background: var(--bg-black);
        }

        .header-info-container {
            display: flex;
            align-items: center;
            gap: 12px; 
        }

        .dynamic-info-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--info-badge-bg);
            padding: 4px 10px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-badge {
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .info-badge.dolar {
            color: #4CAF50; 
            padding-right: 8px;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .info-badge.clima {
            color: #E0E0E0;
        }

        .weather-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
        
        #fullSearchBar {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 56px;
            background: var(--bg-black); 
            z-index: 6000; 
            align-items: center; 
            padding: 0 10px; 
            gap: 10px;
        }
        
        .search-back-btn {
            background: none; border: none; padding: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .search-input-container {
            flex: 1; display: flex; align-items: center; 
            background: var(--search-gray); border-radius: 20px; 
            padding: 5px 15px; height: 40px;
        }
        
        .search-input-container input { 
            background: transparent; border: none; color: white; 
            width: 100%; outline: none; font-size: 16px; 
        }
        
        #clearSearchBtn {
            display: none; background: none; border: none; padding: 5px;
            color: white; cursor: pointer; align-items: center; justify-content: center;
        }
        
        #searchSuggestions {
            position: fixed; top: 56px; left: 0; width: 100%; 
            height: calc(100vh - 56px); background: var(--bg-black);
            overflow-y: auto; z-index: 6500; display: none; scrollbar-width: none; 
        }
        #searchSuggestions::-webkit-scrollbar { display: none; }

        .suggestion-item {
            display: flex; align-items: center; padding: 14px 16px; gap: 16px; transition: background-color 0.2s;
        }
        .suggestion-item:active { background-color: #272727; }
        .sug-icon { flex-shrink: 0; opacity: 0.6; display: flex; align-items: center; justify-content: center; }
        .sug-text { flex: 1; font-size: 16px; font-weight: 500; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .sug-arrow { flex-shrink: 0; padding: 8px; cursor: pointer; opacity: 0.6; display: flex; align-items: center; justify-content: center; }
        
        #bloqueio { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }
        #spaceVideo { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; filter: brightness(0.85) contrast(1.1); 
        }
        .login-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.68); z-index: 2; }
        .login-card {
            position: relative; z-index: 3; width: 100%; max-width: 340px; 
            padding: 40px 30px 30px; background: rgba(255, 255, 255, 0.09); 
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.22); border-radius: 22px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); text-align: center;
        }
        .login-card h2 { color: var(--lamonie-yellow); font-size: 28px; margin-bottom: 32px; letter-spacing: 3px; }
        .login-card input { 
            width: 100%; padding: 16px 20px; background: rgba(255, 255, 255, 0.12); 
            border: 1px solid rgba(255, 255, 255, 0.35); border-radius: 12px; color: white; 
            font-size: 16px; margin-bottom: 22px; outline: none; 
        }
        .login-card input:focus { border-color: var(--lamonie-yellow); box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.25); }
        .btn-entrar { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            background: white; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; 
        }
        
        .carousel-tags { 
            display: flex; overflow-x: auto; white-space: nowrap; 
            padding: 8px 15px 12px; gap: 8px; scrollbar-width: none; 
            background: var(--bg-black); position: relative; z-index: 5400; transition: transform 0.3s ease;
        }
        .carousel-tags.playing-mode {
            position: -webkit-sticky; position: sticky; top: calc(100vw * 9 / 16); border-bottom: 1px solid var(--border-gray);
        }
        .carousel-tags.hidden-up { transform: translateY(-100%); }
        .carousel-tags::-webkit-scrollbar { display: none; }
        .tag-btn { 
            background: var(--tag-bg); color: white; padding: 6px 14px; 
            border-radius: 8px; font-size: 13px; border: none; font-weight: 500; flex-shrink: 0; cursor: pointer; 
        }
        .tag-btn.active { background: white; color: black; }
        
        .iframe-container { 
            width: calc(100% - 30px); margin: 0 15px; aspect-ratio: 16/9; 
            background: #111; position: relative; border-radius: 12px; overflow: hidden; transition: all 0.3s ease;
        }
        .iframe-container.playing-mode {
            width: 100%; margin: 0; border-radius: 0; position: -webkit-sticky; position: sticky;
            top: 0; z-index: 5500; box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        
        .iframe-container.mini-mode {
            position: fixed !important; bottom: 65px !important; top: auto !important;
            left: 0 !important; width: 100% !important; height: 56px !important;
            border-radius: 0 !important; margin: 0 !important; z-index: 6900 !important;
            display: flex !important; flex-direction: row !important;
            background: #212121 !important; border-top: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.7) !important; cursor: pointer;
            aspect-ratio: auto;
        }
        .iframe-container.mini-mode #player {
            width: 100px !important; height: 56px !important; pointer-events: none; flex-shrink: 0;
        }
        .iframe-container.mini-mode .swipe-zones,
        .iframe-container.mini-mode .capa-overlay,
        .iframe-container.mini-mode #videoCapa {
            display: none !important;
        }
        .mini-player-controls {
            display: none; flex: 1; padding: 0 12px; justify-content: space-between; align-items: center; overflow: hidden;
        }
        .iframe-container.mini-mode .mini-player-controls { display: flex !important; }
        
        .mini-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 2px; }
        .mini-title { font-size: 14px; font-weight: 500; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-channel { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .mini-actions { display: flex; gap: 8px; align-items: center; }
        .mini-actions button { background: none; border: none; padding: 6px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
        
        .swipe-zones {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 6000; pointer-events: none; display: none;
        }
        .iframe-container.playing-mode:not(.mini-mode) .swipe-zones { display: block; }
        
        .pip-zone, .block-zone { pointer-events: auto; position: absolute; }
        
        /* ========================================================= */
        /* CORREÇÃO CIRÚRGICA: MÁSCARAS INTOCÁVEIS (VOLUME/CC/ENGRENAGEM) */
        /* ========================================================= */
        
        /* 1. Máscara para a logo do YouTube (Canto Inferior Direito) */
        .block-bottom-main {
            bottom: 0;
            right: 0;
            left: auto;
            width: 130px; 
            height: 60px;
            pointer-events: auto;
            z-index: 6010;
        } 

        /* 2. Máscara Topo Esquerda: Reduzida para 40% para não tocar no ícone de volume */
        .block-top-left { 
            top: 0; 
            left: 0; 
            width: 40%; 
            height: 70px;
            pointer-events: auto;
            z-index: 6010;
        }
        
        /* 3. ZONAS DE ARRASTE: Ajustadas para deixar o topo direito 100% livre */
        .pip-top { 
            top: 0; 
            left: 45%; 
            width: 10%; 
            height: 12%; 
        } 
        
        .pip-mid-left { 
            top: 20%; 
            left: 0; 
            width: 30%; 
            height: 50%; 
        }

        /* Rebaixado para 40% do topo para livrar Engrenagem e CC */
        .pip-mid-right { 
            top: 40%; 
            right: 0; 
            width: 30%; 
            height: 40%; 
        } 
        /* ========================================================= */

        #videoCapa { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; 
            cursor: pointer; display: flex; flex-direction: column; z-index: 5000;
        }
        #capaThumb { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .capa-overlay { 
            position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.2)); 
            display: flex; align-items: center; justify-content: center; transition: background 0.2s; 
        }
        .play-button { 
            width: 68px; height: 68px; background: rgba(0,0,0,0.85); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255,255,255,0.4); 
            opacity: 0; pointer-events: none; 
        }
        #player { width: 100%; height: 100%; display: none; }

        .main-video-info {
            padding: 16px 15px 16px; background: var(--bg-black); border-bottom: 4px solid var(--border-gray);
            display: flex; flex-direction: column; gap: 10px;
        }
        #mainVideoTitle {
            font-size: 18px; font-weight: 600; color: #FFFFFF; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            opacity: 1; pointer-events: auto; 
        }
        .main-video-channel-row { display: flex; align-items: center; gap: 10px; }
        .channel-avatar-main { 
            width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #222; 
            opacity: 1; pointer-events: auto; 
        }
        #mainVideoMeta { font-size: 13px; color: #AAAAAA; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
        .verified-icon { width: 13px; height: 13px; fill: #aaa; margin-left: 2px; vertical-align: middle; display: inline-block; }

        #videoList, #relatedVideoList { padding: 10px 0; }
        .video-item { display: flex; flex-direction: column; padding-bottom: 24px; cursor: pointer; position: relative; }
        .video-thumb-container { 
            width: calc(100% - 30px); margin: 0 15px; aspect-ratio: 16/9; 
            position: relative; background: #111; border-radius: 12px; overflow: hidden;
        }
        .video-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
        .video-info-wrapper { display: flex; padding: 12px 15px 0; gap: 12px; align-items: flex-start; }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #222; }
        .video-info { display: flex; flex-direction: column; gap: 4px; padding: 0; }
        .video-title { 
            font-size: 15px; font-weight: 500; color: #FFFFFF; line-height: 1.4; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; 
        }
        .video-stats { font-size: 12px; color: #AAAAAA; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; line-height: 1.4; }
        .video-actions { position: absolute; top: 8px; right: 8px; z-index: 10; opacity: 0; transition: all 0.2s; }
        .video-item:hover .video-actions { opacity: 1; }
        
        .playlist-btn { 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: white; 
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; 
        }
        .playlist-btn:active { background: rgba(255,255,255,0.2); }
        
        .view-container { display: none; padding: 0 0 20px; }
        .view-container.active { display: block; }
        
        .section-header { 
            padding: 16px 15px 8px; font-size: 20px; font-weight: 600; 
            display: flex; align-items: center; justify-content: space-between; 
        }
        
        .history-item { display: flex; padding: 8px 15px; gap: 12px; cursor: pointer; }
        .history-thumb { width: 120px; height: 68px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .history-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
        .history-title { font-size: 15px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .history-meta { font-size: 13px; color: #aaa; }
        
        .playlists-list { display: flex; flex-direction: column; gap: 16px; padding: 10px 15px; }
        .playlist-card-row { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .playlist-thumb-container-row { 
            position: relative; width: 140px; aspect-ratio: 16/9; background: #111; border-radius: 8px; overflow: hidden; flex-shrink: 0;
        }
        .playlist-thumb-row { width: 100%; height: 100%; object-fit: cover; }
        .playlist-overlay-row { 
            position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); 
            display: flex; align-items: flex-end; padding: 8px; color: white; font-size: 12px; font-weight: bold; justify-content: flex-end;
        }
        .playlist-info-row { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .playlist-name-row { font-size: 16px; font-weight: 500; color: #fff; }
        .playlist-sub-row { font-size: 13px; color: #aaa; }
        
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 8000; 
            display: none; opacity: 0; transition: opacity 0.3s ease; 
        }
        
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            background: #212121; z-index: 8001; border-radius: 16px 16px 0 0;
            display: flex; flex-direction: column; transition: bottom 0.3s ease;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5); max-height: 85vh;
        }
        .sheet-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; border-bottom: 1px solid var(--border-gray);
        }
        .sheet-header h2 { font-size: 18px; font-weight: bold; }
        .sheet-header button { background: none; border: none; cursor: pointer; padding: 5px; }
        .sheet-content { padding: 16px; overflow-y: auto; flex: 1; }
        
        .desc-title { font-size: 16px; font-weight: bold; margin-bottom: 16px; line-height: 1.4; }
        .desc-stats-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .desc-stat-box { 
            flex: 1; background: #0f0f0f; padding: 12px 8px; border-radius: 12px; text-align: center; 
            display: flex; flex-direction: column; justify-content: center; 
        }
        .desc-stat-box strong { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
        .desc-stat-box span { font-size: 11px; color: #aaa; }
        .desc-text-box { 
            background: #0f0f0f; padding: 16px; border-radius: 12px; font-size: 14px; 
            line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; color: #f1f1f1;
        }

        .save-list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0; border-bottom: 1px solid #333; cursor: pointer;
        }
        .save-list-item span { font-size: 16px; }
        .save-checkbox { width: 24px; height: 24px; border: 2px solid #aaa; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .save-checkbox.checked { background: #3ea6ff; border-color: #3ea6ff; }
        .new-playlist-btn-sheet {
            display: flex; align-items: center; gap: 12px; padding: 16px 0; color: #3ea6ff; font-size: 16px; font-weight: 500; cursor: pointer;
        }

        .modal-center {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: #212121; width: 90%; max-width: 340px; border-radius: 16px;
            padding: 24px 20px 16px; z-index: 8002; display: none; opacity: 0; transition: all 0.2s ease;
        }
        .modal-center h3 { font-size: 18px; margin-bottom: 20px; font-weight: 500; }
        .input-group { border: 1px solid #777; border-radius: 8px; padding: 8px 12px; margin-bottom: 20px; }
        .input-group label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }
        .input-group input { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        
        .mock-select { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; margin-bottom: 20px; color: white; font-size: 15px;}
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 20px; }
        .modal-actions button { background: none; border: none; font-size: 15px; font-weight: 500; cursor: pointer; padding: 8px; }
        .btn-cancel { color: #fff; }
        .btn-create { color: #3ea6ff; }

        .tab-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; 
            background: rgba(38, 38, 38, 0.85); 
            border-top: 1px solid rgba(255, 255, 255, 0.08); 
            display: flex; justify-content: space-around; align-items: center; z-index: 7000; 
            padding-bottom: env(safe-area-inset-bottom); backdrop-filter: saturate(180%) blur(20px); 
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: white; text-decoration: none; font-size: 10px; opacity: 0.7; transition: all 0.2s ease; cursor: pointer; }
        .tab-item.active { opacity: 1; color: #ffffff; }
        .tab-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 4px; }
        
        .loading-more { text-align: center; padding: 20px; color: var(--lamonie-yellow); font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="bloqueio">
        <video id="spaceVideo" autoplay loop muted playsinline>
            <source src="https://videos.pexels.com/video-files/34697099/14706250_1920_1080_24fps.mp4" type="video/mp4">
        </video>
        <div class="login-overlay"></div>
        <div class="login-card">
            <h2><span style="color: var(--lamonie-yellow);">LAMONIÊ</span> <span style="color: #ffffff;">FLASH</span></h2>
            <input type="password" id="campoSenha" placeholder="Senha de Acesso">
            <button class="btn-entrar" onclick="validarAcesso()">ENTRAR</button>
        </div>
    </div>

    <div id="fullSearchBar">
        <button class="search-back-btn" onclick="fecharPesquisa()">
            <svg viewBox="0 0 24 24" fill="#fff" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <div class="search-input-container">
            <input type="text" id="searchInput" placeholder="Pesquisar no LAMONIÊ..." autocomplete="off">
            <button id="clearSearchBtn" onclick="limparBusca()">
                <svg viewBox="0 0 24 24" fill="#fff" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
    </div>
    <div id="searchSuggestions"></div>

    <div id="appContainer" style="display:none; width: 100%;">
        
        <header id="mainHeader">
            <div style="display:flex; align-items:center; gap: 4px;">
                <div class="light-sweep">LAMONIÊ</div>
                <div class="light-sweep-white">FLASH</div>
            </div>
            
            <div class="header-info-container">
                <div class="dynamic-info-group">
                    <div class="info-badge dolar" id="dolarDisplay">R$ --,--</div>
                    <div class="info-badge clima" id="climaDisplay">
                        <span id="tempDisplay">--°C</span>
                        <svg class="weather-icon" viewBox="0 0 24 24"><path d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>
                    </div>

        let player;

        let videoPendentePlaylist = null;
        let currentPlayingVideoId = null;

        const verifiedSvg = `<svg class="verified-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zM9.8 17.3l-4.2-4.1L7 11.8l2.8 2.7L17 7.4l1.4 1.4-8.6 8.5z"/></svg>`;

        function get24HoursAgoISO() { return new Date(Date.now() - 86400000).toISOString(); }

        function timeSince(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return "há " + Math.floor(interval) + " anos";
            interval = seconds / 2592000;
            if (interval > 1) return "há " + Math.floor(interval) + " meses";
            interval = seconds / 86400;
            if (interval > 1) return "há " + Math.floor(interval) + " dias";
            interval = seconds / 3600;
            if (interval > 1) return "há " + Math.floor(interval) + " h";
            interval = seconds / 60;
            if (interval > 1) return "há " + Math.floor(interval) + " min";
            return "há " + Math.floor(seconds) + " seg";
        }

        function formatViews(views) {
            if (!views) return "0";
            const num = parseInt(views);
            if (num >= 1000000) return (num / 1000000).toFixed(1).replace('.', ',') + " mi";
            if (num >= 1000) return Math.floor(num / 1000) + " mil";
            return num;
        }

        function saveData() {
            localStorage.setItem('lamonie_historico', JSON.stringify(historico));
            localStorage.setItem('lamonie_playlists', JSON.stringify(playlists));
        }

        function loadData() {
            const h = localStorage.getItem('lamonie_historico');
            if (h) historico = JSON.parse(h);
            const p = localStorage.getItem('lamonie_playlists');
            if (p) playlists = JSON.parse(p);
        }

        function addToHistory(video) {
            historico = historico.filter(v => v.id !== video.id && v.id !== (video.id.videoId || video.id));
            historico.unshift(video);
            if (historico.length > 50) historico.pop();
            saveData();
            if (document.getElementById('view-historico').classList.contains('active')) renderHistorico();
        }

        function renderHistorico() {
            const container = document.getElementById('historicoList');
            container.innerHTML = '';
            if (historico.length === 0) {
                container.innerHTML = `<div style="padding:40px 20px;text-align:center;color:#888;font-size:15px;">Seu histórico aparecerá aqui</div>`;
                return;
            }
            historico.forEach(v => {
                const div = document.createElement('div');
                div.className = 'history-item';
                
                const thumbUrl = v.snippet.thumbnails.high ? v.snippet.thumbnails.high.url : (v.snippet.thumbnails.medium ? v.snippet.thumbnails.medium.url : "https://i.ytimg.com/vi/default/maxresdefault.jpg");
                
                div.innerHTML = `<img src="${thumbUrl}" class="history-thumb" loading="lazy"><div class="history-info"><div class="history-title">${v.snippet.title}</div><div class="history-meta">${v.snippet.channelTitle}</div></div>`;
                div.onclick = () => promover(v);
                container.appendChild(div);
            });
        }

        function limparHistorico() { historico = []; saveData(); renderHistorico(); }

        function renderPlaylists() {
            const grid = document.getElementById('playlistsGrid');
            grid.innerHTML = '';
            Object.keys(playlists).forEach(nome => {
                const pl = playlists[nome];
                const card = document.createElement('div');
                card.className = 'playlist-card-row';
                const thumb = pl.videos.length && pl.videos[0].snippet.thumbnails.medium ? pl.videos[0].snippet.thumbnails.medium.url : 'https://i.ytimg.com/vi/default/maxresdefault.jpg';
                card.innerHTML = `
                    <div class="playlist-thumb-container-row">
                        <img src="${thumb}" class="playlist-thumb-row">
                        <div class="playlist-overlay-row">${pl.videos.length} vídeos</div>
                    </div>
                    <div class="playlist-info-row">
                        <div class="playlist-name-row">${nome}</div>
                        <div class="playlist-sub-row">Privado</div>
                    </div>
                `;
                card.onclick = () => abrirPlaylist(nome);
                grid.appendChild(card);
            });
        }

        function abrirPlaylist(nome) {
            document.getElementById('playlistView').style.display = 'block';
            document.getElementById('playlistsGrid').style.display = 'none';
            document.getElementById('playlistHeader').innerHTML = `<span>${nome}</span><span style="font-size:14px;color:#aaa">${playlists[nome].videos.length} vídeos</span>`;
            const list = document.getElementById('playlistVideosList');
            list.innerHTML = '';
            playlists[nome].videos.forEach((v, i) => {
                const item = document.createElement('div');
                item.className = 'playlist-card-row';
                const thumbUrl = v.snippet.thumbnails.medium ? v.snippet.thumbnails.medium.url : "https://i.ytimg.com/vi/default/maxresdefault.jpg";
                item.innerHTML = `
                    <div class="playlist-thumb-container-row" style="width:120px;">
                        <img src="${thumbUrl}" class="playlist-thumb-row">
                    </div>
                    <div class="playlist-info-row">
                        <div class="playlist-name-row" style="font-size:14px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${v.snippet.title}</div>
                        <div class="playlist-sub-row">${v.snippet.channelTitle}</div>
                    </div>
                    <button onclick="event.stopImmediatePropagation();removerDaPlaylist('${nome}', ${i});" style="background:none;border:none;color:#ff4444;margin-left:8px;">X</button>
                `;
                item.onclick = (e) => { if (e.target.tagName !== 'BUTTON') promover(v); };
                list.appendChild(item);
            });
        }

        function voltarParaPlaylists() {
            document.getElementById('playlistView').style.display = 'none';
            document.getElementById('playlistsGrid').style.display = 'flex';
            renderPlaylists();
        }

        function removerDaPlaylist(nome, index) { playlists[nome].videos.splice(index, 1); saveData(); abrirPlaylist(nome); }

        function fecharTodosModais() {
            document.getElementById('geralOverlay').style.opacity = '0';
            document.getElementById('descSheet').style.bottom = '-100%';
            document.getElementById('saveSheet').style.bottom = '-100%';
            document.getElementById('modalNovaPlaylist').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('geralOverlay').style.display = 'none';
                document.getElementById('modalNovaPlaylist').style.display = 'none';
            }, 300);
        }

        function abrirDescricao() {
            document.getElementById('geralOverlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('geralOverlay').style.opacity = '1';
                document.getElementById('descSheet').style.bottom = '0';
            }, 10);
        }

        function abrirSaveSheet(video) {
            videoPendentePlaylist = video;
            const container = document.getElementById('saveSheetContent');
            container.innerHTML = '';
            const videoTargetId = typeof video.id === 'object' ? video.id.videoId : video.id;

            Object.keys(playlists).forEach(nome => {
                const isSaved = playlists[nome].videos.some(v => {
                    const vId = typeof v.id === 'object' ? v.id.videoId : v.id;
                    return vId === videoTargetId;
                });
                const div = document.createElement('div');
                div.className = 'save-list-item';
                div.innerHTML = `
                    <span>${nome}</span>
                    <div class="save-checkbox ${isSaved ? 'checked' : ''}">
                        ${isSaved ? '<svg width="16" height="16" fill="#fff" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' : ''}
                    </div>
                `;
                div.onclick = () => {
                    if (isSaved) {
                        playlists[nome].videos = playlists[nome].videos.filter(v => {
                            const vId = typeof v.id === 'object' ? v.id.videoId : v.id;
                            return vId !== videoTargetId;
                        });
                    } else {
                        playlists[nome].videos.unshift(video);
                    }
                    saveData();
                    abrirSaveSheet(video); 
                    if(document.getElementById('view-playlists').classList.contains('active')) renderPlaylists();
                };
                container.appendChild(div);
            });

            document.getElementById('geralOverlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('geralOverlay').style.opacity = '1';
                document.getElementById('saveSheet').style.bottom = '0';
            }, 10);
        }

                document.getElementById('modalNovaPlaylist').style.opacity = '1';
                document.getElementById('novaPlaylistNome').focus();
            }, 10);
        }
        
        function fecharModalNovaPlaylist() { 
            fecharTodosModais();
            document.getElementById('novaPlaylistNome').value = ''; 
        }
        
        function criarNovaPlaylist() {
            const nome = document.getElementById('novaPlaylistNome').value.trim();
            if(nome && !playlists[nome]) { 
                playlists[nome] = { videos: [] }; 
                if (videoPendentePlaylist) {
                    playlists[nome].videos.unshift(videoPendentePlaylist);
                }
                saveData(); 
                renderPlaylists(); 
                fecharModalNovaPlaylist(); 
            }
        }

        async function fetchYT(termo, max = 8, token = "", timeLimit = "", retryCount = 0) {
            if (retryCount >= 4) return { items: [], token: "" };

            try {
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=${max}&q=${encodeURIComponent(termo)}&type=video&regionCode=BR&relevanceLanguage=pt&key=${getApiKey()}`;
                if(token) url += `&pageToken=${token}`;
                if(timeLimit) url += `&publishedAfter=${timeLimit}`;
                
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.error) {
                    if (data.error.code === 403 || data.error.code === 429 || (data.error.message && data.error.message.includes("quota"))) { 
                        proximaChave(); 
                        return await fetchYT(termo, max, token, timeLimit, retryCount + 1); 
                    }
                    return { items: [], token: "" };
                }
                
                let items = data.items || [];
                
                if (items.length > 0) {
                    try {
                        const videoIds = items.map(item => item.id.videoId).filter(Boolean).join(',');
                        const channelIds = [...new Set(items.map(item => item.snippet.channelId))].join(',');

                        const urlVideos = `https://www.googleapis.com/youtube/v3/videos?part=statistics,liveStreamingDetails,snippet&id=${videoIds}&key=${getApiKey()}`;
                        const resVideos = await fetch(urlVideos);
                        const dataVideos = await resVideos.json();
                        const videoMap = {};
                        if (dataVideos.items) dataVideos.items.forEach(v => { videoMap[v.id] = v; });

                        const urlCanais = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelIds}&key=${getApiKey()}`;
                        const resCanais = await fetch(urlCanais);
                        const dataCanais = await resCanais.json();
                        const channelMap = {};
                        if (dataCanais.items) dataCanais.items.forEach(ch => { channelMap[ch.id] = ch; });

                        items.forEach(item => {
                            const vData = videoMap[item.id.videoId];
                            if (vData) {
                                item.statistics = vData.statistics;
                                item.liveStreamingDetails = vData.liveStreamingDetails;
                                item.fullDescription = vData.snippet.description;
                            }
                            const cData = channelMap[item.snippet.channelId];
                            if (cData) {
                                item.channelAvatar = cData.snippet.thumbnails.default.url;
                                item.isVerified = parseInt(cData.statistics.subscriberCount) >= 100000;
                            }
                        });
                    } catch(e) {}
                }
                return { items: items, token: data.nextPageToken || "" };
            } catch (error) { 
                return { items: [], token: "" }; 
            }
        }

        async function fetchWeatherData() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-3.7172&longitude=-38.5431&current_weather=true');
                const data = await res.json();
                if(data && data.current_weather) {
                    document.getElementById('tempDisplay').innerText = Math.round(data.current_weather.temperature) + '°C';
                }
            } catch (error) {
                console.error("Erro ao buscar clima:", error);
            }
        }

        async function fetchDolarData() {
            try {
                const res = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL');
                const data = await res.json();
                if(data && data.USDBRL) {
                    const cotacao = parseFloat(data.USDBRL.bid).toFixed(2).replace('.', ',');
                    document.getElementById('dolarDisplay').innerText = 'R$ ' + cotacao;
                }
            } catch (error) {
                console.error("Erro ao buscar dólar:", error);
            }
        }

        async function initApp() {
            loadData();
            globalDisplayedIds.clear();
            displayedChannels = {}; 
            await loadInitialVideos();
            renderHistorico();
            renderPlaylists();
            
            fetchWeatherData();
            fetchDolarData();
        }

    </script>
</body>
</html>
