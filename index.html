<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* NOME LAMONIÊ FLOW NÍTIDO */
        .brand-3d {
            font-size: 28px; font-weight: 900; text-align: center; padding: 15px;
            text-transform: uppercase; letter-spacing: 3px; color: #fff;
            text-shadow: 2px 2px 0px #000, 0 0 15px rgba(29, 185, 84, 0.6);
            -webkit-text-stroke: 1px rgba(255,255,255,0.4);
        }

        /* ABA DE VÍDEO (Aparece ao clicar no álbum) */
        .view-panel { position: fixed; top: 0; left: 0; width: 100%; height: calc(100vh - 110px); background: #000; z-index: 20; transform: translateY(100%); transition: 0.5s ease; visibility: hidden; }
        .view-panel.active { transform: translateY(0); visibility: visible; }
        
        .video-container { width: 100%; height: 60%; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .info-area { padding: 20px; text-align: center; }
        .info-area h2 { font-size: 22px; margin-bottom: 5px; }
        .info-area p { color: var(--primary); font-weight: bold; margin-bottom: 15px; }

        .btn-back { background: var(--primary); color: #000; border: none; padding: 10px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        /* LISTA DE BUSCA */
        header { padding: 10px; text-align: center; }
        .search-container { display: flex; background: #181818; border-radius: 50px; padding: 5px 15px; margin: 0 15px; border: 1px solid #333; }
        .search-container input { background: none; border: none; color: white; flex: 1; padding: 10px; outline: none; }
        .search-container button { background: var(--primary); border: none; padding: 0 20px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        main { height: 70%; overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: #121212; padding: 15px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .card:hover { border-color: var(--primary); background: #181818; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .card .date { font-size: 11px; color: #888; margin-top: 5px; }

        /* PLAYER FIXO */
        footer { position: fixed; bottom: 0; width: 100%; background: #080808; padding: 15px; border-top: 1px solid #222; z-index: 30; }
        .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-bottom: 10px; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 2px; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; }
        .btn-c { background: none; border: none; color: white; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .btn-c.active { color: var(--primary); }
        .btn-play { background: white; color: black; width: 50px; height: 50px; border-radius: 50%; font-size: 20px; }
    </style>
</head>
<body>

    <div id="mainView">
        <div class="brand-3d">LAMONIÊ FLOW</div>
        <header>
            <div class="search-container">
                <input type="text" id="userInput" placeholder="Qual música ou artista?">
                <button onclick="search()">BUSCAR</button>
            </div>
        </header>
        <main><div class="grid" id="results"></div></main>
    </div>

    <div id="videoView" class="view-panel">
        <div class="video-container">
            <video id="mainVideo" playsinline></video>
        </div>
        <div class="info-area">
            <h2 id="v-title">Título da Música</h2>
            <p id="v-date">Data: 00/00/0000</p>
            <button class="btn-back" onclick="closeVideo()">FECHAR E VOLTAR</button>
        </div>
    </div>

    <footer>
        <div class="progress-bar" onclick="seek(event)">
            <div class="progress-fill" id="fill"></div>
        </div>
        <div class="controls">
            <button class="btn-c" id="shuf" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
            <button class="btn-c" onclick="prev()"><i class="fas fa-step-backward"></i></button>
            <button class="btn-c btn-play" onclick="togglePlay()"><i class="fas fa-play" id="p-icon"></i></button>
            <button class="btn-c" onclick="next()"><i class="fas fa-step-forward"></i></button>
            <button class="btn-c" id="rep" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
        </div>
    </footer>

    <script>
        const video = document.getElementById('mainVideo');
        let tracks = [];
        let curIndex = 0;
        let isRepeat = false;
        let isShuffle = false;

        async function search() {
            const query = document.getElementById('userInput').value || "Top Brasil";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=25`);
            const data = await res.json();
            tracks = data.results;
            render();
        }

        function render() {
            const grid = document.getElementById('results');
            grid.innerHTML = tracks.map((t, i) => {
                const date = new Date(t.releaseDate);
                return `
                <div class="card" onclick="openVideo(${i})">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h3>${t.trackName}</h3>
                    <div class="date">${date.toLocaleDateString('pt-BR')}</div>
                </div>`;
            }).join('');
        }

        function openVideo(index) {
            curIndex = index;
            const t = tracks[index];
            const date = new Date(t.releaseDate);
            
            document.getElementById('v-title').innerText = t.trackName;
            document.getElementById('v-date').innerText = `Lançamento: ${date.toLocaleDateString('pt-BR')}`;
            
            // Usando API para buscar o arquivo MP4/Video
            // O previewUrl do iTunes é um arquivo de áudio/vídeo completo para a prévia.
            video.src = t.previewUrl; 
            video.play();
            
            document.getElementById('videoView').classList.add('active');
            document.getElementById('p-icon').className = "fas fa-pause";
        }

        function closeVideo() {
            document.getElementById('videoView').classList.remove('active');
        }

        function togglePlay() {
            if(video.paused) { video.play(); document.getElementById('p-icon').className = "fas fa-pause"; }
            else { video.pause(); document.getElementById('p-icon').className = "fas fa-play"; }
        }

        // CORREÇÃO DOS BOTÕES QUE VOCÊ MARCOU
        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('rep').classList.toggle('active', isRepeat);
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuf').classList.toggle('active', isShuffle);
        }

        function next() {
            if(isShuffle) {
                curIndex = Math.floor(Math.random() * tracks.length);
            } else {
                curIndex = (curIndex + 1) % tracks.length;
            }
            openVideo(curIndex);
        }

        function prev() {
            curIndex = (curIndex - 1 + tracks.length) % tracks.length;
            openVideo(curIndex);
        }

        // Lógica para a música passar toda e ir para a próxima
        video.onended = () => {
            if(isRepeat) { video.play(); } 
            else { next(); }
        };

        video.ontimeupdate = () => {
            const pct = (video.currentTime / video.duration) * 100;
            document.getElementById('fill').style.width = pct + "%";
        };

        function seek(e) {
            const rect = e.target.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        }

        search();
    </script>
</body>
</html>
