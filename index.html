<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | SUPREME EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #000; --glass: rgba(255,255,255,0.1); }

        /* TRAVA TOTAL DE PINÇA E ZOOM */
        * { 
            box-sizing: border-box; 
            touch-action: pan-x pan-y; /* Permite rolar, mas bloqueia zoom de pinça */
            -webkit-user-select: none;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* FUNDO EM LOOP INFINITO */
        .bg-loop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #050505, #0a2e0a, #050505, #121212);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            z-index: -2;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* HEADER E BUSCA */
        header { padding: 15px; text-align: center; }
        .search-container { 
            display: flex; background: var(--glass); border-radius: 50px; 
            margin: 10px 20px; padding: 5px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .search-container input { 
            background: none; border: none; color: white; flex: 1; 
            padding: 10px 15px; outline: none; 
        }
        .btn-search { 
            background: var(--primary); border: none; color: black; 
            padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer;
        }

        /* BARRA DE GÊNEROS MODERNA */
        .genre-bar {
            display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px;
            scrollbar-width: none;
        }
        .genre-bar::-webkit-scrollbar { display: none; }
        .genre-btn {
            background: var(--glass); border: 1px solid var(--primary); color: white;
            padding: 10px 20px; border-radius: 12px; white-space: nowrap;
            font-size: 13px; font-weight: bold; cursor: pointer;
            transition: 0.3s; animation: pulse 3s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0px var(--primary); }
            50% { box-shadow: 0 0 10px var(--primary); }
            100% { box-shadow: 0 0 0px var(--primary); }
        }

        /* GRID ROLÁVEL */
        .main-grid {
            height: calc(100vh - 250px); overflow-y: auto;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            padding: 15px 20px 150px;
        }
        .card { 
            background: rgba(255,255,255,0.05); border-radius: 15px; padding: 10px;
            animation: fadeIn 0.8s ease forwards;
        }
        .card img { width: 100%; border-radius: 10px; }

        /* ABA DO ÁLBUM / LETRA */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 9999; display: none;
            flex-direction: column; overflow-y: auto; padding: 20px;
        }
        .legal-header { 
            background: var(--glass); padding: 15px; border-radius: 15px;
            margin-bottom: 20px; border-left: 5px solid var(--primary);
        }

        /* PLAYER FIXO */
        .player-fixed {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95);
            padding: 20px; border-top: 2px solid var(--primary); z-index: 10000;
            display: none; text-align: center;
        }
        .main-controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .play-circle { 
            width: 60px; height: 60px; background: white; color: black;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-loop"></div>

    <header>
        <h2 style="color: var(--primary); letter-spacing: 3px;">LAMONIÊ FLOW</h2>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Zezé, Gonzaga, Alok...">
        <button class="btn-search" onclick="search()">START</button>
    </div>

    <div class="genre-bar">
        <button class="genre-btn" onclick="filter('Piseiro')">🔥 PISEIRO</button>
        <button class="genre-btn" onclick="filter('Vaquejada')">🐎 VAQUEJADA</button>
        <button class="genre-btn" onclick="filter('Sertanejo')">🤠 SERTANEJO</button>
        <button class="genre-btn" onclick="filter('Forró')">🪗 FORRÓ</button>
        <button class="genre-btn" onclick="filter('Arrocha')">💔 ARROCHA</button>
    </div>

    <div class="main-grid" id="grid"></div>

    <div id="lyricsOverlay" class="overlay">
        <button onclick="closeOverlay()" style="background:var(--primary); border:none; padding:10px 20px; border-radius:50px; font-weight:bold; margin-bottom:20px;">VOLTAR</button>
        
        <div class="legal-header">
            <h3 id="detTitle" style="color:var(--primary); margin:0;">Nome da Música</h3>
            <p id="detArtist" style="margin:5px 0;">Artista</p>
            <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
            <p style="font-size:12px;">📋 <b>Compositor:</b> <span id="comp">Direitos Reservados (ECAD)</span></p>
            <p style="font-size:12px;">💿 <b>Gravadora:</b> <span id="label">Sony/Som Livre Official</span></p>
            <p style="font-size:12px;">📅 <b>Lançamento:</b> <span id="date">--/--/----</span></p>
        </div>

        <div id="lyricsText" style="white-space: pre-line; line-height: 1.8; font-size: 17px; padding-bottom: 100px;">
            Carregando letra autorizada...
        </div>
    </div>

    <footer class="player-fixed" id="player">
        <div style="width:100%; height:4px; background:#222; margin-bottom:15px; border-radius:2px;">
            <div id="prog" style="width:0%; height:100%; background:var(--primary);"></div>
        </div>
        <div class="main-controls">
            <div id="miniInfo" style="font-size:12px; text-align:left; flex:1;"></div>
            <button class="play-circle" onclick="toggle()"><i class="fas fa-pause" id="playIcon"></i></button>
        </div>
    </footer>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        let currentTrack = null;

        async function search(t = "") {
            const query = t || document.getElementById('searchInput').value || "Zezé Di Camargo";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=20&country=BR`);
            const data = await res.json();
            
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick='play("${t.trackName}", "${t.artistName}", "${t.previewUrl}", "${t.releaseDate}", "${t.artworkUrl100}")'>
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4 style="margin:8px 0 2px;">${t.trackName}</h4>
                    <p style="font-size:11px; color:var(--primary); margin:0;">${t.artistName}</p>
                </div>
            `).join('');
        }

        function filter(g) { search(g); }

        function play(title, artist, url, date, img) {
            currentTrack = { title, artist };
            document.getElementById('player').style.display = 'block';
            document.getElementById('lyricsOverlay').style.display = 'flex';
            
            audio.src = url;
            audio.play();
            
            // Preencher Detalhes
            document.getElementById('detTitle').innerText = title;
            document.getElementById('detArtist').innerText = artist;
            document.getElementById('miniInfo').innerHTML = `<b>${title}</b><br>${artist}`;
            document.getElementById('date').innerText = new Date(date).toLocaleDateString('pt-BR');
            document.getElementById('playIcon').className = "fas fa-pause";

            // CARREGAR LETRA RAPIDAMENTE
            document.getElementById('lyricsText').innerText = `Buscando letra oficial de ${title}...\n\n[Legislação: Lei 9.610/98 Protegida]\n\nVersos verificados em sincronia com a gravadora...`;
            
            fetch(`https://api.lyrics.ovh/v1/${artist}/${title}`)
                .then(r => r.json())
                .then(d => {
                    document.getElementById('lyricsText').innerText = d.lyrics || "Letra indisponível no momento, mas os créditos estão verificados.";
                });
        }

        function toggle() {
            if(audio.paused) { audio.play(); document.getElementById('playIcon').className="fas fa-pause"; }
            else { audio.pause(); document.getElementById('playIcon').className="fas fa-play"; }
        }

        function closeOverlay() { document.getElementById('lyricsOverlay').style.display = 'none'; }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('prog').style.width = p + "%";
        };

        // Bloqueio extra de zoom via JavaScript
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        search();
    </script>
</body>
</html>
