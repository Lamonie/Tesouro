<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; }

        header { padding: 20px 15px 5px; }
        header h1 { color: var(--primary); font-size: 24px; font-weight: 900; }
        .timestamp { color: var(--primary); font-size: 10px; padding: 0 15px 10px; opacity: 0.8; }

        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; }
        .cat-btn { background: #1c1c1e; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; flex-shrink: 0; }
        .cat-btn.active { background: var(--primary); color: #000; }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: #1c1c1e; border-radius: 10px; border: 1px solid #333; align-items: center; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; width: 100%; }

        /* ADIÇÃO: SEÇÃO DE PARADAS (IMG_7285.jpeg) */
        .charts-section { display: flex; gap: 12px; padding: 15px; overflow-x: auto; }
        .chart-card { min-width: 160px; aspect-ratio: 1/1; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; position: relative; cursor: pointer; }
        .chart-card h3 { font-size: 22px; font-weight: 900; line-height: 1.1; }
        .chart-card p { font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .chart-icon { position: absolute; bottom: 15px; left: 15px; background: white; color: black; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }

        /* LAYOUT PRESERVADO (IMG_7280.jpg) */
        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 150px; }
        .card { width: 47%; background: #1c1c1e; border-radius: 12px; padding: 8px; margin-bottom: 15px; border: 1px solid #2c2c2e; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; }
        .card h4 { font-size: 12px; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: #000; padding: 12px 20px; border-radius: 25px; font-weight: 800; width: fit-content; }
        
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1c1c1e; }

        /* PLAYER MINIMIZÁVEL */
        .player { position: fixed; bottom: 0; width: 100%; background: rgba(28,28,30,0.95); backdrop-filter: blur(15px); padding: 10px 20px 30px; border-top: 1px solid #38383a; z-index: 10001; transition: transform 0.3s ease; }
        .player.minimized { transform: translateY(75%); }
        .minimize-toggle { width: 36px; height: 5px; background: #48484a; border-radius: 10px; margin: 0 auto 10px; }
        .play-trigger { background: var(--primary); border: none; width: 42px; height: 42px; border-radius: 50%; color: #000; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header><h1>LAMONIÊ FLOW</h1></header>
    <div class="timestamp" id="timeDisplay">05/04/2026 00:00:00</div>

    <div class="categories-nav" id="catNav"></div>
    <div class="search-container"><div class="search-box"><input type="text" id="searchInput" placeholder="O que você quer ouvir?" onchange="search(this.value)"></div></div>
    
    <div class="charts-section">
        <div class="chart-card" style="background: #6a1b9a;" onclick="search('Top Mundo')">
            <p>Paradas Musicais</p>
            <h3>Top<br>Músicas<br>Mundo</h3>
            <div class="chart-icon"><i class="fas fa-arrow-up"></i></div>
        </div>
        <div class="chart-card" style="background: #4d7c6d;" onclick="search('Top Brasil')">
            <p>Paradas Musicais</p>
            <h3>Top<br>Músicas<br>Brasil</h3>
            <div class="chart-icon"><i class="fas fa-arrow-up"></i></div>
        </div>
    </div>

    <div class="main-grid" id="grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina('albumPage')">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player" style="display:none;" onclick="toggleMinimize()">
        <div class="minimize-toggle"></div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1; overflow: hidden; margin-right: 10px;">
                <h4 id="trackTitle" style="font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:11px; color:var(--primary);">Artista</p>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        // Atualiza relógio (como na IMG_7277.jpg)
        setInterval(() => {
            const now = new Date();
            document.getElementById('timeDisplay').innerText = now.toLocaleString('pt-BR');
        }, 1000);

        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');
        const player = document.getElementById('player');
        const generos = ["Destaques", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Arrocha"];
        const mestresForro = ["Luiz Gonzaga", "Dominguinhos", "Flávio José", "Elba Ramalho"];

        function carregarGeneros() {
            document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn ${g === 'Destaques' ? 'active' : ''}" onclick="selecionarGenero(this, '${g}')">${g}</button>`).join('');
        }

        function selecionarGenero(btn, g) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(g === "Destaques") carregarDestaques(); else search(g);
        }

        async function carregarDestaques() {
            grid.innerHTML = "";
            for (const artista of mestresForro) {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artista)}&entity=album&limit=6&country=BR`);
                const data = await res.json();
                data.results.forEach(t => renderCard(t));
            }
        }

        function renderCard(t) {
            grid.innerHTML += `<div class="card" onclick="abrirAlbum('${t.collectionId}')">
                <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                <h4>${t.collectionName}</h4>
                <p style="font-size:10px; color:#8e8e93;">${t.artistName}</p>
            </div>`;
        }

        async function search(q) {
            grid.innerHTML = "";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=album&limit=20&country=BR`);
            const data = await res.json();
            data.results.forEach(t => renderCard(t));
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            const content = document.getElementById('albumDetailContent');
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            const musicas = data.results.slice(1);
            
            content.innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:75%; border-radius:12px;">
                    <h2 style="margin-top:20px;">${album.collectionName}</h2>
                    <p style="color:var(--primary);">${album.artistName}</p>
                </div>
                <div style="padding-bottom: 150px;">
                    ${musicas.map((m, i) => `
                        <div class="track-row" onclick="tocar('${m.trackName.replace(/'/g, "")}', '${m.artistName}', '${m.previewUrl}')">
                            <span style="color:#48484a; width:30px;">${i+1}</span>
                            <div style="flex:1;"><div>${m.trackName}</div></div>
                            <i class="fas fa-play-circle" style="color:var(--primary);"></i>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function tocar(nome, artista, url) {
            audio.src = url; audio.play();
            player.style.display = 'block';
            player.classList.remove('minimized');
            document.getElementById('trackTitle').innerText = nome;
            document.getElementById('trackArtist').innerText = artista;
        }

        function togglePlay() {
            if(audio.paused) audio.play(); else audio.pause();
        }

        function toggleMinimize() { player.classList.toggle('minimized'); }
        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }
        
        carregarGeneros();
        carregarDestaques();
    </script>
</body>
</html>
