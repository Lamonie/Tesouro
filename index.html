<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamoniê Rádio PRO</title>

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0}
header{text-align:center;padding:20px;font-size:25px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:15px}
.card{background:#111;padding:15px;border-radius:15px;text-align:center;cursor:pointer}
.player{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:90%;background:#111;padding:10px;border-radius:20px;display:flex;justify-content:space-between}
button{background:none;border:none;color:#fff;font-size:25px}
</style>
</head>

<body>

<header>📻 Lamoniê Rádio</header>

<div id="grid" class="grid"></div>

<div class="player">
<div>
<b id="t">Selecione</b><br>
<small>AO VIVO</small>
</div>
<button onclick="toggle()">
▶
</button>
</div>

<audio id="audio"></audio>

<script>

const audio = document.getElementById("audio")

async function carregar(){

let res = await fetch("https://de1.api.radio-browser.info/json/stations/bycountry/brazil?limit=20")
let data = await res.json()

document.getElementById("grid").innerHTML =
data.map(r=>`
<div class="card" onclick="play('${r.url_resolved}','${r.name}')">
📻
<b>${r.name}</b>
</div>
`).join("")

}

function play(url,nome){
audio.src = url
audio.load()
audio.play().catch(()=>{
alert("Essa rádio não liberou o stream 😢")
})
document.getElementById("t").innerText = nome
}

function toggle(){
audio.paused ? audio.play() : audio.pause()
}

carregar()

</script>

</body>
</html>
