<script>
    const audio = document.getElementById('audioMain');
    const grid = document.getElementById('grid');
    
    function toggleGenres() {
        const nav = document.getElementById('catNav');
        nav.style.display = (nav.style.display === 'flex') ? 'none' : 'flex';
    }

    const generos = ["Início", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Brega", "Arrocha", "Pagode", "Gospel", "Rock"];
    document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn" onclick="buscarSuperApi('${g}', this)">${g}</button>`).join('');

    async function buscarSuperApi(termo, btn) {
        if(btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        grid.innerHTML = "<p style='padding:20px; color:#555;'>Sincronizando bibliotecas...</p>";
        const busca = termo === "Início" ? "Luiz Gonzaga" : termo;

        // Criamos uma lista de promessas que não travam o código se uma falhar
        const promessas = [
            fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(busca)}&entity=album&limit=15`).then(r => r.json()).catch(() => ({results: []})),
            fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.deezer.com/search/album?q=' + busca)}`).then(r => r.json()).then(d => JSON.parse(d.contents)).catch(() => ({data: []})),
            fetch(`https://api.jamendo.com/v3.0/albums/?client_id=56d30cce&format=json&name=${encodeURIComponent(busca)}&limit=10`).then(r => r.json()).catch(() => ({results: []}))
        ];

        try {
            const [dataiTunes, dataDeezer, dataJamendo] = await Promise.all(promessas);

            let cards = "";

            // iTunes
            if(dataiTunes.results) {
                dataiTunes.results.forEach(t => cards += criarCard(t.collectionName, t.artworkUrl100.replace('100x100', '400x400'), t.collectionId, 'itunes'));
            }

            // Deezer
            if(dataDeezer.data) {
                dataDeezer.data.forEach(t => cards += criarCard(t.title, t.cover_medium, t.id, 'deezer'));
            }

            // Jamendo
            if(dataJamendo.results) {
                dataJamendo.results.forEach(t => cards += criarCard(t.name, t.image || 'https://via.placeholder.com/400', t.id, 'jamendo'));
            }

            grid.innerHTML = cards || "<p style='padding:20px;'>Nenhum resultado encontrado nesta busca.</p>";
        } catch (e) { 
            grid.innerHTML = "<p style='padding:20px;'>Erro ao conectar com os servidores. Tente novamente.</p>"; 
        }
    }

    // ... mantenha as funções criarCard, abrirAlbum e tocar como estavam ...
</script>
