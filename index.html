<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1db954; /* Verde Spotify padrão */
            --bg: #000000; 
            --surface: #121212; 
            --card-hover: #282828;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        * { box-sizing: border-box; touch-action: manipulation; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Circular Std', 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }

        /* FUNDO LIMPO - SEM TIMELINE OU AURORA AGRESSIVA */
        .bg-static { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(180deg, #121212 0%, #000 100%); 
            z-index: -1; 
        }

        header { padding: 30px 20px 10px; }
        header h1 { color: var(--primary); font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        header p { color: var(--text-sub); font-size: 12px; font-weight: bold; margin-top: 4px; }

        /* NAVEGAÇÃO SEM BORDAS NEON */
        .categories-nav { 
            display: flex; 
            overflow-x: auto; 
            padding: 15px 20px; 
            gap: 12px; 
            scrollbar-width: none; 
        }
        .categories-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: #2a2a2a; 
            border: none; 
            color: white; 
            padding: 8px 16px; 
            border-radius: 20px; 
            white-space: nowrap; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer;
            transition: background 0.2s;
        }
        .cat-btn.active { background: var(--primary); color: black; }

        /* BUSCA DISCRETA */
        .search-container { padding: 10px 20px 20px; }
        .search-box { 
            display: flex; 
            background: #242424; 
            border-radius: 4px; 
            padding: 2px; 
            border: 1px solid transparent;
        }
        .search-box input { 
            background: none; 
            border: none; 
            color: white; 
            flex: 1; 
            padding: 12px; 
            outline: none; 
            font-size: 14px; 
        }
        .btn-start { background: none; border: none; color: var(--text-sub); padding: 0 15px; cursor: pointer; }

        /* GRID DE CARDS ESTILO SPOTIFY - SEM BRILHO EXTERNO */
        .main-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
            padding: 0 20px 150px; 
        }
        .card { 
            background: #181818; 
            border-radius: 8px; 
            padding: 12px; 
            transition: background 0.3s;
            border: none; /* LED REMOVIDO */
            box-shadow: none; /* LED REMOVIDO */
        }
        .card img { 
            width: 100%; 
            border-radius: 4px; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .card h4 { margin: 12px 0 4px; font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { color: var(--text-sub); font-size: 12px; }

        /* PÁGINA DE ÁLBUM */
        .full-page { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #121212; 
            z-index: 9999; 
            display: none; 
            flex-direction: column; 
            overflow-y: auto; 
        }
        .btn-voltar {
            margin: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            width: fit-content;
        }
        .album-header { 
            padding: 20px; 
            background: linear-gradient(180deg, #282828 0%, #121212 100%); 
            text-align: center; 
        }
        .album-header img { width: 200px; height: 200px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* PLAYER RODAPÉ - ESTILO FLAT */
        .player { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #000; 
            padding: 10px 20px 25px; 
            border-top: 1px solid #282828; 
            z-index: 10001; 
            display: none; 
        }
        .player-info h4 { font-size: 14px; margin-bottom: 2px; }
        .player-info p { font-size: 12px; color: var(--primary); }
        .play-trigger { background: white; border: none; width: 45px; height: 45px; border-radius: 50%; color: black; font-size: 18px; }

        /* LISTA DE MÚSICAS */
        .track-row { display: flex; align-items: center; padding: 12px 20px; transition: background 0.2s; }
        .track-row:active { background: #282828; }
        .track-num { color: var(--text-sub); width: 30px; font-size: 14px; }
        .track-meta { flex: 1; }
        .track-meta div { font-size: 14px; }
    </style>
</head>
<body>
    <div class="bg-static"></div>

    <div id="homePage">
        <header>
            <h1>LAMONIÊ FLOW</h1>
            <p>SÓ HITS</p>
        </header>

        <div class="categories-nav">
            <button class="cat-btn active" onclick="carregarHome()">Destaques</button>
            <button class="cat-btn" onclick="search('Vaquejada')">Vaquejada</button>
            <button class="cat-btn" onclick="search('Piseiro')">Piseiro</button>
            <button class="cat-btn" onclick="search('Forró')">Forró</button>
            <button class="cat-btn" onclick="search('Sertanejo')">Sertanejo</button>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="O que você quer ouvir?">
                <button class="btn-start" onclick="search()"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="main-grid" id="grid"></div>
    </div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina('albumPage')"><i class="fas fa-chevron-left"></i> VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="player-info">
                <h4 id="trackTitle">Música</h4>
                <p id="trackArtist">Artista</p>
            </div>
            <button onclick="togglePlay()" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');

        // Albuns reais para carregar na home
        const albunsIniciais = ["Wesley Safadao", "Nattanzinho", "Mari Fernandez", "Jorge e Mateus", "Henrique e Juliano", "Ze Neto e Cristiano"];

        async function carregarHome() {
            grid.innerHTML = "";
            for (const artista of albunsIniciais) {
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artista)}&entity=album&limit=1&country=BR`);
                    const data = await res.json();
                    if (data.results.length > 0) {
                        const t = data.results[0];
                        grid.innerHTML += `
                            <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                                <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                                <h4>${t.collectionName}</h4>
                                <p>${t.artistName}</p>
                            </div>
                        `;
                    }
                } catch (e) {}
            }
        }

        async function search(q = "") {
            const term = q || document.getElementById('searchInput').value;
            if(!term) return;
            grid.innerHTML = "<p style='padding:20px; color:#b3b3b3;'>Buscando...</p>";
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=20&country=BR`);
                const data = await res.json();
                grid.innerHTML = data.results.map(t => `
                    <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                        <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                        <h4>${t.collectionName}</h4>
                        <p>${t.artistName}</p>
                    </div>
                `).join('');
            } catch (e) { grid.innerHTML = "<p>Erro na busca.</p>"; }
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            document.getElementById('albumDetailContent').innerHTML = "<p style='padding:20px;'>Carregando tracks...</p>";
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
                const data = await res.json();
                const album = data.results[0];
                const tracks = data.results.slice(1);

                document.getElementById('albumDetailContent').innerHTML = `
                    <div class="album-header">
                        <img src="${album.artworkUrl100.replace('100x100', '600x600')}">
                        <h2 style="margin-top:20px;">${album.collectionName}</h2>
                        <p style="color:#b3b3b3;">${album.artistName}</p>
                    </div>
                    <div style="padding-bottom: 150px; background: #121212;">
                        ${tracks.map((t, i) => `
                            <div class="track-row" onclick="tocarTrack('${t.trackName.replace(/'/g, "\\'")}', '${t.artistName.replace(/'/g, "\\'")}', '${t.previewUrl}')">
                                <span class="track-num">${i+1}</span>
                                <div class="track-meta">
                                    <div>${t.trackName}</div>
                                </div>
                                <i class="fas fa-play" style="color:#b3b3b3; font-size:12px;"></i>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {}
        }

        function tocarTrack(name, artist, url) {
            audio.src = url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = name;
            document.getElementById('trackArtist').innerText = artist;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }
        
        carregarHome();
    </script>
</body>
</html>
