<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | PRO EXPERIENCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff88; 
            --accent: #60efff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        /* TRAVA DE PINÇA (ZOOM), MAS LIBERA ROLAGEM */
        * { 
            box-sizing: border-box; 
            -webkit-user-select: none;
            /* touch-action permite rolagens, mas desativa o pinch-zoom em navegadores modernos */
            touch-action: pan-x pan-y; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; 
            color: white;
            /* O overflow aqui é permitido para que o site role */
            overflow-x: hidden; 
        }

        /* FUNDO DEGRADÊ ESTILO PALCO / FESTIVAL */
        .stage-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            z-index: -2;
        }

        .light-beams {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(96, 239, 255, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: moveLights 10s ease infinite alternate;
        }

        @keyframes moveLights {
            from { opacity: 0.4; }
            to { opacity: 0.8; }
        }

        /* CABEÇALHO */
        header { padding: 30px 20px 10px; text-align: left; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: -1px; margin: 0; }
        .logo span { color: var(--primary); }
        .subtitle { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin-top: 5px; opacity: 0.7; }

        /* NAVEGAÇÃO DE GÊNEROS (SOMENTE TEXTO) */
        .nav-scroll { 
            display: flex; overflow-x: auto; padding: 15px 20px; gap: 10px; 
            scrollbar-width: none;
        }
        .nav-scroll::-webkit-scrollbar { display: none; }
        
        .nav-item { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 10px 22px; border-radius: 6px; 
            white-space: nowrap; font-size: 12px; font-weight: 700; 
            text-transform: uppercase; transition: 0.3s;
        }
        .nav-item.active { 
            background: var(--primary); color: #000; border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        /* BUSCA PROFISSIONAL */
        .search-container { padding: 0 20px; margin-bottom: 25px; }
        .search-bar { 
            display: flex; background: rgba(255,255,255,0.07); 
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 5px;
            backdrop-filter: blur(10px);
        }
        .search-bar input { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; font-size: 15px; }
        .btn-search { background: var(--primary); border: none; color: #000; padding: 0 20px; border-radius: 8px; font-weight: 800; }

        /* GRID DE ÁLBUNS 2025 */
        .content-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            padding: 0 20px 120px;
        }
        
        .album-card { 
            background: rgba(0,0,0,0.3); border-radius: 15px; padding: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .album-card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; }
        .album-card h3 { font-size: 14px; margin: 10px 0 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .album-card p { font-size: 11px; color: var(--primary); margin: 0; font-weight: 500; }

        /* PLAYER FLUTUANTE */
        .mini-player { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: rgba(15, 15, 30, 0.9); backdrop-filter: blur(20px);
            padding: 15px; border-radius: 15px; border: 1px solid var(--primary);
            display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="stage-background"></div>
    <div class="light-beams"></div>

    <div id="app">
        <header>
            <h1 class="logo">LAMONIÊ <span>FLOW</span></h1>
            <div class="subtitle">Streaming Professional Experience</div>
        </header>

        <div class="nav-scroll">
            <button class="nav-item active" onclick="loadAlbums('Top Albums 2025')">Destaques 2025</button>
            <button class="nav-item" onclick="loadAlbums('Vaquejada 2025')">Vaquejada</button>
            <button class="nav-item" onclick="loadAlbums('Piseiro 2025')">Piseiro</button>
            <button class="nav-item" onclick="loadAlbums('Sertanejo 2025')">Sertanejo</button>
            <button class="nav-item" onclick="loadAlbums('Pop Hits 2025')">Pop</button>
            <button class="nav-item" onclick="loadAlbums('Rock Classics')">Rock</button>
            <button class="nav-item" onclick="loadAlbums('Dance 2025')">Eletrônica</button>
        </div>

        <div class="search-container">
            <div class="search-bar">
                <input type="text" id="userInput" placeholder="Buscar artista ou álbum...">
                <button class="btn-search" onclick="loadAlbums()">BUSCAR</button>
            </div>
        </div>

        <div class="content-grid" id="grid">
            </div>
    </div>

    <footer class="mini-player" id="player">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div style="overflow: hidden; flex: 1;">
                <div id="play-title" style="font-weight: 800; font-size: 14px;">Música</div>
                <div id="play-artist" style="font-size: 11px; color: var(--primary);">Artista</div>
            </div>
            <button onclick="toggleAudio()" style="background: var(--primary); border:none; width:45px; height:45px; border-radius:50%; margin-left: 15px;">
                <i class="fas fa-pause" id="play-icon"></i>
            </button>
        </div>
    </footer>

    <audio id="mainAudio"></audio>

    <script>
        const audio = document.getElementById('mainAudio');

        // FUNÇÃO PARA CARREGAR ÁLBUNS FAMOSOS DE 2025
        async function loadAlbums(query = "") {
            const term = query || document.getElementById('userInput').value || "2025 Hits";
            const grid = document.getElementById('grid');
            
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=20&country=BR`);
                const data = await res.json();
                
                grid.innerHTML = data.results.map(album => `
                    <div class="album-card" onclick="playFirstTrack('${album.collectionId}')">
                        <img src="${album.artworkUrl100.replace('100x100', '600x600')}" alt="Capa">
                        <h3>${album.collectionName}</h3>
                        <p>${album.artistName}</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Erro ao buscar álbuns.");
            }
        }

        async function playFirstTrack(id) {
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const song = data.results[1]; // A primeira música após o objeto do álbum

            if(song) {
                audio.src = song.previewUrl;
                audio.play();
                document.getElementById('player').style.display = 'block';
                document.getElementById('play-title').innerText = song.trackName;
                document.getElementById('play-artist').innerText = song.artistName;
                document.getElementById('play-icon').className = 'fas fa-pause';
            }
        }

        function toggleAudio() {
            const icon = document.getElementById('play-icon');
            if(audio.paused) {
                audio.play();
                icon.className = 'fas fa-pause';
            } else {
                audio.pause();
                icon.className = 'fas fa-play';
            }
        }

        // TRAVA DE PINÇA (ZOOM) VIA JAVASCRIPT PARA SEGURANÇA EXTRA
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('gesturestart', function (event) {
            event.preventDefault();
        });

        // CARREGAMENTO INICIAL
        loadAlbums('Melhores Álbuns 2025');
    </script>
</body>
</html>
