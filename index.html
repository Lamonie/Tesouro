<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1db954; 
            --bg: #000000; 
            --surface: #121212; 
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        * { box-sizing: border-box; touch-action: manipulation; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden;
        }

        .bg-static { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: -1; }

        header { padding: 25px 15px 15px; text-align: left; }
        header h1 { color: #1db954; font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
        
        /* DATA E HORA REMOVIDOS DAQUI */

        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 10px; scrollbar-width: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: #2a2a2a; border: none; color: white; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-size: 13px; font-weight: 600; }
        .cat-btn.active { background: var(--primary); color: black; }

        .search-container { padding: 5px 15px 15px; }
        .search-box { display: flex; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; align-items: center; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; font-size: 14px; }
        .btn-start { background: none; border: none; color: var(--text-sub); padding: 0 15px; cursor: pointer; }

        /* TRAVA RÍGIDA DE LAYOUT: SEMPRE 2 COLUNAS */
        .main-grid { 
            display: grid !important; 
            grid-template-columns: repeat(2, 1fr) !important; 
            gap: 12px; 
            padding: 0 12px 150px;
            width: 100%;
        }

        .card { 
            background: #181818; 
            border-radius: 8px; 
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            border: 1px solid #282828;
            transition: 0.3s;
        }

        .card img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 4px; 
            object-fit: cover; 
            margin-bottom: 8px;
        }

        .card h4 { 
            font-size: 13px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            color: #fff; 
            margin-bottom: 4px;
        }

        .card p { color: var(--text-sub); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: #1db954; border: none; color: black; padding: 10px 20px; border-radius: 25px; font-weight: 800; font-size: 12px; cursor: pointer; }
        
        .album-header { padding: 20px; text-align: center; }
        .album-header img { width: 220px; height: 220px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .track-num { color: var(--text-sub); width: 35px; font-size: 14px; }
        
        .player { position: fixed; bottom: 0; width: 100%; background: rgba(18,18,18,0.95); padding: 15px 20px 40px; border-top: 1px solid #282828; z-index: 10001; display: none; backdrop-filter: blur(10px); }
        .play-trigger { background: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-static"></div>

    <div id="homePage">
        <header>
            <h1>LAMONIÊ FLOW</h1>
        </header>

        <div class="categories-nav" id="catNav"></div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="O que você quer ouvir?">
                <button class="btn-start" onclick="search()"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="main-grid" id="grid"></div>
    </div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina('albumPage')"><i class="fas fa-arrow-left"></i> VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1; overflow: hidden; margin-right: 15px;">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:12px; color:var(--primary);">Artista</p>
            </div>
            <button onclick="togglePlay()" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');

        const generos = ["Destaques", "Forró", "Vaquejada", "Piseiro", "Arrocha", "Sertanejo", "Brega", "Funk", "Trap", "Pagode"];
        const artistasIniciais = ["Wesley Safadão", "Nattanzinho", "Mari Fernandez", "João Gomes", "Tarcísio do Acordeon", "Henrique e Juliano"];

        function carregarGeneros() {
            document.getElementById('catNav').innerHTML = generos.map(g => `
                <button class="cat-btn ${g === 'Destaques' ? 'active' : ''}" onclick="selecionarGenero(this, '${g}')">${g}</button>
            `).join('');
        }

        function selecionarGenero(btn, g) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(g === 'Destaques') carregarHome(); else search(g);
        }

        async function carregarHome() {
            grid.innerHTML = "";
            for (const nome of artistasIniciais) {
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(nome)}&entity=album&limit=6&country=BR`);
                    const data = await res.json();
                    data.results.forEach(t => renderCard(t));
                } catch (e) {}
            }
        }

        function renderCard(t) {
            grid.innerHTML += `
                <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4>${t.collectionName}</h4>
                    <p>${t.artistName}</p>
                </div>
            `;
        }

        async function search(q = "") {
            const term = q || document.getElementById('searchInput').value;
            if(!term) return;
            grid.innerHTML = "";
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=40&country=BR`);
                const data = await res.json();
                data.results.forEach(t => renderCard(t));
            } catch (e) {}
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            document.getElementById('albumDetailContent').innerHTML = "<p style='padding:30px;'>Carregando álbum...</p>";
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
                const data = await res.json();
                const album = data.results[0];
                const musicas = data.results.slice(1);
                document.getElementById('albumDetailContent').innerHTML = `
                    <div class="album-header">
                        <img src="${album.artworkUrl100.replace('100x100', '600x600')}">
                        <h2 style="margin-top:20px; font-size:20px;">${album.collectionName}</h2>
                        <p style="color:var(--primary);">${album.artistName}</p>
                    </div>
                    <div style="padding-bottom: 150px;">
                        ${musicas.map((m, i) => `
                            <div class="track-row" onclick="tocar('${m.trackName.replace(/'/g, "\\'")}', '${m.artistName.replace(/'/g, "\\'")}', '${m.previewUrl}')">
                                <span class="track-num">${i+1}</span>
                                <div style="flex:1; overflow:hidden;">
                                    <div style="font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${m.trackName}</div>
                                    <div style="font-size:12px; color:#b3b3b3;">${m.artistName}</div>
                                </div>
                                <i class="fas fa-play" style="color:#1db954; font-size:14px;"></i>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {}
        }

        function tocar(nome, artista, url) {
            audio.src = url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = nome;
            document.getElementById('trackArtist').innerText = artista;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }

        carregarGeneros();
        carregarHome();
    </script>
</body>
</html>
