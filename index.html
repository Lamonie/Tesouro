<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #94b3ce; 
            --bg: #000000; 
            --text-main: #ffffff; 
            --player-bg: rgba(20, 20, 20, 0.95); 
            --playing-color: #ffff00; 
            --active-song: #007bff;
            --gray-card: #1c1c1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; min-height: 100vh; }

        header { padding: 25px 20px 10px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: var(--gray-card); border-radius: 12px; align-items: center; padding: 0 12px; gap: 10px; }
        .search-box i { color: #888; font-size: 18px; padding: 10px 5px; cursor: pointer; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 12px 0; outline: none; font-size: 16px; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 180px; }
        .card { width: 47%; background: var(--gray-card); border-radius: 15px; padding: 8px; margin-bottom: 20px; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        /* Box de Detalhes do Álbum */
        .album-details-container { padding: 0 20px 20px; text-align: center; }
        .album-info-text { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-top: 15px; text-align: left; }
        .album-info-text p { font-size: 14px; margin-bottom: 5px; color: #bbb; }
        .album-info-text b { color: var(--primary); }

        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .track-info { flex: 1; }
        .track-title { color: white; font-size: 15px; font-weight: 500; }
        
        .player { position: fixed; bottom: 30px; left: 12px; right: 12px; background: var(--player-bg); border-radius: 18px; padding: 10px 15px; z-index: 10002; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>
    
    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-microphone" id="btnMic" onclick="iniciarVoz()"></i>
            <input type="text" id="searchInput" placeholder="Buscar música ou artista..." onkeyup="if(event.key==='Enter') buscar(this.value)">
            <i class="fas fa-times-circle" id="btnLimpar" style="display:none;" onclick="limpar()"></i>
            <i class="fas fa-search" onclick="buscar(document.getElementById('searchInput').value)"></i>
        </div>
    </div>

    <div id="grid" class="main-grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumContent"></div>
    </div>

    <footer class="player" id="player" style="display:none;">
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="pArt" src="" style="width:45px; height:45px; border-radius:8px;">
            <div style="flex:1; overflow:hidden;"><div id="pTitle" style="font-weight:bold; font-size:14px; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">Título</div></div>
            <i class="fas fa-pause" id="pPlay" onclick="toggle()" style="color:var(--playing-color); font-size:24px;"></i>
        </div>
    </footer>

    <audio id="mainAudio"></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        const input = document.getElementById('searchInput');

        // FUNÇÃO DO MICROFONE CORRIGIDA
        function iniciarVoz() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) return alert("Navegador não suporta voz.");
            
            const rec = new Recognition();
            rec.lang = 'pt-BR';
            document.getElementById('btnMic').style.color = "red";
            
            rec.onresult = (e) => {
                const texto = e.results[0][0].transcript;
                input.value = texto;
                document.getElementById('btnLimpar').style.display = 'block';
                buscar(texto);
            };
            rec.onend = () => document.getElementById('btnMic').style.color = "#888";
            rec.start();
        }

        function limpar() { input.value = ''; document.getElementById('btnLimpar').style.display = 'none'; }

        async function buscar(termo) {
            if(!termo) return;
            const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=album&limit=40`);
            const d = await r.json();
            document.getElementById('grid').innerHTML = d.results.map(a => `
                <div class="card" onclick="abrir('${a.collectionId}', '${a.artworkUrl100}')">
                    <img src="${a.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:8px; font-weight:600; font-size:13px; color:#eee;">${a.collectionName}</p>
                </div>`).join('');
        }

        // FUNÇÃO DE ABRIR ÁLBUM COM DESCRIÇÃO COMPLETA
        async function abrir(id, capa) {
            document.getElementById('albumPage').style.display = 'flex';
            const r = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const d = await r.json();
            
            const info = d.results[0]; // Dados do álbum
            const musicas = d.results.slice(1); // Lista de músicas
            const ano = new Date(info.releaseDate).getFullYear();

            document.getElementById('albumContent').innerHTML = `
                <div class="album-details-container">
                    <img src="${capa.replace('100x100', '600x600')}" style="width:220px; border-radius:15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
                    
                    <div class="album-info-text">
                        <p><b>Gênero:</b> ${info.primaryGenreName}</p>
                        <p><b>Lançamento:</b> ${ano}</p>
                        <p><b>Compositor/Artista:</b> ${info.artistName}</p>
                        <p><b>Gravadora:</b> ${info.copyright || 'Independente'}</p>
                    </div>
                </div>

                ${musicas.map(m => `
                    <div class="track-row" onclick="tocar('${m.previewUrl}', '${m.trackName}', '${capa}')">
                        <div class="track-info">
                            <div class="track-title">${m.trackName}</div>
                            <div style="font-size:12px; color:#666;">${m.artistName}</div>
                        </div>
                        <i class="fas fa-play-circle" style="font-size:22px; color:#fff;"></i>
                    </div>`).join('')}`;
        }

        function tocar(url, nome, capa) {
            audio.src = url;
            audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('pArt').src = capa;
            document.getElementById('pTitle').innerText = nome;
            document.getElementById('pPlay').className = 'fas fa-pause';
        }

        function toggle() {
            if(audio.paused) { audio.play(); document.getElementById('pPlay').className = 'fas fa-pause'; }
            else { audio.pause(); document.getElementById('pPlay').className = 'fas fa-play'; }
        }

        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }
        
        buscar("Luiz Gonzaga");
    </script>
</body>
</html>
