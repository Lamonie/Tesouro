<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicFlow Pro | Benedito</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1db954;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background: var(--bg-dark); color: white; overflow: hidden; height: 100vh; }

        /* FUNDO ANIMADO COM CORES E FOTOS EM LOOP */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: linear-gradient(45deg, #0f0c29, #302b63, #1db95422);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .bg-artists-loop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15; pointer-events: none;
        }

        .artist-bg-img {
            position: absolute; width: 300px; height: 300px; border-radius: 50%;
            filter: blur(20px); animation: float 20s infinite linear;
        }

        @keyframes gradientMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        @keyframes float { 
            0% { transform: translate(-100%, -100%) rotate(0deg); }
            100% { transform: translate(200%, 200%) rotate(360deg); }
        }

        /* LAYOUT */
        .app-container { display: grid; grid-template-columns: 240px 1fr; grid-template-rows: 1fr 110px; height: 100vh; backdrop-filter: blur(40px); }

        .sidebar { background: rgba(0,0,0,0.7); padding: 25px; border-right: 1px solid var(--glass); }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 40px; }

        .main-content { overflow-y: auto; padding: 30px; padding-bottom: 150px; }
        
        .search-box {
            background: var(--glass); display: flex; align-items: center;
            padding: 15px 25px; border-radius: 40px; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input { background: none; border: none; color: white; margin-left: 15px; width: 100%; outline: none; font-size: 16px; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .card {
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px;
            transition: 0.4s; cursor: pointer; text-align: center; border: 1px solid transparent;
        }
        .card:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); border-color: var(--primary); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }

        /* PLAYER */
        .player {
            grid-column: 1 / -1; background: rgba(10, 10, 10, 0.95);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
            border-top: 1px solid var(--glass);
        }
        .info { display: flex; align-items: center; gap: 15px; width: 300px; }
        .info img { width: 60px; height: 60px; border-radius: 8px; border: 2px solid var(--primary); }
        
        .controls { flex: 1; max-width: 600px; text-align: center; }
        .btns { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 10px; }
        .btns button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .play-btn { background: white !important; color: black !important; width: 45px; height: 45px; border-radius: 50%; }
        .play-btn:hover { transform: scale(1.1); }

        .progress-bar { width: 100%; height: 5px; background: #333; border-radius: 5px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 5px; }
        .time { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-artists-loop" id="bg-loop"></div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-play-circle"></i> MusicFlow</div>
            <p style="font-size: 12px; color: #666;">Olá, Benedito!</p>
        </aside>

        <main class="main-content">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="busca" placeholder="Busque artistas ou músicas reais...">
            </div>
            <h2>Artistas em Destaque</h2>
            <div class="grid" id="grid"></div>
        </main>

        <footer class="player">
            <div class="info">
                <img src="https://cdn-icons-png.flaticon.com/512/3844/3844724.png" id="p-img">
                <div>
                    <b id="p-nome">Selecione um artista</b><br>
                    <small id="p-track" style="color: #aaa;">Pronto para tocar</small>
                </div>
            </div>
            <div class="controls">
                <div class="btns">
                    <button onclick="voltar()"><i class="fas fa-step-backward"></i></button>
                    <button onclick="toggle()" class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
                    <button onclick="proxima()"><i class="fas fa-step-forward"></i></button>
                </div>
                <div class="progress-bar" id="bar-container">
                    <div class="progress-fill" id="fill"></div>
                </div>
                <div class="time">
                    <span id="curr-time">00:00:00</span>
                    <span id="total-time">00:30:00</span>
                </div>
            </div>
            <div style="width: 150px; text-align: right;"><i class="fas fa-volume-up"></i></div>
        </footer>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // DADOS REAIS DE EXEMPLO (Imagens e Sons Diretos)
        const artistas = [
            { 
                nome: "Alok", 
                foto: "https://www.cnnbrasil.com.br/wp-content/uploads/sites/12/2023/08/alok-show-do-seculo.jpg", 
                musica: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" 
            },
            { 
                nome: "Luiz Gonzaga", 
                foto: "https://m.extra.globo.com/incoming/24131557-0bc-434/w640h360-PROP/luiz-gonzaga.jpg", 
                musica: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" 
            },
            { 
                nome: "The Weeknd", 
                foto: "https://p2.trrsf.com/image/fget/cf/1200/1200/middle/images.terra.com/2023/10/08/1313791090-the-weeknd.jpg", 
                musica: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" 
            }
        ];

        const grid = document.getElementById('grid');
        const audio = document.getElementById('audio-player');
        const bgLoop = document.getElementById('bg-loop');

        // Criar artistas flutuando no fundo
        artistas.forEach((a, index) => {
            const img = document.createElement('img');
            img.src = a.foto;
            img.className = 'artist-bg-img';
            img.style.left = (Math.random() * 80) + "%";
            img.style.top = (Math.random() * 80) + "%";
            img.style.animationDelay = (index * 5) + "s";
            bgLoop.appendChild(img);
        });

        function carregar(filtro = "") {
            grid.innerHTML = "";
            artistas.filter(a => a.nome.toLowerCase().includes(filtro.toLowerCase())).forEach(a => {
                grid.innerHTML += `
                    <div class="card" onclick="play('${a.nome}', '${a.foto}', '${a.musica}')">
                        <img src="${a.foto}">
                        <h3>${a.nome}</h3>
                        <p style="font-size: 12px; color: #888;">Tocar Música</p>
                    </div>
                `;
            });
        }

        function play(nome, foto, link) {
            document.getElementById('p-nome').innerText = nome;
            document.getElementById('p-track').innerText = "Tocando agora...";
            document.getElementById('p-img').src = foto;
            audio.src = link;
            audio.play();
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function toggle() {
            if (audio.paused) {
                audio.play();
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        // Atualizar Barra de Progresso e Milissegundos
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fill').style.width = pct + "%";
            
            const cur = audio.currentTime;
            const m = Math.floor(cur / 60).toString().padStart(2, '0');
            const s = Math.floor(cur % 60).toString().padStart(2, '0');
            const ms = Math.floor((cur % 1) * 100).toString().padStart(2, '0');
            document.getElementById('curr-time').innerText = `${m}:${s}:${ms}`;
        };

        carregar();
        document.getElementById('busca').oninput = (e) => carregar(e.target.value);
    </script>
</body>
</html>
