<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | INFINITE EXPERIENCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #0b0b0b; --glass: rgba(255,255,255,0.08); }

        /* TRAVA DE PINÇA E ROLAGEM */
        * { box-sizing: border-box; touch-action: pan-x pan-y; -webkit-user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* FUNDO COM LOOP ANIMADO INFINITO */
        .bg-loop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a4a1a 0%, #000 70%);
            animation: pulseBg 8s infinite alternate;
            z-index: -2;
        }
        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* BUSCA E GÊNEROS */
        header { padding: 15px; text-align: center; }
        .search-box { 
            display: flex; background: var(--glass); border-radius: 50px; 
            margin: 10px 20px; padding: 5px; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 10px 15px; outline: none; }
        .btn-start { background: var(--primary); border: none; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: 900; cursor: pointer; }

        .genre-bar { display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px; scrollbar-width: none; }
        .genre-btn {
            background: var(--glass); border: 1px solid var(--primary); color: white;
            padding: 10px 20px; border-radius: 15px; white-space: nowrap; font-weight: bold;
            animation: glow 3s infinite;
        }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px var(--primary); } 50% { box-shadow: 0 0 15px var(--primary); } }

        /* GRID PRINCIPAL ANIMADO */
        .main-grid {
            height: calc(100vh - 250px); overflow-y: auto;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            padding: 15px 20px 150px;
        }
        .card { 
            background: rgba(255,255,255,0.03); border-radius: 20px; padding: 12px;
            transition: 0.3s; animation: slideUp 0.5s ease-out;
        }
        .card img { width: 100%; border-radius: 15px; animation: imageLoop 10s infinite linear; }
        
        @keyframes imageLoop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* INTERFACE DO ARTISTA (MODAL FULLSCREEN) */
        .artist-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none; flex-direction: column;
            overflow-y: auto; padding-bottom: 120px;
        }
        .header-artist {
            height: 250px; background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; position: relative;
        }
        .header-artist::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, #000, transparent); }

        .back-home { 
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: var(--primary); border: none; padding: 10px 20px;
            border-radius: 50px; font-weight: bold; color: black;
        }

        .tabs { display: flex; padding: 10px 20px; gap: 15px; border-bottom: 1px solid #222; }
        .tab-btn { background: none; border: none; color: #888; font-weight: bold; padding: 10px 0; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* PLAYER FIXO */
        .player {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95);
            padding: 20px; border-top: 2px solid var(--primary); z-index: 10001;
            display: none; backdrop-filter: blur(15px);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-loop"></div>

    <div id="home">
        <header>
            <h1 style="color: var(--primary); margin: 0; font-size: 24px;">LAMONIÊ FLOW</h1>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Busque qualquer artista...">
            <button class="btn-start" onclick="search()">START</button>
        </div>

        <div class="genre-bar">
            <button class="genre-btn" onclick="search('Piseiro')">🔥 PISEIRO</button>
            <button class="genre-btn" onclick="search('Vaquejada')">🐎 VAQUEJADA</button>
            <button class="genre-btn" onclick="search('Sertanejo')">🤠 SERTANEJO</button>
            <button class="genre-btn" onclick="search('Forró')">🪗 FORRÓ</button>
        </div>

        <div class="main-grid" id="grid"></div>
    </div>

    <div id="artistPage" class="artist-page">
        <button class="back-home" onclick="closeArtist()">🏠 VOLTAR AO INÍCIO</button>
        <div class="header-artist" id="artistCover">
            <h1 id="artistName" style="position: relative; z-index: 2; margin: 0; font-size: 32px;"></h1>
        </div>

        <div class="tabs">
            <button class="tab-btn active">ÁLBUNS E MÚSICAS</button>
            <button class="tab-btn">SOBRE O ARTISTA</button>
            <button class="tab-btn">TOUR 2026</button>
        </div>

        <div id="artistDiscography" class="main-grid" style="height: auto;">
            </div>
    </div>

    <footer class="player" id="player">
        <div id="miniInfo" style="margin-bottom: 10px; font-size: 14px;"></div>
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div id="progress" style="flex: 1; height: 4px; background: #333; margin-right: 15px; border-radius: 2px;">
                <div id="bar" style="width: 0%; height: 100%; background: var(--primary);"></div>
            </div>
            <button onclick="toggle()" id="playBtn" style="background: white; border:none; width:50px; height:50px; border-radius:50%; font-size:20px;">
                <i class="fas fa-pause"></i>
            </button>
        </div>
    </footer>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        
        // BUSCA INTELIGENTE (Fuzzy Search via iTunes API)
        async function search(query = "") {
            const val = query || document.getElementById('searchInput').value || "Zezé Di Camargo";
            // A API do iTunes já possui correção ortográfica automática (escrever errado ainda traz resultados)
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(val)}&entity=song&limit=30&country=BR`);
            const data = await res.json();
            
            const grid = document.getElementById('grid');
            grid.innerHTML = data.results.map(t => `
                <div class="card" onclick="openArtist('${t.artistName}', '${t.artistId}', '${t.artworkUrl100.replace('100x100', '600x600')}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4 style="margin:10px 0 2px; font-size:14px;">${t.trackName}</h4>
                    <p style="color:var(--primary); font-size:12px; margin:0;">${t.artistName}</p>
                </div>
            `).join('');
        }

        // ABRIR PÁGINA DO ARTISTA COM TODOS OS ÁLBUNS
        async function openArtist(name, id, cover) {
            document.getElementById('artistPage').style.display = 'flex';
            document.getElementById('artistName').innerText = name;
            document.getElementById('artistCover').style.backgroundImage = `url(${cover})`;
            
            // Busca todos os álbuns e músicas desse artista específico
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=album&limit=20`);
            const data = await res.json();
            
            // Remove o primeiro resultado que é o próprio artista
            const albums = data.results.slice(1);

            document.getElementById('artistDiscography').innerHTML = albums.map(a => `
                <div class="card" onclick="playPreview('${a.collectionName}', '${name}', '${a.artworkUrl100}')" style="animation: slideUp 0.8s ease forwards">
                    <img src="${a.artworkUrl100.replace('100x100', '400x400')}" style="border: 2px solid var(--primary)">
                    <h4 style="font-size:13px; margin:8px 0;">${a.collectionName}</h4>
                    <p style="font-size:11px; opacity:0.6;">Álbum / Single</p>
                </div>
            `).join('');
        }

        function playPreview(title, artist, img) {
            // Aqui simulamos o play para o player fixo
            document.getElementById('player').style.display = 'block';
            document.getElementById('miniInfo').innerHTML = `Tocando agora: <b>${title}</b> - ${artist}`;
            // Como álbuns não tem URL de áudio direta na API de álbuns, buscamos uma faixa do álbum
            search(title + " " + artist); 
        }

        function toggle() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function closeArtist() { document.getElementById('artistPage').style.display = 'none'; }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('bar').style.width = p + "%";
        };

        // Bloqueio de zoom
        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

        search(); // Iniciar com sugestões
    </script>
</body>
</html>
