<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            min-height: 100vh;
        }

        header { 
            padding: 30px 15px 15px; 
            text-align: center;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
        }

        .logo-inox {
            font-family: 'Great Vibes', cursive;
            font-size: 52px;
            letter-spacing: 3px;
            background: linear-gradient(white, #ddd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
        }

        .api-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 15px;
            flex-wrap: wrap;
        }
        .api-tab {
            padding: 10px 22px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
        }
        .api-tab.active {
            background: #94b3ce;
            color: #000;
            font-weight: bold;
        }

        .nav-container {
            padding: 0 15px 10px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }
        .genres-btn, .cat-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 9px 18px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 14px;
            cursor: pointer;
        }

        .search-container { padding: 10px 15px; }
        .search-box {
            display: flex;
            background: #1f1f1f;
            border-radius: 25px;
            padding: 0 18px;
            align-items: center;
        }
        .search-box input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 14px 10px;
            font-size: 16px;
            outline: none;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px;
            padding: 15px;
        }
        .card {
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
        }
        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
        .card-info {
            padding: 12px;
        }
        .source {
            font-size: 10px;
            padding: 2px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 6px;
        }

        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20,20,20,0.98);
            backdrop-filter: blur(20px);
            padding: 12px 15px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            border-top: 1px solid #333;
        }
        .player img {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            object-fit: cover;
        }
        .player-info {
            flex: 1;
            overflow: hidden;
        }
        .player-info div:first-child {
            font-weight: 600;
            font-size: 15px;
        }
        .player-info div:last-child {
            font-size: 13px;
            opacity: 0.8;
        }
        .preview-notice {
            font-size: 11px;
            color: #ffcc00;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-inox">LamonieFlow</div>
    </header>

    <div class="api-tabs" id="apiTabs">
        <div class="api-tab active" data-source="all">Todas</div>
        <div class="api-tab" data-source="itunes">iTunes</div>
        <div class="api-tab" data-source="deezer">Deezer</div>
    </div>

    <div class="nav-container">
        <div class="genres-btn" onclick="toggleGenres()">Gêneros</div>
        <div id="catNav"></div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar música, artista ou álbum..." onkeypress="if(event.key==='Enter') buscar()">
            <i class="fas fa-search" onclick="buscar()" style="color:#888; font-size:20px; cursor:pointer;"></i>
        </div>
    </div>

    <div id="grid" class="main-grid"></div>

    <!-- Player melhorado -->
    <div id="player" class="player">
        <img id="playerArt" src="">
        <div class="player-info">
            <div id="playerTitle">Título da Música</div>
            <div id="playerArtist">Artista</div>
            <div class="preview-notice">Prévia de 30 segundos (músicas completas exigem assinatura)</div>
        </div>
        <audio id="audioPlayer" controls style="width: 160px;"></audio>
    </div>

    <script>
        const generos = ["Forró", "Vaquejada", "Piseiro", "Sertanejo", "Brega", "Arrocha", "Axé", "Pagode", "Samba", "Início"];
        document.getElementById('catNav').innerHTML = generos.map(g => 
            `<div class="cat-btn" onclick="buscarGeral('${g}')">${g}</div>`
        ).join('');

        let currentSource = 'all';

        document.querySelectorAll('.api-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.api-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentSource = tab.dataset.source;
            });
        });

        function toggleGenres() {
            const nav = document.getElementById('catNav');
            nav.style.display = (nav.style.display === 'flex') ? 'none' : 'flex';
        }

        async function buscarGeral(termo = "Forró") {
            document.getElementById('grid').innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:60px; color:#888;">Buscando...</p>`;

            let allResults = [];

            // iTunes (melhor para previews)
            if (currentSource === 'all' || currentSource === 'itunes') {
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=song&limit=40&country=BR`);
                    const data = await res.json();
                    allResults.push(...data.results.map(item => ({...item, source: 'iTunes'})));
                } catch(e) { console.log("Erro iTunes", e); }
            }

            // Deezer
            if (currentSource === 'all' || currentSource === 'deezer') {
                try {
                    const res = await fetch(`https://api.deezer.com/search/track?q=${encodeURIComponent(termo)}&limit=30`);
                    const data = await res.json();
                    allResults.push(...(data.data || []).map(item => ({...item, source: 'Deezer'})));
                } catch(e) { console.log("Erro Deezer", e); }
            }

            mostrarResultados(allResults);
        }

        function buscar() {
            const termo = document.getElementById('searchInput').value.trim();
            if (termo) buscarGeral(termo);
        }

        function mostrarResultados(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            if (items.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:60px;">Nenhum resultado encontrado.</p>';
                return;
            }

            items.forEach(item => {
                let img = '', title = '', artist = '', previewUrl = '';

                if (item.source === 'iTunes') {
                    img = (item.artworkUrl100 || '').replace('100x100', '400x400');
                    title = item.trackName || 'Sem título';
                    artist = item.artistName || '';
                    previewUrl = item.previewUrl || '';
                } else { // Deezer
                    img = item.album ? item.album.cover_big || item.album.cover_medium : '';
                    title = item.title || 'Sem título';
                    artist = item.artist ? item.artist.name : '';
                    previewUrl = item.preview || '';
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${img || 'https://via.placeholder.com/300x300/222/fff?text=Sem+Imagem'}" onerror="this.src='https://via.placeholder.com/300x300/222/fff?text=Sem+Imagem'">
                    <div class="card-info">
                        <div class="source">${item.source}</div>
                        <div style="font-weight:600; font-size:14px;">${title}</div>
                        <div style="font-size:13px; opacity:0.8;">${artist}</div>
                    </div>
                `;
                card.onclick = () => tocarPreview(previewUrl, img, title, artist);
                grid.appendChild(card);
            });
        }

        function tocarPreview(previewUrl, art, title, artist) {
            const player = document.getElementById('player');
            const audio = document.getElementById('audioPlayer');

            document.getElementById('playerArt').src = art;
            document.getElementById('playerTitle').textContent = title;
            document.getElementById('playerArtist').textContent = artist;

            if (previewUrl) {
                audio.src = previewUrl;
                audio.play().catch(() => {});
            } else {
                alert("Prévia não disponível para esta música.");
            }

            player.style.display = 'flex';
        }

        // Inicia com busca padrão
        window.onload = () => buscarGeral("Forró");
    </script>
</body>
</html>
