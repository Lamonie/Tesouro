<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --playing-color: #ffff00; --radio-color: #00ff00; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; }

        header { padding: 20px; text-align: center; background: #000; position: sticky; top: 0; z-index: 1000; }
        .logo-inox { font-family: 'Great Vibes', cursive; font-size: 35px; background: linear-gradient(to bottom, #cfd8dc, #fff, #90a4ae); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-container { padding: 10px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
        .cat-btn { background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
        .active { border-color: var(--radio-color); color: var(--radio-color); }

        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 15px 15px 120px; }
        .card { background: #121212; padding: 15px; border-radius: 15px; text-align: center; }
        .radio-box { width: 100%; aspect-ratio: 1/1; background: linear-gradient(45deg, #1a1a1a, #333); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--radio-color); margin-bottom: 10px; border: 1px solid #222; }

        .dock-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; width: 95%; max-width: 500px; z-index: 9999; }
        .dock-item { background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(10px); border: 1px solid #444; border-radius: 30px; display: flex; align-items: center; }
        .player-capsule { flex: 1; height: 60px; padding: 0 15px; gap: 10px; }
        .btn-circle { width: 55px; height: 55px; border-radius: 50%; justify-content: center; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 8000; display: none; flex-direction: column; padding: 20px; }
        .track-row { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; }
    </style>
</head>
<body>

    <header><div class="logo-inox">LamoniêFlow</div></header>
    
    <div class="nav-container">
        <button class="cat-btn active" onclick="carregarRadios('BR')">🇧🇷 Brasil</button>
        <button class="cat-btn" onclick="carregarRadios('US')">🇺🇸 USA</button>
        <button class="cat-btn" onclick="carregarMusica('Forró')">Forró</button>
        <button class="cat-btn" onclick="carregarMusica('Sertanejo')">Sertanejo</button>
    </div>
    
    <main id="grid" class="main-grid"></main>

    <div class="dock-container">
        <div class="dock-item btn-circle" onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div class="dock-item player-capsule">
            <div id="miniIcon" style="font-size: 20px; color: var(--radio-color);"><i class="fas fa-broadcast-tower"></i></div>
            <div style="flex:1; overflow:hidden">
                <b id="tTitle" style="font-size:12px; display:block; white-space:nowrap;">Selecione</b>
                <span id="tArt" style="font-size:10px; color:#aaa;">Lamoniê Flow</span>
            </div>
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:#fff; font-size:25px;"><i class="fas fa-play"></i></button>
        </div>
    </div>

    <div id="albumPage" class="full-page">
        <button onclick="fecharPagina()" style="color:#fff; background:#222; border:none; padding:10px; border-radius:10px; margin-bottom:20px;">← Voltar</button>
        <div id="albumHeader" style="text-align:center; margin-bottom:20px;"></div>
        <div id="albumTracks" style="overflow-y:auto;"></div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');

        const radios = {
            BR: [
                { name: "Jovem Pan FM", url: "https://servidor31.brlogic.com:8300/live", icon: "📻" },
                { name: "Metropolitana", url: "https://servidor22.brlogic.com:8032/live", icon: "🎧" },
                { name: "Mix FM SP", url: "https://mixfm.crossradio.com.br/stream", icon: "🎸" },
                { name: "89 Rock", url: "https://26533.live.streamtheworld.com/RADIO_89FMSC", icon: "🤘" },
                { name: "Alpha FM", url: "https://23113.live.streamtheworld.com/ALPHAFM_SC", icon: "🎷" },
                { name: "Band News", url: "https://evpp.mm.uol.com.br/band/bandnewsfm_sp/playlist.m3u8", icon: "🎙️" }
            ],
            US: [
                { name: "Hot 97 NY", url: "https://stream.revma.ihub.com/v1/t00c0f/9u9u9u/hls.m3u8", icon: "🇺🇸" },
                { name: "Jazz 24", url: "https://live.jazz24.org/jazz24", icon: "🎷" }
            ]
        };

        function carregarRadios(pais) {
            fecharPagina();
            grid.innerHTML = radios[pais].map(r => `
                <div class="card" onclick="tocarRadio('${r.url}', '${r.name}', '${r.icon}')">
                    <div class="radio-box">${r.icon}</div>
                    <b>${r.name}</b>
                    <div style="color:var(--radio-color); font-size:10px; margin-top:5px;">● AO VIVO</div>
                </div>
            `).join('');
        }

        function tocarRadio(url, nome, icon) {
            audio.pause();
            audio.src = url;
            audio.play().catch(e => console.log("Erro ao dar play"));
            document.getElementById('tTitle').innerText = nome;
            document.getElementById('tArt').innerText = "Rádio ao Vivo";
            document.getElementById('miniIcon').innerHTML = icon;
            atualizarBotao();
        }

        async function carregarMusica(g) {
            fecharPagina();
            grid.innerHTML = "<p>Buscando...</p>";
            const res = await fetch(`https://itunes.apple.com/search?term=${g}&entity=album&limit=20`);
            const data = await res.json();
            grid.innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                    <img src="${t.artworkUrl100.replace('100x100', '300x300')}" style="width:100%; border-radius:10px;">
                    <b style="display:block; margin-top:10px; font-size:12px;">${t.collectionName}</b>
                </div>
            `).join('');
        }

        async function abrirAlbum(id) {
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const songs = data.results.slice(1);
            document.getElementById('albumPage').style.display = 'flex';
            document.getElementById('albumHeader').innerHTML = `<h2>${data.results[0].collectionName}</h2>`;
            document.getElementById('albumTracks').innerHTML = songs.map(s => `
                <div class="track-row" onclick="tocarS('${s.previewUrl}', '${s.trackName}', '${s.artistName}')">
                    <i class="fas fa-play" style="margin-right:15px"></i>
                    <div>${s.trackName}</div>
                </div>
            `).join('');
        }

        function tocarS(url, n, a) {
            audio.src = url;
            audio.play();
            document.getElementById('tTitle').innerText = n;
            document.getElementById('tArt').innerText = a;
            document.getElementById('miniIcon').innerHTML = "🎵";
            atualizarBotao();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarBotao(); }
        function atualizarBotao() { document.getElementById('playBtn').innerHTML = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>'; }
        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }

        carregarRadios('BR');
    </script>
</body>
</html>
