<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* COR AZUL IPHONE 13 PRO MAX (SIERRA BLUE) */
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --card-bg: #1c1c1e; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        /* HEADER COM O AZUL SOLICITADO */
        header { padding: 25px 15px 10px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        /* BARRA DE GÊNEROS COMPLETA */
        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; scrollbar-width: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: #1c1c1e; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 600; flex-shrink: 0; }
        .cat-btn.active { background: var(--primary); color: #000; }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: #1c1c1e; border-radius: 12px; border: 1px solid #333; align-items: center; overflow: hidden; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 14px; outline: none; font-size: 14px; width: 100%; }
        .search-btn { background: none; border: none; color: #8e8e93; padding: 0 15px; cursor: pointer; }

        /* GRID DE ÁLBUNS - 300 ITENS */
        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 160px; }
        .card { width: 47%; background: var(--card-bg); border-radius: 14px; padding: 8px; margin-bottom: 18px; border: 1px solid #2c2c2e; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
        .card h4 { font-size: 12px; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; }

        /* PÁGINA DO ÁLBUM */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; font-size: 12px; cursor: pointer; }

        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #1c1c1e; cursor: pointer; }
        .track-play-icon { color: var(--primary); font-size: 20px; margin-left: auto; }

        /* PLAYER COM ABA QUE DESCE */
        .player { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,22,0.98); backdrop-filter: blur(20px); padding: 10px 20px 35px; border-top: 1px solid #333; z-index: 10001; transition: transform 0.4s ease; }
        .player.minimized { transform: translateY(calc(100% - 65px)); }
        .handle-area { width: 100%; height: 25px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .handle { width: 40px; height: 5px; background: #3a3a3c; border-radius: 10px; }
        .play-trigger { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header><h1 id="mainLogo">LAMONIÊ FLOW</h1></header>
    <div class="categories-nav" id="catNav"></div>
    <div class="search-container"><div class="search-box"><input type="text" placeholder="Buscar álbum ou artista..."><button class="search-btn"><i class="fas fa-search"></i></button></div></div>
    <div class="main-grid" id="grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player" style="display:none;">
        <div class="handle-area" onclick="togglePlayer()"><div class="handle"></div></div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex:1; overflow:hidden;">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:12px; color:var(--primary);">Artista</p>
            </div>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="play-trigger" onclick="togglePlay()" id="playBtn"><i class="fas fa-pause"></i></button>
            </div>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const player = document.getElementById('player');
        const grid = document.getElementById('grid');
        const generos = ["Destaques", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Arrocha"];
        const artistas = ["Luiz Gonzaga", "Dominguinhos", "Mastruz com Leite", "Limão com Mel", "Flávio José"];

        function init() {
            document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn ${g==='Destaques'?'active':''}">${g}</button>`).join('');
            carregarTudo();
        }

        async function carregarTudo() {
            let html = "";
            for (let a of artistas) {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(a)}&entity=album&limit=20`);
                const data = await res.json();
                html += data.results.map(t => `
                    <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                        <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                        <h4>${t.collectionName}</h4>
                    </div>
                `).join('');
            }
            grid.innerHTML = html;
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            const tracks = data.results.slice(1);
            
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:30px 20px;">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:250px; border-radius:15px; margin-bottom:15px;">
                    <h2 style="color:white;">${album.collectionName}</h2>
                    <p style="font-size:11px; color:#8e8e93; margin-top:5px;"><b>Ano:</b> ${new Date(album.releaseDate).getFullYear()} | <b>Gravadora:</b> ${album.copyright || "N/A"}</p>
                </div>
                ${tracks.map((m, i) => `
                    <div class="track-row" onclick="tocar('${m.trackName}', '${m.artistName}', '${m.previewUrl}')">
                        <span style="color:#48484a; width:30px;">${i+1}</span>
                        <div style="flex:1; color:white;">${m.trackName}</div>
                        <i class="far fa-play-circle track-play-icon"></i>
                    </div>
                `).join('')}
                <div style="height:150px;"></div>
            `;
        }

        function tocar(n, a, u) {
            audio.src = u; audio.play();
            player.style.display = 'block';
            player.classList.remove('minimized');
            document.getElementById('trackTitle').innerText = n;
            document.getElementById('trackArtist').innerText = a;
        }

        function togglePlayer() { player.classList.toggle('minimized'); }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }
        
        init();
    </script>
</body>
</html>
