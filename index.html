<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusicFlow PRO | Benedito</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #090909; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* FUNDO ANIMADO */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #1db95411);
            background-size: 400% 400%; animation: move 15s infinite; z-index: -1;
        }
        @keyframes move { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .app { display: flex; flex-direction: column; height: 100vh; }

        header { padding: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .search-box {
            background: rgba(255,255,255,0.1); padding: 12px; border-radius: 30px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input { background: none; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        /* LISTA COM ROLAGEM */
        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 150px; -webkit-overflow-scrolling: touch; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        .card {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            text-align: center; transition: 0.3s; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from{opacity:0; transform:scale(0.9)} to{opacity:1; transform:scale(1)} }
        
        .card img { width: 100%; aspect-ratio: 1; border-radius: 10px; object-fit: cover; margin-bottom: 10px; }
        .card h3 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { font-size: 11px; color: var(--primary); font-weight: bold; margin-top: 5px; }

        /* PLAYER FIXO */
        footer {
            position: fixed; bottom: 0; width: 100%; background: rgba(15,15,15,0.98);
            padding: 15px 20px; border-top: 1px solid #333; z-index: 100;
        }
        .p-info { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .p-info img { width: 45px; height: 45px; border-radius: 5px; border: 1px solid var(--primary); }
        
        .p-controls { display: flex; align-items: center; gap: 15px; }
        .progress-bg { flex: 1; height: 4px; background: #333; border-radius: 2px; position: relative; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 2px; }
        
        .play-btn {
            background: white; color: black; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .time { font-size: 10px; color: #888; font-family: monospace; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="app">
        <header>
            <h2 style="color: var(--primary); text-align: center; margin-bottom: 15px;"><i class="fas fa-compact-disc"></i> MusicFlow</h2>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="inputBusca" placeholder="Busque qualquer artista (ex: Zezé, Alok...)">
            </div>
        </header>

        <main id="scrollArea">
            <h4 id="statusTitulo" style="margin-bottom: 15px;">Artistas em Destaque</h4>
            <div class="grid" id="gridArtistas">
                </div>
        </main>

        <footer>
            <div class="p-info">
                <img src="https://via.placeholder.com/50" id="p-capa">
                <div style="overflow: hidden;">
                    <b id="p-nome" style="font-size: 14px; white-space: nowrap;">Selecione uma música</b><br>
                    <small id="p-artista" style="color: #888;">Busque acima...</small>
                </div>
            </div>
            <div class="p-controls">
                <div class="time" id="p-tempo">00:00:00</div>
                <div class="progress-bg"><div class="progress-bar" id="p-barra"></div></div>
                <div class="play-btn" onclick="controlarAudio()"><i class="fas fa-play" id="p-icon"></i></div>
            </div>
        </footer>
    </div>

    <audio id="playerPrincipal"></audio>

    <script>
        const grid = document.getElementById('gridArtistas');
        const audio = document.getElementById('playerPrincipal');
        const input = document.getElementById('inputBusca');

        // FUNÇÃO QUE BUSCA NA API REAL DO ITUNES
        async function buscarMusica(termo) {
            if(!termo) termo = "Brasil"; 
            document.getElementById('statusTitulo').innerText = "Buscando: " + termo + "...";
            
            try {
                const resposta = await fetch(`https://itunes.apple.com/search?term=${termo}&entity=song&limit=30&country=BR`);
                const dados = await resposta.json();
                exibirResultados(dados.results);
            } catch (erro) {
                alert("Erro ao buscar músicas. Verifique a conexão.");
            }
        }

        function exibirResultados(lista) {
            grid.innerHTML = "";
            lista.forEach(item => {
                // Ajusta a imagem para alta qualidade
                const foto = item.artworkUrl100.replace("100x100bb", "400x400bb");
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${foto}" loading="lazy">
                    <h3>${item.trackName}</h3>
                    <p>${item.artistName}</p>
                `;
                card.onclick = () => tocar(item.previewUrl, item.trackName, item.artistName, foto);
                grid.appendChild(card);
            });
            document.getElementById('statusTitulo').innerText = "Resultados encontrados";
        }

        function tocar(url, titulo, artista, capa) {
            document.getElementById('p-nome').innerText = titulo;
            document.getElementById('p-artista').innerText = artista;
            document.getElementById('p-capa').src = capa;
            
            audio.src = url;
            audio.play();
            document.getElementById('p-icon').className = "fas fa-pause";
        }

        function controlarAudio() {
            if(audio.paused) {
                audio.play();
                document.getElementById('p-icon').className = "fas fa-pause";
            } else {
                audio.pause();
                document.getElementById('p-icon').className = "fas fa-play";
            }
        }

        // Monitor de Progresso e Tempo
        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100;
            document.getElementById('p-barra').style.width = perc + "%";
            
            let c = audio.currentTime;
            let m = Math.floor(c / 60).toString().padStart(2, '0');
            let s = Math.floor(c % 60).toString().padStart(2, '0');
            let ms = Math.floor((c % 1) * 100).toString().padStart(2, '0');
            document.getElementById('p-tempo').innerText = `${m}:${s}:${ms}`;
        };

        // Busca ao digitar
        let timeout;
        input.oninput = (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => buscarMusica(e.target.value), 500);
        };

        // Inicia com algo
        buscarMusica("Top Brasil");
    </script>
</body>
</html>
