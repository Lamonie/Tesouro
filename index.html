<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | LED EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1db954; 
            --bg: #050505; 
            --surface: #121212;
        }

        /* RESET GERAL - GARANTE QUE NADA VAI VAZAR PARA OS LADOS */
        * { 
            box-sizing: border-box; 
            touch-action: manipulation; 
            -webkit-user-select: none;
            margin: 0; padding: 0;
        }

        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; /* Trava rolagem lateral no corpo do site */
        }

        .bg-animated { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(45deg, #050505, #0a2a0a, #050505, #1a0a2a); 
            background-size: 400% 400%; 
            animation: aurora 10s ease infinite; 
            z-index: -2; 
        }
        @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        @keyframes led-loop {
            0% { border-color: #1db954; box-shadow: 0 0 10px #1db954; }
            33% { border-color: #00d2ff; box-shadow: 0 0 10px #00d2ff; }
            66% { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
            100% { border-color: #1db954; box-shadow: 0 0 10px #1db954; }
        }

        /* BARRA DE GÊNEROS - ROLAGEM LATERAL PERMITIDA APENAS AQUI */
        .categories-nav { 
            display: flex; 
            overflow-x: auto; 
            padding: 15px 20px; 
            gap: 10px; 
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .categories-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: rgba(255,255,255,0.05); 
            border: 2px solid transparent; 
            color: white; padding: 10px 18px; 
            border-radius: 50px; white-space: nowrap; 
            font-size: 13px; font-weight: bold;
            animation: led-loop 5s linear infinite;
        }
        .cat-btn.active { background: var(--primary); color: black; border-color: var(--primary); }

        /* BUSCA */
        .search-container { padding: 0 20px 20px; }
        .search-box { 
            display: flex; background: rgba(0,0,0,0.6); 
            border-radius: 50px; padding: 5px; 
            border: 2px solid var(--primary);
            animation: led-loop 4s reverse infinite;
        }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; font-size: 16px; width: 100%; }
        .btn-start { background: var(--primary); border: none; color: #000; padding: 0 20px; border-radius: 50px; font-weight: 900; }

        /* GRID DE ÁLBUNS - AJUSTADO PARA NÃO CORTAR */
        .main-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 0 20px 150px;
            width: 100%;
        }
        
        .card { 
            background: var(--surface); 
            border-radius: 15px; padding: 10px; 
            border: 2px solid transparent;
            animation: led-loop 6s linear infinite;
            overflow: hidden;
        }
        .card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .card h4 { margin: 10px 0 3px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { color: var(--primary); font-size: 11px; font-weight: bold; }

        /* PÁGINA DO ÁLBUM E DETALHES */
        .full-page { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: none; 
            flex-direction: column; overflow-y: auto; 
        }

        .album-header {
            padding: 30px 20px;
            background: linear-gradient(180deg, rgba(29,185,84,0.4) 0%, #000 100%);
            text-align: center;
            border-bottom: 2px solid var(--primary);
            animation: led-loop 8s infinite;
        }

        .meta-container {
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 10px; margin-top: 20px; text-align: left;
        }
        .meta-item {
            background: rgba(255,255,255,0.05); padding: 8px 12px;
            border-radius: 8px; font-size: 11px; color: #ccc;
        }
        .meta-item span { display: block; color: var(--primary); font-weight: bold; font-size: 12px; }

        /* PLAYER */
        .player { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.95); padding: 15px 20px 30px; 
            border-top: 3px solid var(--primary); 
            z-index: 10001; display: none; 
            backdrop-filter: blur(20px);
            animation: led-loop 3s infinite alternate;
        }
    </style>
</head>
<body>

    <div class="bg-animated"></div>

    <div id="homePage">
        <header style="padding: 20px;">
            <h1 style="color: var(--primary); font-size: 26px; text-shadow: 0 0 15px var(--primary);">LAMONIÊ FLOW</h1>
            <p style="font-size: 10px; color: var(--primary); letter-spacing: 1px;">STREAMING PROFESSIONAL EXPERIENCE</p>
        </header>

        <div class="categories-nav">
            <button class="cat-btn active" onclick="search('Lançamentos 2026')">Lançamentos</button>
            <button class="cat-btn" onclick="search('Vaquejada')">Vaquejada</button>
            <button class="cat-btn" onclick="search('Piseiro')">Piseiro</button>
            <button class="cat-btn" onclick="search('Sertanejo')">Sertanejo</button>
            <button class="cat-btn" onclick="search('Arrocha')">Arrocha</button>
            <button class="cat-btn" onclick="search('Forró')">Forró</button>
            <button class="cat-btn" onclick="search('Pagode')">Pagode</button>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar álbum ou artista...">
                <button class="btn-start" onclick="search()"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="main-grid" id="grid"></div>
    </div>

    <div id="albumPage" class="full-page">
        <button style="margin: 15px; background: #222; border: 1px solid var(--primary); color: white; padding: 12px 25px; border-radius: 50px; font-weight: bold;" onclick="fecharPagina('albumPage')">🔙 VOLTAR</button>
        
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1; overflow: hidden; margin-right: 10px;">
                <div id="trackTitle" style="font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px;">Música</div>
                <div id="trackArtist" style="font-size: 11px; color: var(--primary);">Artista</div>
            </div>
            <button onclick="togglePlay()" id="playBtn" style="background:white; border:none; width:50px; height:50px; border-radius:50%;"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');

        async function search(q = "") {
            const term = q || document.getElementById('searchInput').value || "Lançamentos";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=20&country=BR`);
            const data = await res.json();
            
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4>${t.collectionName}</h4>
                    <p>${t.artistName}</p>
                </div>
            `).join('');
        }

        async function abrirAlbum(id) {
            document.getElementById('albumPage').style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            const tracks = data.results.slice(1);

            const dataFormatada = new Date(album.releaseDate).toLocaleDateString('pt-BR');
            const ano = new Date(album.releaseDate).getFullYear();
            const gravadora = album.copyright ? album.copyright.replace(/[0-9]/g, '').substring(0, 30) : "Oficial";

            document.getElementById('albumDetailContent').innerHTML = `
                <div class="album-header">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:180px; height:180px; border-radius:15px; border:3px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
                    <h2 style="margin-top:20px; font-size:20px;">${album.collectionName}</h2>
                    <p style="color:var(--primary); font-weight:bold;">${album.artistName}</p>
                    
                    <div class="meta-container">
                        <div class="meta-item">Lançamento: <span>${dataFormatada}</span></div>
                        <div class="meta-item">Ano: <span>${ano}</span></div>
                        <div class="meta-item">Gênero: <span>${album.primaryGenreName}</span></div>
                        <div class="meta-item">Gravadora: <span>${gravadora}</span></div>
                    </div>
                </div>
                <div style="padding:10px 0 150px;">
                    ${tracks.map((t, i) => `
                        <div style="display:flex; align-items:center; padding:15px 20px; border-bottom:1px solid #111;" onclick="tocarTrack('${t.trackName.replace(/'/g, "\\'")}', '${t.artistName.replace(/'/g, "\\'")}', '${t.previewUrl}')">
                            <span style="color:var(--primary); width:30px; font-weight:bold;">${i+1}</span>
                            <div style="flex:1; overflow:hidden;">
                                <div style="font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.trackName}</div>
                                <div style="font-size:11px; opacity:0.5;">${t.artistName}</div>
                            </div>
                            <i class="fas fa-play-circle" style="color:var(--primary); font-size:20px;"></i>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function tocarTrack(name, artist, url) {
            audio.src = url;
            audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = name;
            document.getElementById('trackArtist').innerText = artist;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function fecharPagina(id) { document.getElementById(id).style.display = 'none'; }
        
        search('Lançamentos 2026');
    </script>
</body>
</html>
