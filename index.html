<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #080808; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* VÍDEO/FUNDO ANIMADO DINÂMICO */
        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; overflow: hidden;
            background: linear-gradient(45deg, #000, #111);
        }
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: -1;
        }
        /* Elementos Visuais Animados para simular vídeo de fundo */
        .moving-shape {
            position: absolute; width: 300px; height: 300px;
            background: var(--primary); filter: blur(120px);
            border-radius: 50%; opacity: 0.2;
            animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(100%, 80%); } }

        /* NOME LAMONIÊ FLOW MAIS NÍTIDO */
        .brand-3d {
            font-size: 30px; font-weight: 900; text-align: center; padding: 15px;
            text-transform: uppercase; letter-spacing: 4px;
            color: #fff; text-shadow: 2px 2px 0px #000, 0 0 20px rgba(29, 185, 84, 0.5);
            -webkit-text-stroke: 1px rgba(255,255,255,0.5);
            animation: rainbow 8s infinite;
        }
        @keyframes rainbow { 0%{color:#1db954} 33%{color:#00d4ff} 66%{color:#ff0055} 100%{color:#1db954} }

        header { padding: 10px 20px; }
        .search-box {
            background: #1a1a1a; padding: 10px 15px; border-radius: 50px;
            display: flex; align-items: center; border: 1px solid #333;
        }
        .search-box input { background: none; border: none; color: white; flex: 1; outline: none; margin: 0 10px; }
        .btn-search { background: var(--primary); border: none; color: #000; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        main { height: calc(100vh - 250px); overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 15px; }
        
        /* CARD COM DATA E ANIMAÇÃO */
        .card { 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; 
            transition: 0.3s; position: relative; border: 1px solid transparent;
        }
        .card:hover { transform: scale(1.03); background: rgba(255,255,255,0.1); border-color: var(--primary); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; margin-bottom: 8px; }
        .card h3 { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .info-date { font-size: 11px; color: var(--primary); margin-top: 5px; font-weight: bold; }

        /* PLAYER */
        footer {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            padding: 15px 20px; border-top: 1px solid #222;
        }
        .progress-container { width: 100%; margin: 10px 0; }
        .bar-bg { width: 100%; height: 4px; background: #333; border-radius: 10px; cursor: pointer; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; transition: 0.1s; }
        .controls { display: flex; align-items: center; justify-content: space-around; max-width: 450px; margin: 0 auto; }
        .btn-p { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .play-btn { background: white; color: black; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="video-background"><div class="moving-shape"></div></div>
    <div class="video-overlay"></div>

    <div class="brand-3d">LAMONIÊ FLOW</div>

    <header>
        <div class="search-box">
            <input type="text" id="inSearch" placeholder="Busque seu artista...">
            <button class="btn-search" onclick="buscar()">BUSCAR</button>
        </div>
    </header>

    <main><div class="grid" id="grid"></div></main>

    <footer>
        <div id="playing-now" style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <img src="" id="p-img" style="width:45px; height:45px; border-radius:4px; display:none;">
            <div><b id="p-title" style="font-size:14px;"></b><p id="p-artist" style="font-size:12px; color:#888;"></p></div>
        </div>
        <div class="progress-container"><div class="bar-bg"><div class="bar-fill" id="fill"></div></div></div>
        <div class="controls">
            <button class="btn-p"><i class="fas fa-random"></i></button>
            <button class="btn-p" onclick="pular(-1)"><i class="fas fa-step-backward"></i></button>
            <button class="btn-p play-btn" onclick="togglePlay()"><i class="fas fa-play" id="icon-p"></i></button>
            <button class="btn-p" onclick="pular(1)"><i class="fas fa-step-forward"></i></button>
            <button class="btn-p"><i class="fas fa-redo"></i></button>
        </div>
    </footer>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        let tracks = [];
        let cur = 0;

        async function buscar() {
            const val = document.getElementById('inSearch').value || "Gleydson Gavião";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(val)}&entity=song&limit=50&country=BR`);
            const data = await res.json();
            tracks = data.results;
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            tracks.forEach((t, i) => {
                // RECUPERANDO A DATA E ANO
                const release = new Date(t.releaseDate);
                const dataFormatada = release.toLocaleDateString('pt-BR');
                const ano = release.getFullYear();

                grid.innerHTML += `
                    <div class="card" onclick="tocar(${i})">
                        <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                        <h3>${t.trackName}</h3>
                        <p style="font-size:11px; color:#aaa;">${t.artistName}</p>
                        <div class="info-date"><i class="far fa-calendar-alt"></i> ${ano} (${dataFormatada})</div>
                    </div>`;
            });
        }

        function tocar(i) {
            cur = i;
            const t = tracks[i];
            document.getElementById('p-img').src = t.artworkUrl100;
            document.getElementById('p-img').style.display = "block";
            document.getElementById('p-title').innerText = t.trackName;
            document.getElementById('p-artist').innerText = t.artistName;
            audio.src = t.previewUrl;
            audio.play();
            document.getElementById('icon-p').className = "fas fa-pause";
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('icon-p').className = "fas fa-pause"; }
            else { audio.pause(); document.getElementById('icon-p').className = "fas fa-play"; }
        }

        function pular(dir) {
            cur = (cur + dir + tracks.length) % tracks.length;
            tocar(cur);
        }

        audio.onended = () => pular(1); // MÚSICA CONTÍNUA

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('fill').style.width = pct + "%";
        };

        buscar();
    </script>
</body>
</html>
