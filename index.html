<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | PREMIUM INTEGRADO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Layout LED Profissional */
        header { padding: 25px; text-align: center; border-bottom: 2px solid var(--primary); box-shadow: 0 0 15px rgba(29, 185, 84, 0.7); }
        .logo { font-size: 26px; font-weight: 900; color: #fff; margin: 0; }
        .logo span { color: var(--primary); }
        
        /* Grid de Álbuns (2 por linha) */
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; padding-bottom: 120px; }
        
        .card { 
            background: #111; border-radius: 12px; padding: 10px; 
            border: 1px solid transparent; cursor: pointer; transition: 0.3s;
            position: relative;
        }
        .card:active { transform: scale(0.95); }
        .card:hover { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .card img { width: 100%; border-radius: 8px; display: block; margin-bottom: 10px; }
        .card h4 { margin: 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { margin: 3px 0 0; font-size: 11px; color: var(--primary); font-weight: bold; }

        /* Modal do Player (Página do Álbum Integrada) */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; flex-direction: column; 
            z-index: 9999; backdrop-filter: blur(10px);
        }
        .btn-voltar { 
            background: #222; color: white; border: 1px solid var(--primary); 
            padding: 12px 25px; margin: 15px; border-radius: 50px; 
            font-weight: bold; width: fit-content; align-self: center; cursor: pointer;
        }

        /* Iframe do Spotify com Borda Neon */
        iframe { 
            border-radius: 12px; 
            border: 2px solid var(--primary); 
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.5); 
            margin: 0 15px; flex: 1; 
        }
    </style>
</head>
<body>

    <div id="homePage">
        <header>
            <h1 class="logo">LAMONIÊ <span>FLOW</span></h1>
            <p style="font-size: 10px; color: var(--primary); letter-spacing: 1px; margin-top: 5px;">STREAMING PROFESSIONAL EXPERIENCE</p>
        </header>

        <div class="main-grid">
            <div class="card" onclick="abrirAlbumSpotify('4LpY2M54C6kSlyhGq9p81z')">
                <img src="https://i.scdn.co/image/ab67616d0000b2738379659b85c2c770c3c5ed72" alt="Marília Mendonça">
                <h4>Marília Mendonça</h4>
                <p>Ao Vivo</p>
            </div>

            <div class="card" onclick="abrirAlbumSpotify('49U94l3v9xRk0G9XUfA8R6')">
                <img src="https://i.scdn.co/image/ab67616d0000b273b4007823f65672a87a746538" alt="Henrique e Juliano">
                <h4>Henrique & Juliano</h4>
                <p>Céu Explica Tudo</p>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <button class="btn-voltar" onclick="fecharModal()"><i class="fas fa-chevron-left"></i> VOLTAR</button>
        <div id="embedContainer" style="height: 100%; display: flex; flex-direction: column;">
            </div>
    </div>

    <script>
        function abrirAlbumSpotify(id) {
            document.getElementById('playerModal').style.display = 'flex';
            
            // Usamos o ID FIXO do álbum para abrir a lista de músicas INTEGRADA
            document.getElementById('embedContainer').innerHTML = `
                <iframe src="https://open.spotify.com/embed/album/${id}?utm_source=generator&theme=0" 
                        width="92%" height="100%" frameBorder="0" allowfullscreen="" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                        loading="lazy"></iframe>
                <p style="text-align:center; color:#1db954; font-size:11px; margin:15px; padding: 0 10px; font-weight: bold;">
                    ⚠️ ATENÇÃO: Se as músicas tocarem apenas 30 segundos, clique no logo do Spotify dentro do player acima e faça LOGIN com sua conta Premium!
                </p>
            `;
        }

        function fecharModal() {
            document.getElementById('playerModal').style.display = 'none';
            // Limpa o iframe para parar a música ao fechar
            document.getElementById('embedContainer').innerHTML = ""; 
        }
    </script>

</body>
</html>
