<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* NOME 3D NÍTIDO */
        .brand-3d {
            font-size: 26px; font-weight: 900; text-align: center; padding: 15px;
            text-transform: uppercase; letter-spacing: 3px;
            color: #fff; text-shadow: 2px 2px 0px #000, 4px 4px 5px rgba(29, 185, 84, 0.4);
            animation: rainbow 6s linear infinite;
        }
        @keyframes rainbow { 0%{color:#1db954} 33%{color:#00d4ff} 66%{color:#ff0055} 100%{color:#1db954} }

        /* ABAS (TELAS) */
        .view { position: fixed; top: 0; left: 0; width: 100%; height: calc(100vh - 100px); transition: 0.4s; z-index: 5; background: var(--bg); }
        .view.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
        
        header, .search-box { padding: 10px 20px; }
        .search-box { display: flex; background: #1a1a1a; border-radius: 50px; border: 1px solid #333; margin: 0 20px; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 10px; outline: none; }
        .btn-s { background: var(--primary); border: none; padding: 0 20px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        /* GRID E CARDS */
        main { height: 100%; overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: #151515; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; animation: pulse 10s infinite; }
        @keyframes pulse { 0%{background:#151515} 50%{background:#1db95410} 100%{background:#151515} }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card .date { font-size: 11px; color: var(--primary); margin-top: 5px; }

        /* DETALHES DO ÁLBUM / VÍDEO */
        .album-view-content { padding: 40px 20px; text-align: center; }
        .back-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 8px 20px; border-radius: 20px; margin-bottom: 20px; cursor: pointer; }
        .video-container { width: 100%; max-width: 600px; aspect-ratio: 16/9; background: #000; margin: 20px auto; border-radius: 12px; overflow: hidden; }

        /* PLAYER */
        footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #222; z-index: 10; }
        .controls { display: flex; align-items: center; justify-content: center; gap: 25px; }
        .btn-p { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
        .btn-p.active { color: var(--primary); }
        .play-btn { background: white; color: black; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="homeView" class="view">
        <div class="brand-3d">LAMONIÊ FLOW</div>
        <div class="search-box">
            <input type="text" id="inSearch" placeholder="James Brown, Xand Avião...">
            <button class="btn-s" onclick="buscar()">BUSCAR</button>
        </div>
        <main><div class="grid" id="grid"></div></main>
    </div>

    <div id="albumView" class="view hidden">
        <div class="album-view-content">
            <button class="back-btn" onclick="toggleView('homeView')"><i class="fas fa-arrow-left"></i> VOLTAR PARA BUSCA</button>
            <div id="videoArea" class="video-container">
                <div style="padding-top: 50px; color: #555;">Vídeo carregando...</div>
            </div>
            <h2 id="view-title">Nome da Música</h2>
            <p id="view-date" style="color: var(--primary); margin-top: 10px;"></p>
            <p id="view-artist" style="color: #888;"></p>
        </div>
    </div>

    <footer>
        <div class="controls">
            <button class="btn-p" id="shuf" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
            <button class="btn-p" onclick="pular(-1)"><i class="fas fa-step-backward"></i></button>
            <button class="btn-p play-btn" onclick="togglePlay()"><i class="fas fa-play" id="icon-p"></i></button>
            <button class="btn-p" onclick="pular(1)"><i class="fas fa-step-forward"></i></button>
            <button class="btn-p" id="rep" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
        </div>
    </footer>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        let tracks = [];
        let cur = 0;
        let isRepeat = false;

        async function buscar() {
            const val = document.getElementById('inSearch').value || "James Brown";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(val)}&entity=song&limit=30&country=BR`);
            const data = await res.json();
            tracks = data.results;
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            tracks.forEach((t, i) => {
                const release = new Date(t.releaseDate);
                grid.innerHTML += `
                    <div class="card" onclick="abrirAlbum(${i})">
                        <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                        <h3>${t.trackName}</h3>
                        <div class="date"><i class="far fa-calendar"></i> ${release.getFullYear()} (${release.toLocaleDateString('pt-BR')})</div>
                    </div>`;
            });
        }

        function abrirAlbum(i) {
            cur = i;
            const t = tracks[i];
            const release = new Date(t.releaseDate);
            
            // Atualiza Interface da Aba
            document.getElementById('view-title').innerText = t.trackName;
            document.getElementById('view-artist').innerText = t.artistName;
            document.getElementById('view-date').innerText = `Lançamento: ${release.toLocaleDateString('pt-BR')}`;
            
            // Simulação de API de Vídeo (Usando preview de vídeo da música)
            document.getElementById('videoArea').innerHTML = `
                <video src="${t.previewUrl}" autoplay loop controls style="width:100%; height:100%; object-fit:cover;"></video>
            `;

            tocar(i);
            toggleView('albumView');
        }

        function toggleView(viewId) {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('albumView').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        }

        function tocar(i) {
            cur = i;
            audio.src = tracks[i].previewUrl;
            audio.play();
            document.getElementById('icon-p').className = "fas fa-pause";
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('icon-p').className = "fas fa-pause"; }
            else { audio.pause(); document.getElementById('icon-p').className = "fas fa-play"; }
        }

        // FUNÇÃO DO BOTÃO REPETIR (Círculo Verde)
        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('rep').classList.toggle('active', isRepeat);
        }

        function pular(dir) {
            cur = (cur + dir + tracks.length) % tracks.length;
            if(document.getElementById('albumView').classList.contains('hidden')) {
                tocar(cur);
            } else {
                abrirAlbum(cur);
            }
        }

        audio.onended = () => {
            if(isRepeat) { audio.play(); } else { pular(1); }
        };

        buscar();
    </script>
</body>
</html>
