<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW v9.1.32</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sp-green: #1DB954; --sp-black: #121212; --sp-dark: #000000; --sp-gray: #b3b3b3; --sp-card: #181818; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--sp-dark); color: white; padding-bottom: 110px; overflow-x: hidden; }

        /* Header e Filtros Estilo IMG_7541 */
        header { padding: 40px 15px 10px; background: linear-gradient(to bottom, #222, #000); }
        .user-badge { width: 32px; height: 32px; background: #f57c00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 15px; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .filter-btn { background: #2a2a2a; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; }
        .filter-btn.active { background: var(--sp-green); color: black; }

        /* Seções de Conteúdo */
        section { padding: 0 15px 25px; }
        h2 { font-size: 22px; margin-bottom: 15px; letter-spacing: -0.5px; }
        .horizontal-scroll { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        
        /* Cards Estilo IMG_7542 */
        .music-card { min-width: 150px; width: 150px; cursor: pointer; }
        .music-card img { width: 150px; height: 150px; border-radius: 8px; object-fit: cover; box-shadow: 0 8px 24px rgba(0,0,0,0.5); margin-bottom: 8px; }
        .music-card p { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-card span { font-size: 12px; color: var(--sp-gray); }

        /* Lista de Músicas Estilo IMG_7544 */
        .track-row { display: flex; align-items: center; padding: 10px 0; gap: 12px; }
        .track-row img { width: 48px; height: 48px; border-radius: 4px; }
        .track-info { flex: 1; }
        .track-info h4 { font-size: 15px; font-weight: 500; }
        .track-info p { font-size: 13px; color: var(--sp-gray); }

        /* Barra de Navegação Inferior Estilo IMG_7543 */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: linear-gradient(to top, #000 80%, transparent); display: flex; justify-content: space-around; padding: 10px 0 25px; z-index: 1000; }
        .nav-item { color: var(--sp-gray); text-align: center; font-size: 10px; transition: 0.2s; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; display: block; }
        .nav-item.active { color: white; }

        /* Mini Player Blindado */
        .mini-player { position: fixed; bottom: 85px; left: 8px; right: 8px; background: #3d3d3d; border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 12px; z-index: 999; border: 1px solid #555; }
        .player-info { flex: 1; overflow: hidden; }
        .player-info marquee { font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="user-badge">P</div>
        <div class="filter-bar">
            <button class="filter-btn active">Tudo</button>
            <button class="filter-btn">Música</button>
            <button class="filter-btn">Podcasts</button>
        </div>
    </header>

    <section>
        <h2>Artistas que você curte</h2>
        <div class="horizontal-scroll">
            <div class="music-card" onclick="loadArtist('Alcymar Monteiro')">
                <img src="https://i.scdn.co/image/ab67616d0000b273d2a0254c042306f698f1f5d6">
                <p>Mix de Flávio José</p>
                <span>Alcymar Monteiro...</span>
            </div>
            <div class="music-card" onclick="loadArtist('Fagner')">
                <img src="https://i.scdn.co/image/ab67616d0000b2736b701269e80f4f9f6e024258">
                <p>Mix de Fagner</p>
                <span>Peninha, Zizi Possi...</span>
            </div>
        </div>
    </section>

    <section id="ouvir-section">
        <h2>Ouvir</h2>
        <div id="track-list">
            </div>
    </section>

    <div class="mini-player" id="miniPlayer" style="display: none;">
        <img id="pImg" src="" width="40" height="40">
        <div class="player-info">
            <marquee id="pTitle">Título da Música</marquee>
            <p id="pArtist" style="font-size: 11px; color: #b3b3b3;">Artista</p>
        </div>
        <i class="fas fa-play" id="playIcon" style="font-size: 20px;" onclick="toggleAudio()"></i>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i>Início</div>
        <div class="nav-item"><i class="fas fa-search"></i>Buscar</div>
        <div class="nav-item"><i class="fas fa-book"></i>Sua Biblioteca</div>
        <div class="nav-item"><i class="fas fa-spotify"></i>Premium</div>
    </nav>

    <audio id="mainAudio"></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        const trackList = document.getElementById('track-list');

        // Função de busca "Blindada" para evitar tela branca (IMG_7535)
        async function loadContent(term = "Forró") {
            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=10`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                trackList.innerHTML = data.results.map(song => `
                    <div class="track-row" onclick="playMusic('${song.previewUrl}', '${song.trackName}', '${song.artistName}', '${song.artworkUrl100}')">
                        <img src="${song.artworkUrl100}">
                        <div class="track-info">
                            <h4>${song.trackName}</h4>
                            <p>${song.artistName}</p>
                        </div>
                        <i class="fas fa-ellipsis-v" style="color:#b3b3b3"></i>
                    </div>
                `).join('');
            } catch (error) {
                // Tratamento de erro estilo IMG_7534
                trackList.innerHTML = "<p style='color:#b3b3b3; padding:20px;'>Modo Offline: Verifique sua conexão ou use músicas baixadas.</p>";
            }
        }

        function playMusic(url, title, artist, img) {
            audio.src = url;
            audio.play();
            document.getElementById('miniPlayer').style.display = 'flex';
            document.getElementById('pImg').src = img;
            document.getElementById('pTitle').innerText = title;
            document.getElementById('pArtist').innerText = artist;
            document.getElementById('playIcon').className = 'fas fa-pause';
        }

        function toggleAudio() {
            if(audio.paused) { audio.play(); document.getElementById('playIcon').className = 'fas fa-pause'; }
            else { audio.pause(); document.getElementById('playIcon').className = 'fas fa-play'; }
        }

        function loadArtist(name) { loadContent(name); }

        // Inicialização
        loadContent();
    </script>
</body>
</html>
