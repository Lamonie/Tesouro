<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --player-bg: rgba(25, 25, 25, 0.7); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; }

        header { padding: 25px 15px 10px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; border-bottom: 1px solid #1c1c1e; }
        .cat-btn { background: #1c1c1e; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 600; flex-shrink: 0; cursor: pointer; }
        .cat-btn.active { background: var(--primary); color: #000; }

        .search-container { padding: 15px; }
        .search-box { display: flex; background: #1c1c1e; border-radius: 12px; border: 1px solid #333; align-items: center; padding: 0 15px; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 14px 0; outline: none; font-size: 14px; }
        
        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 160px; }
        .card { width: 47%; background: #1c1c1e; border-radius: 14px; padding: 8px; margin-bottom: 18px; border: 1px solid #2c2c2e; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
        .card h4 { font-size: 12px; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; cursor: pointer; width: fit-content; }
        
        .album-info-box { background: #1c1c1e; margin: 15px; padding: 15px; border-radius: 10px; font-size: 12px; color: #8e8e93; line-height: 1.5; text-align: center; }
        .album-info-box b { color: #fff; }

        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #1c1c1e; cursor: pointer; }
        .track-row.playing .track-title { color: var(--primary) !important; font-weight: bold; }
        .track-play-icon { color: #48484a; font-size: 20px; margin-left: auto; transition: 0.2s; }
        .track-row.playing .track-play-icon { color: var(--primary) !important; }

        .player { position: fixed; bottom: 0; width: 100%; background: var(--player-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 5px 15px 30px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 10001; transition: transform 0.4s ease; }
        .player.minimized { transform: translateY(calc(100% - 50px)); }
        .handle-area { width: 100%; height: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .handle { width: 40px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 10px; }
        
        .player-controls { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .play-trigger { background: var(--primary); border: none; width: 46px; height: 46px; border-radius: 50%; color: #000; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #timeLabel { font-size: 11px; color: var(--primary); min-width: 75px; text-align: center; font-family: monospace; }
    </style>
</head>
<body>
    <header><h1>LAMONIÊ FLOW</h1></header>
    <div class="categories-nav" id="catNav"></div>
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="O que você quer ouvir?" onkeydown="if(event.key==='Enter') carregarAlbuns(this.value)">
            <i class="fas fa-microphone" style="color:var(--primary); margin-right:15px; cursor:pointer;"></i>
            <i class="fas fa-search" style="color:var(--primary); cursor:pointer;" onclick="carregarAlbuns(document.getElementById('searchInput').value)"></i>
        </div>
    </div>
    <div class="main-grid" id="grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player" style="display:none;">
        <div class="handle-area" onclick="togglePlayer()"><div class="handle"></div></div>
        <div class="player-controls">
            <div style="flex:1; overflow:hidden;" onclick="togglePlayer()">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:12px; color:var(--primary);">Artista</p>
            </div>
            <span id="timeLabel">0:00 / 0:30</span>
            <div style="display:flex; align-items:center; gap:20px;">
                <i class="fas fa-redo-alt" id="repeatBtn" style="color:#8e8e93; cursor:pointer;" onclick="this.classList.toggle('active')"></i>
                <button onclick="togglePlay()" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
            </div>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const grid = document.getElementById('grid');
        // Lista focada apenas nos seus artistas de Forró
        const artistasForro = ["Luiz Gonzaga", "Flávio José", "Noca do Acordeon", "Trio Nordestino", "Gaviões do Forró", "Mastruz com Leite", "Dorgival Dantas", "Limão com Mel", "Toca do Vale"];
        let listaAtual = [];
        let musicaIndex = 0;

        async function carregarAlbuns(termo = "") {
            grid.innerHTML = "<p style='padding:20px;'>Carregando Forró...</p>";
            // Se for Início, ele busca todos os artistas da lista acima de uma vez
            const busca = (termo === "" || termo === "Início") ? artistasForro.join(' OR ') : termo;
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(busca)}&entity=album&limit=200&country=br`);
                const data = await res.json();
                grid.innerHTML = data.results.map(t => `
                    <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                        <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                        <h4>${t.collectionName}</h4>
                    </div>
                `).join('');
            } catch (e) {
                grid.innerHTML = "<p style='padding:20px;'>Erro ao carregar. Tente novamente.</p>";
            }
        }

        async function abrirAlbum(id) {
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            listaAtual = data.results.slice(1);
            
            document.getElementById('albumPage').style.display = 'flex';
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:250px; border-radius:15px;">
                    <h2 style="margin-top:15px;">${album.collectionName}</h2>
                    <p style="color:var(--primary); font-weight:bold;">${album.artistName}</p>
                </div>
                <div class="album-info-box">
                    <b>Lançamento:</b> ${new Date(album.releaseDate).getFullYear()} | <b>Gênero:</b> ${album.primaryGenreName}<br>
                    <b>Gravadora:</b> ${album.copyright || 'Independente'}
                </div>
                ${listaAtual.map((m, i) => `
                    <div class="track-row" id="track_${i}" onclick="tocar(${i})">
                        <span style="color:#48484a; width:30px; font-size:12px;">${i+1}</span>
                        <div style="flex:1;">
                            <div class="track-title" style="font-size:14px; color:white;">${m.trackName}</div>
                            <div style="font-size:11px; color:#8e8e93;">Compositor: ${m.artistName}</div>
                        </div>
                        <i class="fas fa-play-circle track-play-icon" id="icon_${i}"></i>
                    </div>
                `).join('')}
                <div style="height:150px;"></div>
            `;
        }

        function tocar(index) {
            musicaIndex = index;
            const m = listaAtual[musicaIndex];
            audio.src = m.previewUrl;
            audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = m.trackName;
            document.getElementById('trackArtist').innerText = m.artistName;
            
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('playing'));
            document.getElementById(`track_${index}`).classList.add('playing');
        }

        function togglePlay() { 
            if(audio.paused) {
                audio.play();
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }
        function togglePlayer() { document.getElementById('player').classList.toggle('minimized'); }

        document.getElementById('catNav').innerHTML = ["Início", "Forró", "Vaquejada", "Piseiro"].map(g => 
            `<button class="cat-btn ${g==='Início'?'active':''}" onclick="carregarAlbuns('${g}')">${g}</button>`
        ).join('');

        carregarAlbuns("");
    </script>
</body>
</html>
