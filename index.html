<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMONIÊ FLOW | PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1db954; 
            --bg-dark: #0a0a0a; 
            --text-main: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* FUNDO ANIMADO PROFISSIONAL */
        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e, #1db95422);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(60px); z-index: -1;
        }

        /* NOME 3D E BUSCA */
        .header-content { padding: 40px 20px; text-align: center; }
        .brand { 
            font-size: 32px; font-weight: 900; letter-spacing: 5px; margin-bottom: 25px;
            text-shadow: 3px 3px 0px #000; color: var(--primary);
        }

        .search-bar {
            max-width: 500px; margin: 0 auto; display: flex;
            background: rgba(255,255,255,0.1); border-radius: 50px;
            padding: 5px 15px; border: 1px solid rgba(255,255,255,0.2);
        }
        .search-bar input {
            background: none; border: none; color: white; flex: 1;
            padding: 12px; outline: none; font-size: 16px;
        }
        .search-bar button {
            background: var(--primary); border: none; padding: 0 25px;
            border-radius: 50px; color: black; font-weight: bold; cursor: pointer;
        }

        /* ROLAGEM DE CDS PROFISSIONAL */
        .container { padding: 20px; max-width: 1200px; margin: 0 auto 120px auto; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px;
        }
        .card {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            cursor: pointer; transition: 0.4s; border: 1px solid transparent;
        }
        .card:hover { 
            background: rgba(255,255,255,0.1); border-color: var(--primary);
            transform: translateY(-5px);
        }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .card h4 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { font-size: 12px; color: #b3b3b3; margin-top: 5px; }

        /* ABA DE ÁLBUM/VÍDEO */
        .album-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none; flex-direction: column;
        }
        .video-box { width: 100%; height: 60vh; background: #000; }
        .video-box video { width: 100%; height: 100%; object-fit: contain; }
        .album-info { padding: 30px; text-align: center; flex: 1; overflow-y: auto; }
        .btn-close { 
            background: var(--primary); color: black; border: none; 
            padding: 12px 30px; border-radius: 50px; font-weight: bold; margin-top: 20px; cursor: pointer;
        }

        /* PLAYER FIXO FIXADO */
        .player {
            position: fixed; bottom: 0; width: 100%; height: 100px;
            background: rgba(0,0,0,0.95); border-top: 1px solid #333;
            padding: 15px 30px; z-index: 150; display: flex; flex-direction: column; align-items: center;
        }
        .progress-container { width: 100%; max-width: 700px; height: 5px; background: #444; border-radius: 5px; margin-bottom: 10px; cursor: pointer; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 5px; }
        .controls { display: flex; align-items: center; gap: 30px; }
        .btn-p { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .btn-p.active { color: var(--primary); }
        .play-main { background: white; color: black; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; }
    </style>
</head>
<body>

    <div class="bg-animated"></div>
    <div class="bg-overlay"></div>

    <div class="header-content">
        <h1 class="brand">LAMONIÊ FLOW</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Pesquisar álbuns, artistas...">
            <button onclick="searchAPI()">BUSCAR</button>
        </div>
    </div>

    <div class="container">
        <div class="grid" id="mainGrid">
            </div>
    </div>

    <div id="albumView" class="album-overlay">
        <div class="video-box">
            <video id="playerMedia" controls playsinline></video>
        </div>
        <div class="album-info">
            <h2 id="viewTitle">Título da Música</h2>
            <p id="viewArtist" style="color: var(--primary); margin: 10px 0;">Artista</p>
            <p id="viewDate" style="font-size: 14px; color: #888;"></p>
            <button class="btn-close" onclick="closeAlbum()">FECHAR E VOLTAR</button>
        </div>
    </div>

    <footer class="player">
        <div class="progress-container" onclick="seek(event)">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="controls">
            <button class="btn-p" onclick="toggleShuffle()" id="shuffleBtn"><i class="fas fa-random"></i></button>
            <button class="btn-p" onclick="prevTrack()"><i class="fas fa-step-backward"></i></button>
            <button class="btn-p play-main" onclick="togglePlay()"><i class="fas fa-play" id="playIcon"></i></button>
            <button class="btn-p" onclick="nextTrack()"><i class="fas fa-step-forward"></i></button>
            <button class="btn-p" onclick="toggleRepeat()" id="repeatBtn"><i class="fas fa-redo"></i></button>
        </div>
    </footer>

    <script>
        const media = document.getElementById('playerMedia');
        let playlist = [];
        let currentIdx = 0;
        let isRepeat = false;

        async function searchAPI() {
            const query = document.getElementById('searchInput').value || "Zezé Di Camargo";
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=40`);
            const data = await response.json();
            playlist = data.results;
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = playlist.map((item, i) => `
                <div class="card" onclick="playAlbum(${i})">
                    <img src="${item.artworkUrl100.replace('100x100', '600x600')}" alt="Album">
                    <h4>${item.trackName}</h4>
                    <p>${item.artistName}</p>
                </div>
            `).join('');
        }

        function playAlbum(index) {
            currentIdx = index;
            const song = playlist[index];
            const date = new Date(song.releaseDate);

            // Atualiza Interface
            document.getElementById('viewTitle').innerText = song.trackName;
            document.getElementById('viewArtist').innerText = song.artistName;
            document.getElementById('viewDate').innerText = `Lançamento: ${date.toLocaleDateString('pt-BR')}`;
            
            // Ativa Vídeo/Áudio
            media.src = song.previewUrl; // API iTunes fornece o MP4/M4A funcional
            media.play();
            
            document.getElementById('albumView').style.display = 'flex';
            document.getElementById('playIcon').className = "fas fa-pause";
        }

        function closeAlbum() {
            document.getElementById('albumView').style.display = 'none';
        }

        function togglePlay() {
            if(media.paused) {
                media.play();
                document.getElementById('playIcon').className = "fas fa-pause";
            } else {
                media.pause();
                document.getElementById('playIcon').className = "fas fa-play";
            }
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
        }

        function nextTrack() {
            currentIdx = (currentIdx + 1) % playlist.length;
            playAlbum(currentIdx);
        }

        function prevTrack() {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            playAlbum(currentIdx);
        }

        // Lógica de progresso e fim da música
        media.ontimeupdate = () => {
            const pct = (media.currentTime / media.duration) * 100;
            document.getElementById('progressBar').style.width = pct + "%";
        };

        media.onended = () => {
            if(isRepeat) media.play(); else nextTrack();
        };

        function seek(e) {
            const rect = document.querySelector('.progress-container').getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            media.currentTime = pct * media.duration;
        }

        // Inicia com busca padrão
        searchAPI();
    </script>
</body>
</html>
