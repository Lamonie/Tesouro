<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicFlow | Plataforma Musical</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* DESIGN E CORES (CSS) */
        :root {
            --primary: #1db954;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; height: 100vh; }

        /* Fundo Animado com Gradiente */
        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e, #1db95422);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(60px); z-index: -1;
        }

        /* Estrutura do Site */
        .app-container {
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 1fr 100px;
            height: 100vh;
        }

        /* Menu Lateral */
        .sidebar { background: rgba(0, 0, 0, 0.6); padding: 25px; border-right: 1px solid var(--glass); }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-links { list-style: none; }
        .nav-links li { padding: 12px; color: var(--text-dim); cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .nav-links li:hover, .nav-links li.active { color: white; background: var(--glass); }

        /* Área de Busca e Conteúdo */
        .main-content { overflow-y: auto; padding: 20px 40px 120px; }
        .search-bar {
            background: var(--glass); display: flex; align-items: center;
            padding: 12px 20px; border-radius: 30px; width: 100%; max-width: 500px;
            margin-bottom: 30px; border: 1px solid transparent;
        }
        .search-bar input { background: none; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        /* Grid de Artistas */
        .featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card {
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px;
            transition: 0.3s; cursor: pointer; text-align: center;
        }
        .card:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-5px); }
        .card img { width: 100%; border-radius: 50%; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* Player Inferior */
        .music-player {
            grid-column: 1 / -1; background: rgba(10, 10, 10, 0.98);
            border-top: 1px solid var(--glass); display: flex; align-items: center;
            justify-content: space-between; padding: 0 25px;
        }
        .track-info { display: flex; align-items: center; gap: 15px; width: 300px; }
        .track-info img { width: 55px; height: 55px; border-radius: 5px; }
        
        .player-controls { flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 500px; }
        .control-btns { display: flex; align-items: center; gap: 25px; margin-bottom: 8px; }
        .control-btns button { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .play-btn { background: white !important; color: black !important; width: 40px; height: 40px; border-radius: 50%; }

        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-dim); }
        .progress-bar { flex: 1; height: 4px; background: #333; border-radius: 2px; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 2px; transition: 0.1s linear; }

        @media (max-width: 768px) { .sidebar { display: none; } .app-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div class="bg-overlay"></div>

    <div class="app-container">
        <nav class="sidebar">
            <div class="logo"><i class="fas fa-compact-disc"></i> MusicFlow</div>
            <ul class="nav-links">
                <li class="active"><i class="fas fa-home"></i> Início</li>
                <li><i class="fas fa-user"></i> Artistas</li>
                <li><i class="fas fa-record-vinyl"></i> Álbuns</li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="buscador" placeholder="O que você quer ouvir, Benedito?">
            </div>
            <div id="view-principal">
                <h2 style="margin-bottom: 20px;">Recomendados para você</h2>
                <div class="featured-grid" id="listaArtistas"></div>
            </div>
        </main>

        <footer class="music-player">
            <div class="track-info">
                <img src="https://via.placeholder.com/60" id="p-img">
                <div><h4 id="p-titulo">Escolha uma música</h4><p id="p-artista" style="font-size: 12px; color: var(--text-dim);">Aguardando...</p></div>
            </div>
            <div class="player-controls">
                <div class="control-btns">
                    <button><i class="fas fa-random"></i></button>
                    <button onclick="parar()"><i class="fas fa-stop"></i></button>
                    <button onclick="tocar()" class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
                    <button><i class="fas fa-redo"></i></button>
                </div>
                <div class="progress-container">
                    <span id="time-now">00:00:00</span>
                    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
                    <span>03:45:00</span>
                </div>
            </div>
            <div style="width: 150px; text-align: right;"><i class="fas fa-volume-up"></i></div>
        </footer>
    </div>

    <script>
        /* LÓGICA DO SITE (JAVASCRIPT) */
        const artistas = [
            { nome: "Luiz Gonzaga", bio: "O Rei do Baião.", foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A7rQ3q-Z0T8Ym9pZ9zE_Yl3Mv9_5_6_7_8", albuns: 40 },
            { nome: "Alok", bio: "DJ e produtor brasileiro.", foto: "https://randomuser.me/api/portraits/men/32.jpg", albuns: 12 },
            { nome: "The Weeknd", bio: "Pop e R&B moderno.", foto: "https://randomuser.me/api/portraits/men/45.jpg", albuns: 8 },
            { nome: "Anitta", bio: "Estrela pop internacional.", foto: "https://randomuser.me/api/portraits/women/44.jpg", albuns: 6 }
        ];

        function carregarArtistas(filtro = "") {
            const grid = document.getElementById('listaArtistas');
            grid.innerHTML = "";
            artistas.filter(a => a.nome.toLowerCase().includes(filtro.toLowerCase())).forEach(a => {
                grid.innerHTML += `
                    <div class="card" onclick="selecionar('${a.nome}', '${a.foto}')">
                        <img src="${a.foto}" onerror="this.src='https://via.placeholder.com/150'">
                        <h3>${a.nome}</h3>
                        <p style="color:#b3b3b3; font-size:12px;">${a.albuns} Álbuns</p>
                    </div>
                `;
            });
        }

        document.getElementById('buscador').addEventListener('input', (e) => carregarArtistas(e.target.value));

        let tocando = false;
        let tempo = 0;
        let intervalo;

        function selecionar(nome, foto) {
            document.getElementById('p-titulo').innerText = "Tocando Agora";
            document.getElementById('p-artista').innerText = nome;
            document.getElementById('p-img').src = foto;
            parar();
            tocar();
        }

        function tocar() {
            const btn = document.getElementById('playBtn');
            if(!tocando) {
                tocando = true;
                btn.innerHTML = '<i class="fas fa-pause"></i>';
                intervalo = setInterval(() => {
                    tempo += 100;
                    atualizarPlayer();
                }, 100);
            } else {
                tocando = false;
                btn.innerHTML = '<i class="fas fa-play"></i>';
                clearInterval(intervalo);
            }
        }

        function parar() {
            clearInterval(intervalo);
            tempo = 0;
            tocando = false;
            atualizarPlayer();
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
        }

        function atualizarPlayer() {
            const sTotal = Math.floor(tempo / 1000);
            const m = Math.floor(sTotal / 60).toString().padStart(2, '0');
            const s = (sTotal % 60).toString().padStart(2, '0');
            const ms = Math.floor((tempo % 1000) / 10).toString().padStart(2, '0');
            document.getElementById('time-now').innerText = `${m}:${s}:${ms}`;
            document.getElementById('fill').style.width = (tempo / 2250) + "%";
        }

        carregarArtistas();
    </script>
</body>
</html>
