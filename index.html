<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>LAMONIÊ FLOW | PRO EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff88; 
            --accent: #60efff;
            --surface: rgba(255, 255, 255, 0.1);
        }

        /* TRAVA DE PINÇA EM TODO O SITE */
        * { 
            box-sizing: border-box; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none;
            touch-action: none; /* Impede qualquer movimento não programado */
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            overflow: hidden;
            background: #000;
        }

        /* FUNDO DEGRADÊ INTUITIVO (GRID DE FESTA/PALCO) */
        .stage-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: -2;
        }

        .stage-lights {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(96, 239, 255, 0.15) 0%, transparent 40%);
            animation: pulse-light 8s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes pulse-light {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* BARRA DE GÊNEROS (SOMENTE TEXTO) */
        .categories-nav { 
            display: flex; overflow-x: auto; padding: 15px 20px; gap: 10px; 
            scrollbar-width: none; touch-action: pan-x; 
        }
        .categories-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: var(--surface); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 8px 20px; 
            border-radius: 4px; white-space: nowrap; 
            font-size: 13px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }
        .cat-btn.active { 
            background: var(--primary); color: #000; border-color: var(--primary); 
            box-shadow: 0 0 15px var(--primary);
        }

        /* BUSCA PRO */
        .search-box { 
            display: flex; background: rgba(255,255,255,0.05); 
            border-radius: 8px; margin: 0 20px 20px; padding: 5px; 
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; font-size: 15px; }
        .btn-start { background: var(--primary); border: none; color: #000; padding: 0 20px; border-radius: 4px; font-weight: bold; }

        /* GRID DE ÁLBUNS */
        .main-grid { 
            height: calc(100vh - 260px); overflow-y: auto; 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            padding: 10px 20px 150px; touch-action: pan-y;
        }
        
        .card { 
            background: rgba(0,0,0,0.4); border-radius: 12px; padding: 10px; 
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .card img { width: 100%; border-radius: 8px; aspect-ratio: 1/1; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card h4 { margin: 10px 0 2px; font-size: 13px; color: #fff; }

        /* PLAYER PRO */
        .player { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(10, 10, 20, 0.95); padding: 15px 20px 35px; 
            border-top: 2px solid var(--primary); z-index: 10001; 
            display: none; backdrop-filter: blur(20px);
        }

        .full-page { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0a0a14; z-index: 9999; display: none; 
            flex-direction: column; overflow-y: auto; touch-action: pan-y;
        }

        .album-header {
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(0, 255, 136, 0.2), transparent);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="stage-bg"></div>
    <div class="stage-lights"></div>

    <div id="homePage">
        <header style="padding: 30px 20px 10px;">
            <h1 style="color: #fff; margin: 0; font-size: 24px; letter-spacing: 2px; font-weight: 900;">LAMONIÊ <span style="color: var(--primary);">FLOW</span></h1>
            <p style="color: var(--primary); font-size: 10px; margin: 5px 0 0; opacity: 0.8; text-transform: uppercase;">Streaming Professional Experience</p>
        </header>

        <div class="categories-nav">
            <button class="cat-btn active" onclick="search('Melhores álbuns 2025')">Destaques 2025</button>
            <button class="cat-btn" onclick="search('Vaquejada 2025')">Vaquejada</button>
            <button class="cat-btn" onclick="search('Piseiro 2025')">Piseiro</button>
            <button class="cat-btn" onclick="search('Sertanejo')">Sertanejo</button>
            <button class="cat-btn" onclick="search('Pop World')">Pop</button>
            <button class="cat-btn" onclick="search('Rock')">Rock</button>
            <button class="cat-btn" onclick="search('Electronic')">Eletrônica</button>
            <button class="cat-btn" onclick="search('Hip Hop')">Hip Hop</button>
            <button class="cat-btn" onclick="search('Pagode')">Pagode</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar álbum, artista ou gênero...">
            <button class="btn-start" onclick="search()">BUSCAR</button>
        </div>

        <div class="main-grid" id="grid"></div>
    </div>

    <footer class="player" id="player">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1; overflow: hidden;">
                <div id="trackTitle" style="font-weight: bold; color: #fff;">Música</div>
                <div id="trackArtist" style="font-size: 12px; color: var(--primary);">Artista</div>
            </div>
            <button onclick="togglePlay()" id="playBtn" style="background:var(--primary); border:none; width:50px; height:50px; border-radius:50%;"><i class="fas fa-pause"></i></button>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');

        // Busca inicial focada nos sucessos de 2025
        async function search(q = "") {
            const term = q || document.getElementById('searchInput').value || "Top álbuns 2025";
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=20&country=BR`);
            const data = await res.json();
            
            document.getElementById('grid').innerHTML = data.results.map(a => `
                <div class="card" onclick="abrirAlbum('${a.collectionId}')">
                    <img src="${a.artworkUrl100.replace('100x100', '600x600')}">
                    <h4 style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${a.collectionName}</h4>
                    <p style="color:var(--primary); font-size:11px; margin:0;">${a.artistName}</p>
                </div>
            `).join('');
        }

        async function abrirAlbum(id) {
            // Lógica para abrir as faixas do álbum (simplificada para o exemplo)
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const tracks = data.results.slice(1);
            if(tracks.length > 0) {
                tocarTrack(tracks[0].trackName, tracks[0].artistName, tracks[0].previewUrl);
            }
        }

        function tocarTrack(name, artist, url) {
            audio.src = url;
            audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('trackTitle').innerText = name;
            document.getElementById('trackArtist').innerText = artist;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        // Bloqueio manual de zoom via JS para reforçar
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        search('Melhores álbuns 2025');
    </script>
</body>
</html>
