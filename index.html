<script>
async function abrirNoSpotify(termo) {
    document.getElementById('albumPage').style.display = 'flex';
    document.getElementById('spotifyPlayer').innerHTML = "<p style='color:var(--primary); text-align:center; padding:20px;'>Carregando Player do Spotify...</p>";
    
    // Mudamos o formato do link para um modelo de busca mais compatível
    const linkSpotify = `https://open.spotify.com/embed/search/${encodeURIComponent(termo)}`;
    
    document.getElementById('spotifyPlayer').innerHTML = `
        <iframe src="${linkSpotify}" 
                width="100%" height="500px" frameborder="0" 
                allowtransparency="true" allow="encrypted-media; clipboard-write; localized-metadata"></iframe>
        <p style="color: #666; font-size: 12px; text-align: center; margin-top: 10px;">
            Dica: Clique em "Entrar" no player para ativar suas músicas completas.
        </p>
    `;
}
</script>
