<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --playing-color: #ffff00; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }

        header { padding: 20px; text-align: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo-inox { font-family: 'Great Vibes', cursive; font-size: 40px; background: linear-gradient(to bottom, #cfd8dc, #fff, #90a4ae); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-container { padding: 10px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .cat-btn { background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 15px 15px 150px; }
        .card { width: 47%; margin-bottom: 20px; background: #121212; padding: 10px; border-radius: 15px; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }

        /* BARRA FLUTUANTE */
        .dock-container {
            position: fixed; bottom: 30px; left: 0; right: 0;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            z-index: 30000;
        }
        
        .dock-item {
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .btn-home { width: 60px; height: 60px; border-radius: 30px; font-size: 24px; color: #fff; cursor: pointer; }
        .btn-search { width: 60px; height: 60px; border-radius: 30px; font-size: 24px; color: #ff0000; cursor: pointer; }
        
        .player-capsule { width: 220px; height: 60px; border-radius: 30px; padding: 0 12px; gap: 10px; overflow: hidden; cursor: pointer; }
        .mini-art { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; object-fit: cover; }
        .track-info-mini { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; white-space: nowrap; }
        .track-info-mini b { font-size: 12px; color: #fff; text-overflow: ellipsis; overflow: hidden; }
        .track-info-mini span { font-size: 10px; color: rgba(255,255,255,0.6); text-overflow: ellipsis; overflow: hidden; }

        /* TELAS FULL */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 15000; display: none; flex-direction: column; overflow-y: auto; }
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1c1c1e; }
        .track-row.is-playing .track-title { color: var(--playing-color) !important; font-weight: bold; }

        /* BUSCA */
        #searchOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 40000; padding: 20px; overflow-y: auto;
        }
        .search-header { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .search-input-wrapper { flex: 1; background: #1c1c1e; border-radius: 12px; display: flex; align-items: center; padding: 0 15px; }
        .search-input { width: 100%; padding: 12px; border: none; background: transparent; color: #fff; outline: none; }
        .suggestion-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 0.5px solid #222; }
    </style>
</head>
<body>

    <header><div class="logo-inox">LamoniêFlow</div></header>
    <div class="nav-container" id="catNav"></div>
    <div id="grid" class="main-grid"></div>

    <div class="dock-container">
        <div class="dock-item btn-home" onclick="irParaInicio()"><i class="fas fa-home"></i></div>
        
        <div class="dock-item player-capsule" onclick="abrirAlbumAtivo()">
            <img id="playerArt" src="https://via.placeholder.com/40" class="mini-art">
            <div class="track-info-mini">
                <b id="trackTitle">Nenhuma música</b>
                <span id="trackArtist">Selecione</span>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" style="background:none; border:none; color:#fff; font-size:18px;">
                <i class="fas fa-play"></i>
            </button>
        </div>

        <div class="dock-item btn-search" onclick="abrirBusca()"><i class="fas fa-search"></i></div>
    </div>

    <div id="searchOverlay">
        <div class="search-header">
            <div class="search-input-wrapper">
                <i class="fas fa-search" style="color: #ff0000;"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="O que você quer ouvir?" 
                       oninput="sugerir(this.value)" 
                       onkeydown="if(event.key==='Enter') selecionarSugestao(this.value)">
            </div>
            <button onclick="fecharBusca()" style="background:none; border:none; color:#ff0000; font-weight:bold;">Cancelar</button>
        </div>
        <div id="suggestionsList"></div>
    </div>

    <div id="albumPage" class="full-page">
        <div id="albumContent"></div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        let searchTimeout;

        // SOLUÇÃO DEFINITIVA PARA VOLTAR AO INÍCIO REAL
        function irParaInicio() {
            fecharPagina(); 
            fecharBusca();
            // Recarrega o gênero inicial (Forró) para limpar a pesquisa do grid
            carregarPorGenero("Forró"); 
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function abrirBusca() {
            document.getElementById('searchOverlay').style.display = 'block';
            document.getElementById('searchInput').focus();
        }

        function fecharBusca() {
            document.getElementById('searchOverlay').style.display = 'none';
            document.getElementById('suggestionsList').innerHTML = "";
            document.getElementById('searchInput').value = "";
        }

        async function sugerir(termo) {
            if (termo.length < 2) { document.getElementById('suggestionsList').innerHTML = ""; return; }
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=album&limit=8`);
                const data = await res.json();
                let html = data.results.map(item => `
                    <div class="suggestion-item" onclick="selecionarSugestao('${item.collectionName}')">
                        <i class="fas fa-search" style="color:#555"></i>
                        <div style="color:#fff">${item.collectionName}</div>
                    </div>
                `).join('');
                if(data.results.length > 0) html += `<div style="color:#ff0000; padding:20px 0; font-weight:bold;" onclick="selecionarSugestao('${termo}')">Ver resultados para "${termo}"</div>`;
                document.getElementById('suggestionsList').innerHTML = html;
            }, 300);
        }

        function selecionarSugestao(termo) {
            fecharPagina(); 
            fecharBusca(); 
            carregarPorGenero(termo);
        }

        const generos = ["Forró", "Vaquejada", "Piseiro", "Sertanejo", "Arrocha", "Pagode"];
        document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn" onclick="carregarPorGenero('${g}')">${g}</button>`).join('');

        async function carregarPorGenero(g) {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(g)}&entity=album&limit=50`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:10px; font-weight:bold; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            window.albumVisualizadoId = id;
            document.getElementById('albumPage').style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const songs = data.results.slice(1);
            const album = data.results[0];

            document.getElementById('albumContent').innerHTML = `
                <div style="text-align:center; padding:50px 30px 20px 30px;">
                    <img src="${art.replace('100x100', '600x600')}" style="width:200px; border-radius:15px;">
                    <h2 style="margin-top:15px; font-size:20px;">${album.collectionName}</h2>
                    <p style="color:#666;">${album.artistName}</p>
                </div>
                ${songs.map((m, i) => `
                    <div class="track-row" id="row_${id}_${i}" onclick="tocar('${id}', ${i}, '${art}')">
                        <span style="color:#555; width:35px; text-align:center;">${i+1}</span>
                        <div style="flex:1; overflow:hidden;">
                            <div class="track-title" style="color:#fff; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${m.trackName}</div>
                        </div>
                    </div>
                `).join('')}<div style="height:150px;"></div>`;
            window.listaVisualizada = songs;
            atualizarUI();
        }

        function tocar(albumId, index, art) {
            if (window.albumAtivoId === albumId && window.musicaIndex === index) { togglePlay(); return; }
            window.albumAtivoId = albumId; window.musicaIndex = index;
            window.listaTocando = window.listaVisualizada; window.capaAtiva = art;
            const m = window.listaTocando[index];
            audio.src = m.previewUrl; audio.play();
            document.getElementById('playerArt').src = art;
            document.getElementById('trackTitle').innerText = m.trackName;
            document.getElementById('trackArtist').innerText = m.artistName;
            atualizarUI();
        }

        function atualizarUI() {
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('is-playing'));
            if (window.albumVisualizadoId === window.albumAtivoId) {
                const row = document.getElementById(`row_${window.albumAtivoId}_${window.musicaIndex}`);
                if(row) row.classList.add('is-playing');
            }
            document.getElementById('playBtn').innerHTML = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarUI(); }
        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }
        function abrirAlbumAtivo() { if(window.albumAtivoId) abrirAlbum(window.albumAtivoId, window.capaAtiva); }

        audio.onplay = atualizarUI; audio.onpause = atualizarUI;
        carregarPorGenero("Forró"); // Inicializa com Forró
    </script>
</body>
</html>
