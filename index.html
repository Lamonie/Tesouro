<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --player-bg: rgba(45, 45, 45, 0.8); --playing-color: #ffff00; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* FUNDO ANIMADO SUAVE */
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: -apple-system, sans-serif;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #000, #1a1a2e, #000, #0a192f);
            background-size: 400% 400%;
            z-index: -1;
            animation: gradientBG 15s ease infinite;
            opacity: 0.6;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header { padding: 25px 15px 10px; position: relative; z-index: 10; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        /* BOTÕES DE GÊNERO VIDRO */
        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 10px; position: relative; z-index: 10; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 10px 22px; border-radius: 20px; 
            font-size: 13px; font-weight: 600; flex-shrink: 0; cursor: pointer;
        }
        .cat-btn.active { background: var(--primary); color: #000; }

        /* BUSCA COM LUPA */
        .search-container { padding: 15px; position: relative; z-index: 10; }
        .search-box { 
            display: flex; background: rgba(255, 255, 255, 0.05); 
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            align-items: center; padding: 0 15px; backdrop-filter: blur(10px);
        }
        .search-box i { color: #8e8e93; font-size: 16px; }
        .search-box input { 
            background: none; border: none; color: white; flex: 1; 
            padding: 14px 10px; outline: none; font-size: 14px; 
        }
        
        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 160px; position: relative; z-index: 5; }
        .card { width: 47%; background: rgba(28, 28, 30, 0.6); border-radius: 14px; padding: 8px; margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px); }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }

        /* BARRA PLAYER - BOTÕES AFASTADOS */
        .player { 
            position: fixed; bottom: 30px; left: 15px; right: 15px; 
            background: var(--player-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            padding: 10px 18px; border-radius: 22px; border: 1px solid rgba(255, 255, 255, 0.15); 
            z-index: 10002; transition: opacity 0.3s, transform 0.3s; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .player.scrolling { opacity: 0; transform: translateY(35px); pointer-events: none; }

        .player-controls { display: flex; align-items: center; gap: 15px; }
        .mini-art { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; }
        .time-display { font-size: 10px; color: #bbb; margin-top: 2px; }
        
        /* Espaçamento extra entre botões */
        .player-actions { display: flex; align-items: center; gap: 25px; margin-left: 5px; }
        .play-trigger { background: none; border: none; color: var(--playing-color); font-size: 28px; cursor: pointer; }

        /* PÁGINA DO ÁLBUM COM FUNDO ANIMADO TAMBÉM */
        .full-page { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 10001; display: none; flex-direction: column; overflow-y: auto; 
        }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: #000; padding: 10px 22px; border-radius: 30px; font-weight: 800; }
        
        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .track-row.playing .track-title { color: #007bff !important; font-weight: bold; }
        .track-row.playing .track-play-icon { color: var(--playing-color) !important; }
        
        .album-meta { background: rgba(255,255,255,0.05); margin: 10px 15px; padding: 18px; border-radius: 15px; font-size: 12px; color: #aaa; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .album-meta b { color: #fff; }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>
    <div class="categories-nav" id="catNav"></div>
    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="O que vamos ouvir hoje?">
        </div>
    </div>
    
    <div id="grid" class="main-grid"></div>

    <footer class="player" id="player" style="display:none;" onclick="voltarParaAlbumAtivo()">
        <div class="player-controls">
            <img id="playerArt" src="" class="mini-art">
            <div style="flex:1; overflow:hidden;">
                <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:bold; font-size:14px;" id="trackTitle">Música</div>
                <div id="timeInfo" class="time-display">0:00 / 0:00</div>
            </div>
            <div class="player-actions">
                <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
                <i class="fas fa-step-forward" style="color:white; font-size:22px;" onclick="event.stopPropagation(); proxima();"></i>
            </div>
        </div>
    </footer>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const playerBar = document.getElementById('player');
        const albumPage = document.getElementById('albumPage');
        let scrollTimeout;

        function aplicarEfeitoScroll(elemento) {
            elemento.addEventListener('scroll', () => {
                playerBar.classList.add('scrolling');
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => playerBar.classList.remove('scrolling'), 600);
            });
        }
        aplicarEfeitoScroll(window);
        aplicarEfeitoScroll(albumPage);

        audio.ontimeupdate = () => {
            const current = formatTime(audio.currentTime);
            const duration = formatTime(audio.duration || 0);
            document.getElementById('timeInfo').innerText = `${current} / ${duration}`;
            atualizarUI();
        };

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const seg = Math.floor(s % 60);
            return `${min}:${seg < 10 ? '0' : ''}${seg}`;
        }

        function voltarParaAlbumAtivo() { if (window.albumAtivoId) albumPage.style.display = 'flex'; }

        const generos = ["Início", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Brega", "Arrocha", "Pagode", "Gospel"];
        document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn" onclick="carregarPorGenero('${g}')">${g}</button>`).join('');

        async function carregarPorGenero(g) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === g));
            const termo = g === "Início" ? "Luiz Gonzaga" : g;
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=album&limit=100`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:8px; font-weight:bold; font-size:12px; height:30px; overflow:hidden;">${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            window.albumAtivoId = id;
            albumPage.style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            const songs = data.results.slice(1);
            window.listaAtual = songs; window.capaAtual = art;

            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:25px;">
                    <img src="${art.replace('100x100', '600x600')}" style="width:230px; border-radius:18px; box-shadow: 0 15px 35px rgba(0,0,0,0.7);">
                    <h2 style="margin-top:20px; font-size:24px;">${album.collectionName}</h2>
                    <p style="color:var(--primary); font-weight:bold;">${album.artistName}</p>
                </div>
                <div class="album-meta">
                    <b>Ano:</b> ${new Date(album.releaseDate).getFullYear()} | <b>Gênero:</b> ${album.primaryGenreName}<br>
                    <b>Compositor:</b> ${album.artistName}<br>
                    <b>Gravadora:</b> ${album.copyright || "Original Digital"}
                </div>
                ${songs.map((m, i) => `
                    <div class="track-row" id="track_${i}" onclick="tocar(${i})">
                        <span style="color:#666; width:25px; font-size:12px;">${i+1}</span>
                        <div style="flex:1; margin-left:12px; overflow:hidden;">
                            <div class="track-title" style="font-size:14px; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${m.trackName}</div>
                            <div style="font-size:11px; color:#777">${m.artistName}</div>
                        </div>
                        <i class="fas fa-download" style="color:#8e8e93; font-size:18px; padding:10px;" onclick="event.stopPropagation(); baixarMusica('${m.previewUrl}', '${m.trackName}')"></i>
                        <i class="fas fa-play-circle track-play-icon" id="icon_${i}"></i>
                    </div>`).join('')}<div style="height:150px;"></div>`;
            atualizarUI();
        }

        function tocar(index) {
            window.musicaIndex = index;
            const m = window.listaAtual[index];
            audio.src = m.previewUrl; audio.play();
            playerBar.style.display = 'block';
            document.getElementById('playerArt').src = window.capaAtual;
            document.getElementById('trackTitle').innerText = m.trackName;
            atualizarUI();
        }

        async function baixarMusica(url, nome) {
            const res = await fetch(url);
            const blob = await res.blob();
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `${nome}.mp3`; link.click();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarUI(); }
        function proxima() { if(window.musicaIndex + 1 < window.listaAtual.length) tocar(window.musicaIndex + 1); }
        
        function atualizarUI() {
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('playing'));
            document.querySelectorAll('.track-play-icon').forEach(ic => ic.className = 'fas fa-play-circle track-play-icon');
            const row = document.getElementById(`track_${window.musicaIndex}`);
            const icon = document.getElementById(`icon_${window.musicaIndex}`);
            if(row) row.classList.add('playing');
            if(icon) icon.className = audio.paused ? 'fas fa-play-circle track-play-icon' : 'fas fa-pause-circle track-play-icon';
            document.getElementById('playBtn').innerHTML = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
        }

        function fecharPagina() { albumPage.style.display = 'none'; }
        carregarPorGenero("Início");
    </script>
</body>
</html>
