<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; }

        /* HEADER E LOGO */
        header { padding: 25px 15px 10px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        /* BARRA DE GÊNEROS COMPLETA E FUNCIONAL */
        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; scrollbar-width: none; border-bottom: 1px solid #1c1c1e; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: #1c1c1e; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 600; flex-shrink: 0; cursor: pointer; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: #000; }

        /* BUSCA E GRID */
        .search-container { padding: 15px; }
        .search-box { display: flex; background: #1c1c1e; border-radius: 12px; border: 1px solid #333; align-items: center; overflow: hidden; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 14px; outline: none; font-size: 14px; }
        .search-btn { background: none; border: none; color: #8e8e93; padding: 0 15px; cursor: pointer; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 160px; }
        .card { width: 47%; background: #1c1c1e; border-radius: 14px; padding: 8px; margin-bottom: 18px; border: 1px solid #2c2c2e; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
        .card h4 { font-size: 12px; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PÁGINA DO ÁLBUM */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: var(--primary); border: none; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; width: fit-content; cursor: pointer; }
        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #1c1c1e; cursor: pointer; }
        .track-play-icon { color: var(--primary); font-size: 20px; margin-left: auto; }

        /* PLAYER COM CONTROLES RESTAURADOS E ABA RETRÁTIL */
        .player { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,22,0.98); backdrop-filter: blur(20px); padding: 10px 20px 35px; border-top: 1px solid #333; z-index: 10001; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .player.minimized { transform: translateY(calc(100% - 65px)); } 
        
        .handle-area { width: 100%; height: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .handle { width: 40px; height: 4px; background: #3a3a3c; border-radius: 10px; }

        .player-controls { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .control-icon { color: #8e8e93; font-size: 20px; cursor: pointer; }
        .control-icon.active { color: var(--primary); }
        .play-trigger { background: var(--primary); border: none; width: 48px; height: 48px; border-radius: 50%; color: #000; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>LAMONIÊ FLOW</h1></header>
    
    <div class="categories-nav" id="catNav"></div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar álbum, artista ou gênero...">
            <button class="search-btn" onclick="buscar()"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="main-grid" id="grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <footer class="player" id="player" style="display:none;">
        <div class="handle-area" onclick="togglePlayer()"><div class="handle"></div></div>
        <div class="player-controls">
            <div style="flex:1; overflow:hidden;">
                <h4 id="trackTitle" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h4>
                <p id="trackArtist" style="font-size:12px; color:var(--primary);">Artista</p>
            </div>
            <div style="display:flex; align-items:center; gap:20px;">
                <i class="fas fa-random control-icon" id="shuffleBtn" onclick="this.classList.toggle('active')" title="Aleatório"></i>
                <i class="fas fa-redo control-icon" id="repeatBtn" onclick="this.classList.toggle('active')" title="Repetir"></i>
                <button onclick="togglePlay()" id="playBtn" class="play-trigger"><i class="fas fa-pause"></i></button>
            </div>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const player = document.getElementById('player');
        const grid = document.getElementById('grid');
        
        const generos = ["Destaques", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Arrocha", "Brega", "Pagode", "Axé", "MPB", "Gospel"];

        function carregarGeneros() {
            document.getElementById('catNav').innerHTML = generos.map(g => 
                `<button class="cat-btn ${g==='Destaques'?'active':''}" onclick="filtrarGeral(this, '${g}')">${g}</button>`
            ).join('');
        }

        async function carregarAlbuns(termo = "Luiz Gonzaga") {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=album&limit=50`);
            const data = await res.json();
            grid.innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <h4>${t.collectionName}</h4>
                </div>
            `).join('');
        }

        // FUNÇÃO DE BUSCA QUE ESTAVA FALTANDO
        function buscar() {
            const termo = document.getElementById('searchInput').value;
            if (termo.trim() !== "") {
                carregarAlbuns(termo);
                // Remove o "active" dos botões de gênero ao buscar algo novo
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            }
        }

        // FAZ A BUSCA FUNCIONAR AO APERTAR "ENTER" NO TECLADO
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                buscar();
            }
        });

        function filtrarGeral(btn, g) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            carregarAlbuns(g);
        }

        async function abrirAlbum(id) {
            const page = document.getElementById('albumPage');
            page.style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0];
            const musicas = data.results.slice(1);
            
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:30px 20px;">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" style="width:260px; border-radius:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <h2 style="margin-top:20px;">${album.collectionName}</h2>
                    <p style="font-size:12px; color:#8e8e93; margin-top:8px;">Ano: ${new Date(album.releaseDate).getFullYear()} | ${album.primaryGenreName}</p>
                </div>
                ${musicas.map((m, i) => `
                    <div class="track-row" onclick="tocar('${m.trackName.replace(/'/g, "\\'")}', '${m.artistName.replace(/'/g, "\\'")}', '${m.previewUrl}')">
                        <span style="color:#48484a; width:30px;">${i+1}</span>
                        <div style="flex:1;">${m.trackName}</div>
                        <i class="far fa-play-circle track-play-icon"></i>
                    </div>
                `).join('')}
                <div style="height:160px;"></div>
            `;
        }

        function tocar(nome, artista, url) {
            audio.src = url; audio.play();
            player.style.display = 'block';
            player.classList.remove('minimized');
            document.getElementById('trackTitle').innerText = nome;
            document.getElementById('trackArtist').innerText = artista;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlayer() { player.classList.toggle('minimized'); }
        
        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }
        
        carregarGeneros();
        carregarAlbuns();
    </script>
</body>
</html>
