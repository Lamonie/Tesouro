<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --player-bg: rgba(30, 30, 30, 0.85); --playing-color: #ffff00; --active-song: #007bff; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000000; color: var(--text-main); font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: -1; }

        header { padding: 30px 20px 15px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { color: var(--primary); font-size: 28px; font-weight: 900; }

        .categories-nav { display: flex; overflow-x: auto; padding: 15px; gap: 12px; }
        .cat-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 12px 25px; border-radius: 25px; font-size: 14px; font-weight: 600; flex-shrink: 0; }

        .search-container { padding: 10px 15px; }
        .search-box { display: flex; background: rgba(255, 255, 255, 0.07); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); align-items: center; padding: 0 15px; }
        .search-box input { background: none; border: none; color: white; flex: 1; padding: 15px 10px; outline: none; }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 180px; }
        .card { width: 47%; background: rgba(255,255,255,0.04); border-radius: 15px; padding: 8px; margin-bottom: 20px; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; }

        /* BARRA ESCONDE-ESCONDE */
        .player { 
            position: fixed; bottom: 35px; left: 15px; right: 15px; 
            background: var(--player-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); 
            z-index: 10002; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
        }
        .player-hidden { transform: translateY(120px); opacity: 0; }
        .mini-art { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        /* PÁGINAS FULL SCREEN */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; display: none; flex-direction: column; overflow-y: auto; }
        .now-playing-page { z-index: 10003; background: linear-gradient(to bottom, #151515, #000); }

        .btn-voltar { margin: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: bold; width: fit-content; }
        
        .track-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .track-row.is-playing .track-title { color: var(--active-song) !important; font-weight: bold; }

        .track-actions { display: flex; align-items: center; gap: 35px; margin-left: 10px; }
        .album-meta { background: rgba(255,255,255,0.06); margin: 15px; padding: 20px; border-radius: 18px; font-size: 13px; color: #bbb; text-align: center; }

        .np-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .np-art { width: 85%; aspect-ratio: 1/1; border-radius: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); object-fit: cover; }
        .np-info { width: 100%; text-align: left; padding: 30px 20px 0; }
        .np-title { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
        .np-artist { font-size: 16px; color: var(--active-song); }

        .np-progress-area { width: 100%; padding: 20px; }
        .np-slider { width: 100%; height: 4px; border-radius: 5px; -webkit-appearance: none; background: #333; }
        .np-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #fff; }
        .np-time { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-top: 8px; }

        .np-controls { display: flex; align-items: center; gap: 25px; margin-top: 10px; }
        .np-btn { background: none; border: none; color: white; font-size: 24px; transition: color 0.3s; }
        .np-btn-main { font-size: 55px; }
        .btn-active { color: var(--playing-color) !important; }
    </style>
</head>
<body>

    <header><h1>LAMONIÊ FLOW</h1></header>
    <div class="categories-nav" id="catNav"></div>
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar...">
            <div style="display:flex; gap:25px; color:#8e8e93; align-items: center;">
                <i class="fas fa-microphone" id="micBtn" onclick="ativarMicrofone()"></i>
                <i class="fas fa-search" onclick="realizarBuscaManual()"></i>
            </div>
        </div>
    </div>
    <div id="grid" class="main-grid"></div>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← VOLTAR</button>
        <div id="albumDetailContent"></div>
    </div>

    <div id="nowPlayingPage" class="full-page now-playing-page">
        <button class="btn-voltar" onclick="fecharNowPlaying()">↓ VOLTAR</button>
        <div class="np-container">
            <img id="npArt" class="np-art" src="">
            <div class="np-info">
                <div id="npTitle" class="np-title">Música</div>
                <div id="npArtist" class="np-artist">Artista</div>
            </div>
            <div class="np-progress-area">
                <input type="range" class="np-slider" id="npSlider" value="0" min="0" step="1">
                <div class="np-time"><span id="npCurrent">0:00</span><span id="npDuration">0:00</span></div>
            </div>
            <div class="np-controls">
                <button class="np-btn" id="shuffleBtn" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
                <button class="np-btn" onclick="anterior()"><i class="fas fa-backward"></i></button>
                <button class="np-btn np-btn-main" onclick="togglePlay()" id="npPlayBtn"><i class="fas fa-pause"></i></button>
                <button class="np-btn" onclick="proxima()"><i class="fas fa-forward"></i></button>
                <button class="np-btn" id="repeatBtn" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
            </div>
        </div>
    </div>

    <footer class="player" id="player" style="display:none;" onclick="abrirNowPlaying()">
        <div class="player-controls" style="display:flex; align-items:center; gap:12px;">
            <img id="playerArt" src="" class="mini-art">
            <div style="flex:1; overflow:hidden;">
                <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:bold; font-size:14px;" id="trackTitle">Música</div>
                <div id="timeInfo" style="font-size:10px; color:#aaa;">0:00 / 0:00</div>
            </div>
            <div style="display:flex; align-items:center; gap:25px;">
                <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" style="background:none; border:none; color:var(--playing-color); font-size:26px;"><i class="fas fa-pause"></i></button>
                <i class="fas fa-step-forward" style="color:white; font-size:22px;" onclick="event.stopPropagation(); proxima();"></i>
            </div>
        </div>
    </footer>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const playerBar = document.getElementById('player');
        const albumPage = document.getElementById('albumPage');
        const nowPlayingPage = document.getElementById('nowPlayingPage');
        const npSlider = document.getElementById('npSlider');

        let isShuffle = false;
        let isRepeat = false;

        // AJUSTE: Função central para esconder a barra
        let lastScrollY = 0;
        function handleScroll(target) {
            const currentScroll = target.scrollTop || window.scrollY;
            if (currentScroll > lastScrollY && currentScroll > 50) {
                playerBar.classList.add('player-hidden');
            } else {
                playerBar.classList.remove('player-hidden');
            }
            lastScrollY = currentScroll;
        }

        // Evento de rolagem na tela de início
        window.addEventListener('scroll', () => handleScroll(window));

        // AJUSTE: Evento de rolagem dentro da página do álbum (Corrigido para sumir lá também)
        albumPage.addEventListener('scroll', () => handleScroll(albumPage));

        function ativarMicrofone() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'pt-BR'; rec.start();
            document.getElementById('micBtn').style.color = '#ff3b30';
            rec.onresult = (e) => { document.getElementById('searchInput').value = e.results[0][0].transcript; carregarPorGenero(e.results[0][0].transcript); };
            rec.onend = () => { document.getElementById('micBtn').style.color = '#8e8e93'; };
        }

        function realizarBuscaManual() { const v = document.getElementById('searchInput').value; if(v) carregarPorGenero(v); }

        audio.ontimeupdate = () => {
            const cur = audio.currentTime; const dur = audio.duration || 0;
            document.getElementById('timeInfo').innerText = `${formatTime(cur)} / ${formatTime(dur)}`;
            document.getElementById('npCurrent').innerText = formatTime(cur);
            document.getElementById('npDuration').innerText = formatTime(dur);
            npSlider.max = Math.floor(dur); npSlider.value = Math.floor(cur);
            atualizarUI();
        };

        audio.onended = () => { if (isRepeat) { audio.currentTime = 0; audio.play(); } else { proxima(); } };

        npSlider.oninput = () => { audio.currentTime = npSlider.value; };
        function formatTime(s) { const min = Math.floor(s/60); const seg = Math.floor(s%60); return `${min}:${seg<10?'0':''}${seg}`; }

        const generos = ["Início", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Brega", "Arrocha"];
        document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn" onclick="carregarPorGenero('${g}')">${g}</button>`).join('');

        async function carregarPorGenero(g) {
            const termo = g === "Início" ? "Luiz Gonzaga" : g;
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=album&limit=100`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:10px; font-weight:bold; font-size:13px;">${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            window.albumVisualizadoId = id; 
            albumPage.style.display = 'flex';
            albumPage.scrollTop = 0; // Resetar scroll ao abrir novo álbum
            lastScrollY = 0;
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0]; const songs = data.results.slice(1);
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:30px;"><img src="${art.replace('100x100', '600x600')}" style="width:220px; border-radius:15px;">
                <h2 style="margin-top:20px;">${album.collectionName}</h2><p style="color:var(--primary);">${album.artistName}</p></div>
                <div class="album-meta"><b>Gênero:</b> ${album.primaryGenreName}<br><b>Lançamento:</b> ${new Date(album.releaseDate).toLocaleDateString('pt-BR')}<br><b>Gravadora:</b> ${album.copyright || "Independente"}</div>
                ${songs.map((m, i) => `
                    <div class="track-row" id="row_${id}_${i}" onclick="tocar('${id}', ${i}, '${art}')">
                        <span style="color:#777; width:25px;">${i+1}</span>
                        <div style="flex:1; margin-left:10px; overflow:hidden;">
                            <div class="track-title" style="font-size:14px; color:white;">${m.trackName}</div>
                            <div style="font-size:11px; color:#555;">${m.artistName}</div>
                        </div>
                        <div class="track-actions">
                            <i class="fas fa-download" style="color:#666; font-size:18px;" onclick="event.stopPropagation(); baixarMusica('${m.previewUrl}', '${m.trackName}')"></i>
                            <i class="fas fa-play-circle" style="font-size:22px; color:white;"></i>
                        </div>
                    </div>`).join('')}<div style="height:150px;"></div>`;
            window.listaVisualizada = songs; atualizarUI();
        }

        function tocar(albumId, index, art) {
            window.albumAtivoId = albumId; window.musicaIndex = index;
            window.listaTocando = window.listaVisualizada; window.capaAtiva = art;
            const m = window.listaTocando[index];
            audio.src = m.previewUrl; audio.play();
            playerBar.style.display = 'block';
            document.getElementById('playerArt').src = art;
            document.getElementById('trackTitle').innerText = m.trackName;
            abrirNowPlaying(); atualizarUI();
        }

        function abrirNowPlaying() {
            const m = window.listaTocando[window.musicaIndex];
            document.getElementById('npArt').src = window.capaAtiva.replace('100x100', '600x600');
            document.getElementById('npTitle').innerText = m.trackName;
            document.getElementById('npArtist').innerText = m.artistName;
            nowPlayingPage.style.display = 'flex';
        }

        function fecharNowPlaying() { nowPlayingPage.style.display = 'none'; }
        function fecharPagina() { albumPage.style.display = 'none'; playerBar.classList.remove('player-hidden'); }

        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuffleBtn').classList.toggle('btn-active', isShuffle); }
        function toggleRepeat() { isRepeat = !isRepeat; document.getElementById('repeatBtn').classList.toggle('btn-active', isRepeat); }

        function proxima() { 
            if (isShuffle) { let r = Math.floor(Math.random() * window.listaTocando.length); tocar(window.albumAtivoId, r, window.capaAtiva); } 
            else if(window.musicaIndex + 1 < window.listaTocando.length) { tocar(window.albumAtivoId, window.musicaIndex + 1, window.capaAtiva); }
        }

        function anterior() { if(window.musicaIndex - 1 >= 0) tocar(window.albumAtivoId, window.musicaIndex - 1, window.capaAtiva); }

        function atualizarUI() {
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('is-playing'));
            if (window.albumVisualizadoId === window.albumAtivoId) {
                const row = document.getElementById(`row_${window.albumAtivoId}_${window.musicaIndex}`);
                if(row) row.classList.add('is-playing');
            }
            const icon = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            document.getElementById('playBtn').innerHTML = icon;
            document.getElementById('npPlayBtn').innerHTML = icon;
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarUI(); }
        async function baixarMusica(u, n) { const r = await fetch(u); const b = await r.blob(); const l = document.createElement('a'); l.href = window.URL.createObjectURL(b); l.download = `${n}.mp3`; l.click(); }

        carregarPorGenero("Início");
    </script>
</body>
</html>
