<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --bg: #0b0b0d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* FUNDO GERAL ANIMADO */
        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, #050505, #121212, #1db9540a, #050505);
            background-size: 400% 400%; animation: moveGradient 15s ease infinite; z-index: -2;
        }
        @keyframes moveGradient { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* NOME LAMONIÊ FLOW - MELHORIA NA NITIDEZ E 3D */
        .brand-container { padding: 20px 0; text-align: center; }
        .brand-3d {
            font-size: 32px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 4px; display: inline-block;
            color: #fff;
            /* Melhora na nitidez: Contorno definido e sombras mais escuras */
            text-shadow: 2px 2px 0px #000, 4px 4px 0px rgba(0,0,0,0.2);
            -webkit-text-stroke: 1px rgba(255,255,255,0.8);
            animation: colorShift 6s linear infinite;
        }
        @keyframes colorShift {
            0%, 100% { color: #1db954; filter: drop-shadow(0 0 5px #1db954); }
            33% { color: #00d4ff; filter: drop-shadow(0 0 5px #00d4ff); }
            66% { color: #ff0055; filter: drop-shadow(0 0 5px #ff0055); }
        }

        header { padding: 0 20px 20px; }
        .search-container {
            background: #181818; border-radius: 50px; padding: 12px 20px;
            display: flex; align-items: center; border: 1px solid #333;
        }
        .search-container input { background: none; border: none; color: white; flex: 1; font-size: 16px; outline: none; }
        .btn-buscar { background: var(--primary); color: #000; border: none; padding: 8px 18px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-buscar:hover { transform: scale(1.05); background: #1ed760; }

        /* ÁREA DOS ÁLBUNS COM ANIMAÇÃO NO FUNDO */
        main { height: calc(100vh - 260px); overflow-y: auto; padding: 0 20px; }
        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .album-card {
            background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 12px;
            transition: 0.4s; cursor: pointer; border: 1px solid transparent;
            /* Animação suave de fundo no card */
            animation: cardPulse 8s infinite alternate;
        }
        @keyframes cardPulse {
            from { background: rgba(255,255,255,0.03); }
            to { background: rgba(29, 185, 84, 0.08); }
        }
        .album-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); border-color: var(--primary); }
        .album-card img { width: 100%; border-radius: 8px; box-shadow: 0 8px 15px rgba(0,0,0,0.5); margin-bottom: 12px; }
        .album-card h3 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .album-card p { font-size: 12px; color: #b3b3b3; margin-top: 4px; }

        /* PLAYER FOOTER */
        footer {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); padding: 20px; border-top: 1px solid #282828;
        }
        .progress-area { margin-bottom: 15px; }
        .bar-bg { background: #4f4f4f; height: 4px; border-radius: 2px; cursor: pointer; position: relative; }
        .bar-current { background: var(--primary); height: 100%; width: 0%; border-radius: 2px; position: relative; }
        .bar-current::after { content: ''; position: absolute; right: -5px; top: -3px; width: 10px; height: 10px; background: #fff; border-radius: 50%; opacity: 0; transition: 0.2s; }
        .bar-bg:hover .bar-current::after { opacity: 1; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; }
        .btn-ctrl { background: none; border: none; color: #b3b3b3; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .btn-ctrl:hover { color: #fff; }
        .btn-ctrl.active { color: var(--primary); }
        .play-main { background: #fff; color: #000; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <div class="brand-container">
        <div class="brand-3d">LAMONIÊ FLOW</div>
    </div>

    <header>
        <div class="search-container">
            <input type="text" id="userInput" placeholder="O que você quer ouvir?">
            <button class="btn-buscar" onclick="searchMusic()">BUSCAR</button>
        </div>
    </header>

    <main id="mainGrid">
        <div class="album-grid" id="results"></div>
    </main>

    <footer>
        <div id="now-playing" style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
            <img id="cur-img" src="" style="width: 45px; height: 45px; border-radius: 4px; display: none;">
            <div>
                <div id="cur-name" style="font-size: 14px; font-weight: bold;"></div>
                <div id="cur-artist" style="font-size: 12px; color: #b3b3b3;"></div>
            </div>
        </div>

        <div class="progress-area">
            <div class="bar-bg" onclick="seek(event)">
                <div class="bar-current" id="progressLine"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-ctrl" onclick="toggleShuffle()" id="shuf"><i class="fas fa-random"></i></button>
            <button class="btn-ctrl" onclick="prevTrack()"><i class="fas fa-step-backward"></i></button>
            <button class="btn-ctrl play-main" onclick="togglePlay()"><i class="fas fa-play" id="playIcon"></i></button>
            <button class="btn-ctrl" onclick="nextTrack()"><i class="fas fa-step-forward"></i></button>
            <button class="btn-ctrl" onclick="toggleRepeat()" id="rep"><i class="fas fa-redo"></i></button>
        </div>
    </footer>

    <audio id="audioElement"></audio>

    <script>
        const audio = document.getElementById('audioElement');
        let tracks = [];
        let currentIndex = 0;
        let isRepeat = false;
        let isShuffle = false;

        async function searchMusic() {
            const query = document.getElementById('userInput').value || "Top Brasil";
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=40`);
            const data = await response.json();
            tracks = data.results;
            displayResults();
        }

        function displayResults() {
            const container = document.getElementById('results');
            container.innerHTML = tracks.map((t, i) => `
                <div class="album-card" onclick="playTrack(${i})">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}" alt="">
                    <h3>${t.trackName}</h3>
                    <p>${t.artistName}</p>
                </div>
            `).join('');
        }

        function playTrack(index) {
            currentIndex = index;
            const t = tracks[index];
            document.getElementById('cur-img').src = t.artworkUrl100;
            document.getElementById('cur-img').style.display = 'block';
            document.getElementById('cur-name').innerText = t.trackName;
            document.getElementById('cur-artist').innerText = t.artistName;

            audio.src = t.previewUrl; // Aqui você pode trocar pela URL da música completa
            audio.play();
            updateUI();
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); } 
            else { audio.pause(); }
            updateUI();
        }

        // CORREÇÃO DO BOTÃO VOLTAR
        function prevTrack() {
            // Se a música já passou de 3 segundos, ele volta para o início da mesma
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else {
                // Senão, volta para a faixa anterior
                currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
                playTrack(currentIndex);
            }
        }

        function nextTrack() {
            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * tracks.length);
            } else {
                currentIndex = (currentIndex + 1) % tracks.length;
            }
            playTrack(currentIndex);
        }

        function updateUI() {
            document.getElementById('playIcon').className = audio.paused ? 'fas fa-play' : 'fas fa-pause';
        }

        function toggleRepeat() { isRepeat = !isRepeat; document.getElementById('rep').classList.toggle('active', isRepeat); }
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuf').classList.toggle('active', isShuffle); }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressLine').style.width = pct + '%';
        };

        // Passa para a próxima automaticamente (Música contínua)
        audio.onended = () => {
            if (isRepeat) { audio.play(); } 
            else { nextTrack(); }
        };

        function seek(e) {
            const rect = e.target.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        }

        // Inicia com uma busca padrão
        searchMusic();
    </script>
</body>
</html>
