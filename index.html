<!-- Atualize sua Nav Container -->
<div class="nav-container" id="catNav">
    <button class="cat-btn radio-active" onclick="carregarRadios('BR')"><i class="fas fa-broadcast-tower"></i> Rádios Brasil</button>
    <button class="cat-btn" style="border-color: #4285f4; color: #4285f4;" onclick="carregarRadios('US')"><i class="fas fa-flag-usa"></i> Rádios USA</button>
</div>

<script>
    const audio = document.getElementById('audioMain');
    let buscaAtiva = false;
    let modoRadio = false;

    // Banco de dados expandido com logos Reais
    const radios = {
        BR: [
            { name: "Jovem Pan FM", url: "https://servidor31.brlogic.com:8300/live", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Logo_Jovem_Pan_FM.png/1200px-Logo_Jovem_Pan_FM.png" },
            { name: "Metropolitana FM", url: "https://servidor22.brlogic.com:8032/live", logo: "https://metropolitanafm.com.br/wp-content/uploads/2021/11/metropolitana_logo_cor_fundo_transparente.png" },
            { name: "Mix FM SP", url: "https://mixfm.crossradio.com.br/stream", logo: "https://upload.wikimedia.org/wikipedia/pt/2/26/Logo_Mix_FM.png" },
            { name: "Alpha FM", url: "https://23113.live.streamtheworld.com/ALPHAFM_SC", logo: "https://www.alphafm.com.br/assets/images/logo-alpha.png" },
            { name: "Band FM", url: "https://evpp.mm.uol.com.br/band/bandfm_sp/playlist.m3u8", logo: "https://upload.wikimedia.org/wikipedia/commons/4/47/Band_FM_logo.png" },
            { name: "Transamérica", url: "https://transamerica.crossradio.com.br/stream", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo_Rede_Transam%C3%A9rica.png/1200px-Logo_Rede_Transam%C3%A9rica.png" },
            { name: "Nova Brasil FM", url: "https://25613.live.streamtheworld.com/NOVABRASIL_FM_SP_SC", logo: "https://novabrasilfm.com.br/wp-content/themes/novabrasil-2022/assets/images/logo.png" },
            { name: "89 FM A Rádio Rock", url: "https://26533.live.streamtheworld.com/RADIO_89FMSC", logo: "https://upload.wikimedia.org/wikipedia/pt/5/52/89_FM_A_R%C3%A1dio_Rock_logo.png" },
            { name: "Gazeta FM", url: "https://servidor39.brlogic.com:8052/live", logo: "https://www.gazetafm.com.br/wp-content/uploads/2019/05/logo_gazeta_fm.png" }
        ],
        US: [
            { name: "Hot 97 NY", url: "https://stream.revma.ihub.com/v1/t00c0f/9u9u9u/hls.m3u8", logo: "https://upload.wikimedia.org/wikipedia/en/3/3d/Hot_97_logo.png" },
            { name: "KISS FM LA", url: "https://stream.revma.ihub.com/v1/t00c0f/wkqiyk/hls.m3u8", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d3/KIIS_FM_logo.svg/1200px-KIIS_FM_logo.svg.png" },
            { name: "Jazz24", url: "https://live.jazz24.org/jazz24", logo: "https://www.jazz24.org/wp-content/uploads/2014/11/jazz24-logo-horizontal.png" },
            { name: "WNYC", url: "https://wnyc.stream.publicradio.org/wnyc", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/WNYC_logo.svg/1200px-WNYC_logo.svg.png" }
        ]
    };

    function carregarRadios(pais = 'BR') {
        buscaAtiva = true;
        const grid = document.getElementById('grid');
        const lista = radios[pais];
        
        // Atualiza estilo dos botões
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('radio-active'));
        event?.currentTarget?.classList.add('radio-active');

        grid.innerHTML = lista.map(r => `
            <div class="card" onclick="tocarRadio('${r.url}', '${r.name}', '${r.logo}')">
                <img src="${r.logo}" onerror="this.innerHTML='<i class=\'fas fa-broadcast-tower\'></i>'; this.type='div';">
                <p style="margin-top:10px; font-weight:bold; font-size: 14px;">${r.name}</p>
                <span style="font-size:10px; color:var(--radio-color)">🔴 AO VIVO</span>
            </div>
        `).join('');
    }

    function tocarRadio(url, nome, logo) {
        modoRadio = true;
        audio.src = url;
        audio.play().catch(e => alert("Erro ao carregar rádio. O link pode estar offline."));
        
        // Atualiza o Player
        document.getElementById('trackTitle').innerText = nome;
        document.getElementById('trackArtist').innerText = "Rádio ao Vivo";
        
        const playerArt = document.getElementById('playerArt');
        playerArt.src = logo;
        playerArt.style.display = 'block'; 
        
        atualizarUI();
    }

    async function carregarPorGenero(g) {
        modoRadio = false;
        const grid = document.getElementById('grid');
        grid.innerHTML = "<p style='padding:20px'>Carregando...</p>";
        
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(g)}&entity=album&limit=40`);
        const data = await res.json();
        
        grid.innerHTML = data.results.map(t => `
            <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                <p style="margin-top:10px; font-size:13px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.collectionName}</p>
            </div>`).join('');
    }

    // Mantendo suas outras funções originais (abrirAlbum, tocarMusica, etc)
    async function abrirAlbum(id, art) {
        document.getElementById('albumPage').style.display = 'flex';
        const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
        const data = await res.json();
        const songs = data.results.slice(1);
        const album = data.results[0];

        document.getElementById('albumHeader').innerHTML = `
            <img src="${art.replace('100x100', '600x600')}" style="width:180px; border-radius:15px;">
            <h2 style="margin-top:15px;">${album.collectionName}</h2>
            <button onclick="fecharPagina()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 15px; border-radius:20px; margin-top:10px;">Voltar</button>
        `;
        document.getElementById('albumTracks').innerHTML = songs.map((m, i) => `
            <div class="track-row" onclick="tocarMusica('${m.previewUrl}', '${m.trackName}', '${m.artistName}', '${art}')">
                <span style="margin-right:15px; color:#555;">${i+1}</span>
                <div>${m.trackName}</div>
            </div>
        `).join('');
    }

    function tocarMusica(url, nome, artista, art) {
        modoRadio = false;
        audio.src = url;
        audio.play();
        document.getElementById('playerArt').src = art;
        document.getElementById('trackTitle').innerText = nome;
        document.getElementById('trackArtist').innerText = artista;
        atualizarUI();
    }

    function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarUI(); }
    
    function atualizarUI() {
        const btn = document.getElementById('playBtn');
        btn.innerHTML = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
    }

    function fecharPagina() { document.getElementById('albumPage').style.display = 'none'; }
    function abrirBusca() { document.getElementById('searchOverlay').style.display = 'block'; }
    function fecharBusca() { document.getElementById('searchOverlay').style.display = 'none'; }

    // Inicialização
    const generosExtras = ["Forró", "Sertanejo", "Pagode"];
    const nav = document.getElementById('catNav');
    generosExtras.forEach(g => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.innerText = g;
        btn.onclick = () => carregarPorGenero(g);
        nav.appendChild(btn);
    });

    carregarPorGenero("Forró");
</script>
