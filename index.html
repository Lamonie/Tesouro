<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #94b3ce; --bg: #000000; --text-main: #ffffff; --playing-color: #ffffff; --active-song: #007bff; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000000; color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; overflow-x: hidden; }

        header { 
            padding: 25px 20px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .logo-inox {
            font-family: 'Great Vibes', cursive;
            font-size: 42px;
            background: linear-gradient(180deg, #ffffff 0%, #b0bec5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(255,255,255,0.2);
        }

        .nav-container { 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            gap: 10px; 
        }

        .genres-toggle-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 0.5px solid rgba(255,255,255,0.2); 
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .categories-nav { 
            display: none; 
            overflow-x: auto; 
            gap: 8px; 
            white-space: nowrap;
            scrollbar-width: none;
            flex: 1;
        }
        
        .cat-btn { 
            background: rgba(255,255,255,0.05); 
            border: 0.5px solid rgba(255,255,255,0.1);
            color: white; 
            padding: 8px 16px; 
            border-radius: 18px; 
            font-size: 13px; 
        }

        .main-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px 15px 200px; }
        .card { width: 47%; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; margin-bottom: 20px; border: 0.5px solid rgba(255,255,255,0.05); }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* PLAYER ESTILO APPLE MUSIC (VIDRO BRILHANTE) */
        .player { 
            position: fixed; 
            bottom: 20px; 
            left: 15px; 
            right: 15px; 
            background: rgba(45, 45, 45, 0.4); /* Transparência Brilhante */
            backdrop-filter: blur(40px) saturate(180%); 
            -webkit-backdrop-filter: blur(40px) saturate(180%); 
            padding: 15px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.25); /* Bordas que brilham */
            z-index: 10002; 
            transition: opacity 0.4s ease, transform 0.4s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .player-hidden { 
            opacity: 0; 
            transform: translateY(20px);
            pointer-events: none;
        }

        .player-controls { display: flex; align-items: center; gap: 12px; }
        .mini-art { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Time Bar Minimalista */
        .time-bar-container { width: 100%; margin: 12px 0 5px 0; }
        .time-bar { height: 3px; background: rgba(255,255,255,0.15); border-radius: 10px; position: relative; }
        .time-progress { height: 100%; background: #ffffff; width: 0%; border-radius: 10px; }
        .time-labels { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; display: none; flex-direction: column; overflow-y: auto; }
        .btn-voltar { margin: 15px; background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 20px; font-weight: 600; }

        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        .track-row.is-playing .track-title { color: var(--primary) !important; }
        .album-meta { background: rgba(255,255,255,0.03); margin: 15px; padding: 20px; border-radius: 15px; font-size: 12px; color: #888; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo-inox">LamoniêFlow</div>
    </header>

    <div class="nav-container">
        <div class="genres-toggle-btn" onclick="toggleGenres()">Explorar Gêneros</div>
        <div class="categories-nav" id="catNav"></div>
    </div>

    <!-- Busca removida como solicitado -->

    <div id="grid" class="main-grid"></div>

    <footer class="player" id="player">
        <div class="player-controls">
            <img id="playerArt" src="" class="mini-art">
            <div style="flex:1; overflow:hidden;">
                <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; font-size:14px; color:white;" id="trackTitle">Selecione uma música</div>
                <div id="trackArtist" style="font-size:12px; color:rgba(255,255,255,0.6);"></div>
            </div>
            <div style="display:flex; align-items:center; gap:20px;">
                <button onclick="event.stopPropagation(); togglePlay();" id="playBtn" style="background:none; border:none; color:white; font-size:24px;"><i class="fas fa-play"></i></button>
                <i class="fas fa-step-forward" style="color:white; font-size:20px;" onclick="event.stopPropagation(); proxima();"></i>
            </div>
        </div>

        <div class="time-bar-container">
            <div class="time-bar">
                <div class="time-progress" id="timeProgress"></div>
            </div>
            <div class="time-labels">
                <span id="currentTime">0:00</span>
                <span id="remainingTime">-0:00</span>
            </div>
        </div>
    </footer>

    <div id="albumPage" class="full-page">
        <button class="btn-voltar" onclick="fecharPagina()">← Álbuns</button>
        <div id="albumDetailContent"></div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        const audio = document.getElementById('audioMain');
        const player = document.getElementById('player');
        let hideTimeout;
        let lastScrollY = window.scrollY;

        function hidePlayer() { player.classList.add('player-hidden'); }
        function showPlayer() { 
            player.classList.remove('player-hidden'); 
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(hidePlayer, 4000); 
        }

        window.addEventListener('scroll', () => {
            if (Math.abs(window.scrollY - lastScrollY) > 5) { showPlayer(); }
            lastScrollY = window.scrollY;
        });

        audio.ontimeupdate = () => {
            const current = audio.currentTime || 0;
            const duration = audio.duration || 0;
            document.getElementById('currentTime').textContent = formatTime(current);
            const remaining = duration - current;
            document.getElementById('remainingTime').textContent = remaining > 0 ? '-' + formatTime(remaining) : '-0:00';
            const progressPercent = duration ? (current / duration) * 100 : 0;
            document.getElementById('timeProgress').style.width = `${progressPercent}%`;
        };

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const seg = Math.floor(s % 60);
            return `${min}:${seg < 10 ? '0' : ''}${seg}`;
        }

        function toggleGenres() {
            const nav = document.getElementById('catNav');
            nav.style.display = (nav.style.display === 'flex') ? 'none' : 'flex';
        }

        const generos = ["Início", "Forró", "Vaquejada", "Piseiro", "Sertanejo", "Brega", "Arrocha", "Pagode", "Gospel", "Pop"];
        document.getElementById('catNav').innerHTML = generos.map(g => `<button class="cat-btn" onclick="carregarPorGenero('${g}')">${g}</button>`).join('');

        async function carregarPorGenero(g) {
            const termo = g === "Início" ? "Forró das Antigas" : g;
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&entity=album&limit=50`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(t => `
                <div class="card" onclick="abrirAlbum('${t.collectionId}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100.replace('100x100', '400x400')}">
                    <p style="margin-top:10px; font-weight:bold; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.collectionName}</p>
                </div>`).join('');
        }

        async function abrirAlbum(id, art) {
            window.albumVisualizadoId = id;
            albumPage.style.display = 'flex';
            const res = await fetch(`https://itunes.apple.com/lookup?id=${id}&entity=song`);
            const data = await res.json();
            const album = data.results[0]; 
            const songs = data.results.slice(1);
            
            document.getElementById('albumDetailContent').innerHTML = `
                <div style="text-align:center; padding:40px 20px;">
                    <img src="${art.replace('100x100', '600x600')}" style="width:220px; border-radius:15px; box-shadow: 0 20px 40px rgba(0,0,0,0.8);">
                    <h2 style="margin-top:25px; font-size:22px;">${album.collectionName}</h2>
                    <p style="color:var(--primary); margin-top:5px;">${album.artistName}</p>
                </div>
                ${songs.map((m, i) => `
                    <div class="track-row" id="row_${id}_${i}" onclick="tocar('${id}', ${i}, '${art}')">
                        <span style="color:#555; width:25px; font-size:12px;">${i+1}</span>
                        <div style="flex:1; margin-left:10px; overflow:hidden;">
                            <div class="track-title" style="font-size:15px; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${m.trackName}</div>
                        </div>
                        <i class="fas fa-play" style="font-size:14px; color:rgba(255,255,255,0.3);"></i>
                    </div>`).join('')}<div style="height:150px;"></div>`;
            window.listaVisualizada = songs; 
            atualizarUI();
        }

        function tocar(albumId, index, art) {
            if (window.albumAtivoId === albumId && window.musicaIndex === index) { togglePlay(); return; }
            window.albumAtivoId = albumId; window.musicaIndex = index;
            window.listaTocando = window.listaVisualizada; window.capaAtiva = art;
            const m = window.listaTocando[index];
            audio.src = m.previewUrl; audio.play();
            showPlayer();
            document.getElementById('playerArt').src = art;
            document.getElementById('trackTitle').innerText = m.trackName;
            document.getElementById('trackArtist').innerText = m.artistName;
            atualizarUI();
        }

        function atualizarUI() {
            document.getElementById('playBtn').innerHTML = audio.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); atualizarUI(); }
        function proxima() { if(window.musicaIndex + 1 < window.listaTocando.length) tocar(window.albumAtivoId, window.musicaIndex + 1, window.capaAtiva); }
        function fecharPagina() { albumPage.style.display = 'none'; }

        player.classList.add('player-hidden');
        carregarPorGenero("Início");
    </script>
</body>
</html>
